      if(att.attack && hb.type!=='special' && !att.attack.reversal){ att.attack.cancelOK=Math.max(att.attack.cancelOK||0,10); att.attack.blockCancel=true; att._bchain=(att._bchain||0)+1;   // #3 ON-BLOCK PRESSURE: a blocked normal opens a SHORT cancel window — a tight follow-up is a frame trap (beats a mash, loses to continued block); v6 #6 counts toward the 3-contact string cap. NO special-cancel on block; a blocked REVERSAL gets NO window.
        if(att===game.player && game.frame-(att._blockCueAt||0)>50){ att._blockCueAt=game.frame; floatText(att.x+att.facing*28, att.y-120, 'PRESSURE ▸', '#9fdcff', 12); } }
      return; }
    if(res==='armor'){ hitstop=Math.max(hitstop,4); ring(cx,cy,'#ffcf6a',30,3); return; }   // MAXIMILIAN plowed through the startup — no combo/punish/launcher credit for the attacker
    // clean hit
    if(punish){ att.addAura(14 + (inCorner(def)?6:0)); def.stun=(def.stun||0)+6;   // punishing a foe's recovery = your neutral REFUEL + a confirm window (v5 #7: a CORNER punish pays +6 more — the wall compounds won exchanges)
      floatText(att.x, att.y-198, 'PUNISH ▸', '#ffd34d', 18); sparks(def.x,def.y-90,10,'#ffd34d',5); addTrauma(0.18); }
    if(punish || (att.attack&&att.attack.just)){ hitstop=Math.max(hitstop,18); SFX.counter(); ring(cx,cy,'#ff5a5a',34,3); }   // v4/v5 COUNTER-TIER CRUNCH — a whiff-punish or JUST hit freezes HARDEST (audit #12: 12->18, top of the weight ladder) + its own exclusive crack + red ring
    def._jitT=Math.max(def._jitT||0, Math.max(4,hitstop));   // v5 #15 the defender vibrates through the freeze (render-side)
    if(ambush) floatText(def.x,def.y-206,'AMBUSH!','#b48cff',20);
    if(att===game.player){ game.stats.dmg+=Math.round(dmg); game.rushMeter=Math.min(RUSH_MAX,(game.rushMeter||0)+6+((att.attack&&att.attack.just)?4:0)); }  // landing hits charges FOCUS (+JUST credit only on a clean hit)
    if(def._streakShield){ def._streakShield=false; floatText(def.x,def.y-158,'STREAK HELD','#ff7ac0',12); } else def.streak=0;   // v5 #13 a won gambit's shield spends itself here
    def.combo=0; def.chargedHit=false; def._carry=0; def._stuRef=0; // getting tagged breaks your combo (and the per-string verb budgets)
    if(wasVuln){ att.combo=(att.combo||0)+1; if(att===game.player && att.combo>=3) mastAdd(att.char.id,'bc',att.combo,true); }   // v3 #6 HONEST COMBO — count only hits the foe couldn't act between (v6 #16: true strings feed the ledger)
    else { if((att.combo||0)>=2) floatText(att.x+att.facing*30, att.y-134, 'RESET', '#8a93b8', 12); att.combo=1; att._carry=0; att._stuRef=0; att._ssUsed=false; }   // new string = fresh per-string verb budgets (Addison's CARRY, the Initiate's refunds + re-derive)

    }
    if(def.hp<=0) lethal(def, hb.type==='special');

const cardFx={flash:0,col:'#0f0',shake:0};
function cardWorldPoint(){ // world coords beneath the math card
  return {x:cam.x, y:cam.lookY() + (442-300)/cam.z};
}
function computeDanger(f){ // the foe winding up on f right now (whole telegraph) — drives the WARNING UI
  const foes = (game.mode==='rumble'&&game.fighters)? game.fighters.filter(x=>x!==f&&!x.ko&&!x.gone) : [f.opp];
  for(const o of foes){
    if(!o || !o.attack || o.attack.quick) continue;   // v5 #2 fast pokes never feed the danger/NOW UI — you BLOCK or eat those; you SOLVE the big commits
    const ph=o.attack.ph, ok = game.mode2p? (ph==='wind'||ph==='act') : (ph==='tel'||ph==='wind'||ph==='act');
    if(ok && Math.abs(o.x-f.x)<190) return o;
  }
  return null;
}
function framesToHit(o){ // frames until o's current attack hitbox goes live (∞ if not attacking)
  const a=o&&o.attack; if(!a) return Infinity;
  if(a.ph==='act')  return 0;
  if(a.ph==='wind') return a.t;
  if(a.ph==='tel')  return a.t + (a.def?a.def.wind:0);
  return Infinity;
}
const PERFECT_WIN=26;   // max window; the ACTUAL window scales with each attack's telegraph (tight on fast strikes)
function perfectWin(o){ return clamp(Math.round((o.attack && o.attack.fuse || 40)*0.42), 10, PERFECT_WIN); }
function perfectFoe(f){  // the foe whose strike is inside its tight perfect-dodge window, or null
  const foes=(game.mode==='rumble'&&game.fighters)? game.fighters.filter(x=>x!==f&&!x.ko&&!x.gone):[f.opp];
  for(const o of foes){ if(o && o.attack && !o.attack.quick && Math.abs(o.x-f.x)<190 && framesToHit(o)<=perfectWin(o)) return o; }   // quick pokes open no perfect window (too fast to solve-react — block them)
  return null;
}
// Apply a solved/missed math result to fighter f. Shared by offline + online

    const took = game.frame-(game.problemAt||game.frame);

  }

    if(f===game.player && game.problem && game.problem.gambit){ f.aura=0; f.auraChipT=18; f.dizzy=46;  // GAMBIT bust — you bet your bank and lost it
      floatText(f.x,f.y-198,'GAMBIT LOST!','#ff4d5e',20); addTrauma(0.06); }
    floatText(f.x,f.y-170,'THE LINE BROKE','#ff4d5e',20); addTrauma(0.12); SFX.wrong();
    if(f===game.player) reactBanter('onMiss');
    if(f===game.player && game.chRule && game.chRule.tag==='subtract' && game.enemy && !game.enemy.ko){   // LESSING VIII: a sloppy answer leaves a false part standing — it heals him

    floatText(f.x,f.y-212,'ASCENDED','#ffd34d',26); flash(0.12,'#ffd34d'); ring(f.x,f.y-90,'#ffd34d',80,5);
    if(f===game.player){ floatText(f.x,f.y-182,'CHAINS EXTEND','#ffe9a0',14); mastAdd(f.char.id,'v'); }   // SIGNATURE payoff, named: Krishna can now P>P>P (feeds his ledger)
  }

  const perfect = result==='perfect';

  else if(schismLit(f)){ gain*=2; qtag='×2 RATIO'; qcol='#b48cff'; }       // SCHISM: solve atop a lit rune = double
  let gambit=false;

  if(f.hp < f.char.hp*0.28){ gain=Math.round(gain*1.25); floatText(f.x,f.y-238,'LAST STAND +25%','#ff9f6a',13); }   // v5 #13 the WAGE rises when the fight is nearly lost (bonus on the wage, never on damage) — comebacks are counted for, not gifted
  if(f._brokeBonus){ f._brokeBonus=false; gain=Math.round(gain*1.5); floatText(f.x,f.y-254,'RECOVERY ×1.5','#7ae8ff',13); }   // v5 #13 the first solve back from BROKE pays extra — the way out is through the count
  // SOLVE-TO-PARRY: on a COVERED perfect, holding TOWARD the foe stays in the pocket to punish (committed: smaller window) vs holding back = full evasive dodge
  const parry = perfect && slipOK && f===game.player && !game.mode2p && !game.online &&
    ((f.facing>0)? (keys[KEYS.right]||keys['arrowright']) : (keys[KEYS.left]||keys['arrowleft']));
  if(perfect && slipOK) f.doDodge(true, parry);
  else if(perfect){ f.iframes=0; f.slipActive=false; f.vx=-f.facing*2.6; f.dodgeT=6; f.dodgeCd=30; }   // wrong guard height (or a throw): NO slip — the blow lands, but you still banked the aura below

  f.addAura(gain); st.auraEarned=(st.auraEarned||0)+gain;
  floatText(f.x,f.y-(perfect?190:170),'+'+gain+' AURA','#7ae8ff',17);
  if(qtag) floatText(f.x,f.y-(perfect?214:194), qtag, qcol, 15);
  if(gambit){ f.chargedHit=true; f.comboT=Math.max(f.comboT,80); f._streakShield=true; floatText(f.x,f.y-(perfect?240:220),'GAMBIT — DOUBLED','#ff7ac0',16); flash(0.1,'#ff7ac0'); }   // v5 #13 a WON wager also shields your streak through the next hit
  if(perfect && slipOK){

    st.perfects=(st.perfects||0)+1; slowmo(380,0.45); flash(0.22,'#fff1c0'); addTrauma(0.2);
    if(f===game.player) game.rushMeter=Math.min(RUSH_MAX,(game.rushMeter||0)+12);   // a clutch perfect-dodge charges FOCUS fast

  if(f===game.player && op){

}
function methodHint(p){   // a one-line "how" shown on a miss — teach the method, not just the answer
  if(!p) return '';
  const t=p.text;
  if(/% of/.test(t))                 return 'find 1% (the number ÷ 100), then multiply by the percent';
  if(/x/.test(t))                    return 'isolate x: do the inverse operation to BOTH sides';
  if(/½|¼|¾|⅓|⅔|of /.test(t))        return 'split the whole into equal parts, then take that many';
  if(/×.*\+|\+.*×/.test(t))          return 'order of operations: do the × before the +';
  if(/²/.test(t))                    return 'a square is the number times itself';
  if(p.op==='+') return 'add the bigger number first, then count on';
  if(p.op==='−') return 'count up from the smaller number — and keep going below zero if it’s bigger';
  if(p.op==='×') return 'it’s repeated adding: that many groups of the second number';
  if(p.op==='÷') return 'ask: how many groups of the divisor fit into the total?';
  return 'take it one step at a time';
}
function inCorner(f){ return f.x<290 || f.x>WORLD_W-290; }   // v5 #7 the SOFT CORNER — within ~220px of the clamp, exchanges have spatial stakes
function completeFocus(f){   // #4 the FOCUS channel pays out — the banked answer lands (unless a hit broke it first)
  const pd=f.pendingSolve; f.pendingSolve=null; if(!pd || f.ko) return;
  const sp=game.problem, sa=game.problemAt;
  game.problem=pd.problem; game.problemAt=pd.problemAt;   // restore the ANSWERED problem's context (applySolve reads game.problem for gambit + solve-speed)
  const gain=applySolve(f,'ok',pd.st,pd.problem&&pd.problem.op);
  game.problem=sp; game.problemAt=sa;
  if(gain) hudFloat(pd.isP1,'+'+gain,'#7ae8ff');
  ring(f.x,f.y-86,'#7ae8ff',44,4);
}
function submitFor(f, buf){ // local typed answer (offline, or a player's own seat)
  if(game.state==='rush') return rushSubmit(f,buf);
  if(game.state==='finisher') return finisherSubmit(f,buf);
  if(game.galaxy) return '';   // GALAXY: no solving during the fight itself — only in the bursts
  if(game.state!=='fight'||game.paused||!buf||f.ko) return '';
  const st = f===game.player? game.stats : game.stats2;
  const isP1 = f===game.player;
  const correct = buf!=='' && buf!=='-' && Math.abs(+buf - game.problem.ans) < 1e-6;  // tolerant: integers, negatives, decimals
  cardFx.flash = correct?10:12; cardFx.col = correct?'#46e08a':'#ff4d5e';
  if(!correct){
    cardFx.shake=10; game.reveal={txt:game.problem.text+' = '+game.problem.ans, t:175, hint:methodHint(game.problem)};
    if(isP1 && !game.daily){ // spaced repetition: queue the missed item to re-ask soon (cap the queue)
      game.missQ=game.missQ||[];
      game.missQ.push({text:game.problem.text, ans:game.problem.ans, op:game.problem.op});
      if(game.missQ.length>8) game.missQ.shift();
    }
  }
  if(correct){ const cw=cardWorldPoint(); homing(cw.x,cw.y,f,f.accent,5); }
  const result = correct? (perfectFoe(f)?'perfect':'ok') : 'miss';   // PERFECT only inside the tight reactive window
  if(game.online && net.role==='guest'){ // guests report results; host applies & syncs
    netLocalCosmetic(result);
  } else if(result==='ok' && f===game.player && !game.online && !game.mode2p && !f.ko){
    // #4 FOCUS CHANNEL — an UNTIMED correct answer takes a readable beat to bank: ~12f standing open (no swing/dash/block), then the aura lands. A hit mid-channel breaks it, no refund — the exact mirror of you rushing the CPU's ∑ solve. PERFECT (NOW-window) solves stay instant so the reactive slip is crisp; misses land instantly.
    if(f.focusT>0 && f.pendingSolve) completeFocus(f);   // roll an in-flight bank in first (humanly near-impossible at 12f, but never silently lose one)
    f.focusT=12; f.pendingSolve={problem:game.problem, problemAt:game.problemAt, st, isP1};
    floatText(f.x,f.y-166,'∑ BANKING','#7ae8ff',13);
    if((game.focusChanTaught||0)<2){ game.focusChanTaught=(game.focusChanTaught||0)+1; tip('focuschan','BANKING — a correct answer takes a beat to land, and you stand open. Answer when you are safe, or in the NOW window to SLIP instead.'); }
  } else {
    const gain=applySolve(f, result, st, game.problem.op);
    if(gain) hudFloat(isP1,'+'+gain,'#7ae8ff');
  }
  game.heat+=0.45;
  let _h=Math.floor(game.heat);   // THREAT-COUPLED MATH (fusion): ease the problem when there's a dodge to make (reward the READ, not arithmetic); nudge harder when cornered
  if(!game.daily && !game.online && !game.mode2p && !game.galaxy){
    const danger = (game.enemy && game.enemy.attack && (game.enemy.attack.ph==='wind'||game.enemy.attack.ph==='tel')) || (typeof dangerInfo==='function' && dangerInfo()>0);
    const cornered = game.player && game.player.hp < game.player.char.hp*0.28;
    if(danger) _h=Math.max(0,_h-2);
    else if(cornered) _h=Math.max(0,_h-2);   // v5 #13 UN-INVERTED spiral — on the ropes the problems get EASIER, not harder (losing at math shouldn't compound losing at fighting)
  }
  game.problem=newProblem(_h);
  if(game.mode2p){ ans1=''; ans2=''; }
  return '';
}

function startMatch(){

function eliminate(f){

  game.rumbleRank=rank;
  game.rumbleWinner=rank[0]||null;
  game.playerWon = game.rumbleWinner===game.player;
  game.rumblePlace = rank.indexOf(game.player)+1;

  if(cardFx.flash>0)cardFx.flash--; if(cardFx.shake>0)cardFx.shake--;
  if(game.tip && game.tip.t>0) game.tip.t--;

  if(game.state==='warmup'){ warmupTick(); return; }   // both sides solve the opener locally (guests run it too, then follow snapshots once the host rings the bell)
  if(game.online && net.role==='guest'){ guestTick(); return; } // guests render, never simulate

  if(['splash','welcome','title','keyart','trailercard','modes','rumbleChoose','matchend','select','howto','settings','interlude','lobby','story','dialogue','training','reward','codex','naming','records'].includes(game.state)){
    if(game.state==='splash' && --game.splashT<=0) game.state = game.seenHow? 'title' : 'welcome';   // first run → learn-to-fight gate
    p.update(false); e.update(false);

    return;
  }
  if(game.state==='intro'){
    if(game.mode==='rumble' && game.fighters){ for(const f of game.fighters) f.update(false); }
    else { p.update(false); e.update(false); }
    game.introT--;
    if(game.introT===55){ SFX.fight(); addTrauma(0.25); flash(0.15,'#fff');
      ring(cam.x,GROUND-80,'#ffd34d',120,6); }
    if(game.introT<=40){
      if(game.galaxy && !game.practice && (game.galaxyBurstsDone||0)===0){ enterGalaxyBurst(1); }   // GALAXY: load your combos before the fight
      else if(game.galaxy && game.practice){ game.galaxyBest=99; game.state='fight'; game.fightAt=game.frame; }   // PRACTICE galaxy: all combos unlocked, no burst
      else { game.state='fight'; game.fightAt=game.frame; }
    }
    return;
  }
  if(game.state==='fight'){
    if(game.galaxy && !game.practice && (game.galaxyBurstsDone||0)===1 && game.timer<=37){ enterGalaxyBurst(2); return; }   // GALAXY: halftime burst (not in practice)
    if(game.practice){   // free training vs a still dummy that can't die; you can't lose; clock frozen

      p.hp=p.char.hp; game.timer=99;
      tip('prac','SPARRING · '+(game.pracFight?'dummy fights back (F: idle)':'F: dummy fights back')+' · P: pause & tips · ESC: quit'+(game.galaxy?' · B: new combo strings':''));
    }
    forgeTick();                       // MULTIPLY stage: oscillate the central forge platform
    stageHazardTick();                 // ambient stage hazards (gated on settings.hazards)
    if(game.tutorial) tutorTick();     // first-run guided bout drives the dummy + the lesson script
    if(game.mode==='rumble'){ rumbleStep(); return; }
    if(game.cinema && !game.mode2p && !game.tutorial && !game.practice && !game.galaxy){ p.opp=game.enemy; controlCPU(p); cpuTelegraphDrift(p); }   // SHOWCASE: the player auto-fights too
    else controlPlayer(p);
    if(game.mode2p) controlP2(e);
    else if(game.online){ const gs=net.guestState[e.seat]||{}; e.moveX=gs.mv||0; e.wantBlock=!!gs.bl; }   // ONLINE DUEL: the foe is your friend — drive from streamed input, not AI
    else if(!game.tutorial && (!game.practice || game.pracFight)){ controlCPU(e); cpuTelegraphDrift(e); }   // PRACTICE: dummy idle by default; F makes it fight back so you can drill block / dodge / burst
    p.update(true); e.update(true);
    if(game.ally){ allyControl(game.ally); game.ally.update(true); }   // LESSING fights at your side in the finale
    // body push
    const dx=e.x-p.x, min=54;
    if(Math.abs(dx)<min && p.grounded===e.grounded){
      const push=(min-Math.abs(dx))/2*Math.sign(dx||1);
      e.x=clamp(e.x+push,70,WORLD_W-70); p.x=clamp(p.x-push,70,WORLD_W-70);
    }
    for(const f of [p,e]) for(const pl of PILLARS){ // solid cover (jumpable)
      const dx=f.x-pl.x;
      if(Math.abs(dx)<36 && f.y>GROUND-104) f.x=pl.x+Math.sign(dx||1)*36;
    }
    updatePickups(); updateProjs(); updateHazards();
    game.playerHidden = !game.mode2p && isConcealed(p,e);
    game.hiddenRecent = game.playerHidden? 20 : Math.max(0,(game.hiddenRecent||0)-1);
    if(game.playerHidden) tip('hide','HIDDEN — strike from cover for an AMBUSH (+30%). Your rival banks AURA while you wait.');
    if(dangerInfo()>0) tip('tel','Strike incoming — ↓ blocks LOW, hold back blocks HIGH. Answer in the NOW window to SLIP it.');
    // ANSWER RELOCK — when a strike crosses into its tight perfect window, your typed answer is WIPED.
    // A perfect dodge now demands SOLVING inside the ⚡NOW window (or BLOCK) — no holding a pre-typed answer from neutral.
    if(!game.mode2p && !game.online && !game.galaxy){   // GALAXY has no solve-dodge — math lives only in the bursts
      const pf=perfectFoe(p);
      if(pf){
        if(pf.attack!==game.relockAtk){ game.relockAtk=pf.attack;
          if(ans1!==''){ ans1=''; cardFx.shake=Math.max(cardFx.shake||0,9); }
          if(!game.daily){ const a=rnd(3,9), b=rnd(1,a-1); game.problem={text:a+'−'+b, ans:a-b, op:'−', micro:true}; game.problemAt=game.frame; }   // v5 #4 AGE-HONEST NOW LANE — the reactive read is ALWAYS a 1-digit micro-problem (a median 12yo can use the fork); the full-heat problem stays the safe/bank lane
          cardFx.flash=Math.max(cardFx.flash||0,11); cardFx.col='#ffd34d';
          floatText(p.x,p.y-200,'ANSWER — NOW','#ffd34d',18);

        }
      } else { game.relockAtk=null;
        if(game.problem && game.problem.micro && !game.daily){ game.problem=newProblem(Math.floor(game.heat)); game.problemAt=game.frame; } }   // danger passed unanswered — the bank lane returns to full-heat problems (no cheap 1-digit banking)
    }
    if(p.spReady()) tip('sp','SPECIAL ready — press '+keyLabel(KEYS.special)+'. Hold it to pick a tier. As the final blow, it triggers the arena finish.');
    if(game.burstChallenge){ game.burstChallenge.t--; if(game.burstChallenge.t<=0 || (p.comboedHits||0)<2 || p.ko) game.burstChallenge=null; }  // MATH-BURST window
    if((game.digitLockT||0)>0) game.digitLockT--;   // v3 #3 busted-burst digit lockout ticks down
    resolveHits(p,e); resolveHits(e,p);
    if(game.ally) resolveHits(game.ally, game.enemy);   // Lessing's strikes chip Solomon (Solomon never targets the ally)
    storyBeatTick();                    // marquee story lines that PLAY as HP crosses a threshold
    chRuleTick();                       // per-foe combat philosophy (Maximilian's overflow meter, etc.)
    if(game.mode==='story' && game.storyCh===STORY.length-1 && !game.galaxy && !game.practice && p.aura>0){
      p.aura=Math.max(0, p.aura-0.04);   // SOLOMON reduces the unknown toward zero — clean solving is the only push-back (codex thesis, played)
      if(game.frame%150===0) floatText(p.x, p.y-152, '↓ to zero', '#ff9f2a', 12);
      tip('solz','Solomon drains your AURA toward zero. Keep answering to hold it.');
    }
    game.timer -= 1/60;
    if(game.timer<=0 && game.state==='fight') endByTime();
    return;
  }
  if(game.state==='rush'){
    if(game.frame%6===0) slowmo(140,0.3);     // sustain slow-time for the whole window (input stays real-speed)
    p.moveX=0; e.moveX=0; e.stun=Math.max(e.stun,30);  // keep the foe frozen

  if(game.state==='qed'){

    return;
  }
}

function hpBar(f, side){ // side: 1 = left, -1 = right

  ctx.translate(side===1?0:-w,0);

  ctx.fillStyle='#33080f'; ctx.fillRect(0,0,w,h);
  const chip=clamp(f.hpShown/f.char.hp,0,1), cur=clamp(f.hp/f.char.hp,0,1);
  const ax = side===1? 0 : w; // anchored at the outer edge
  const fill=(frac,style)=>{ ctx.fillStyle=style;
    if(side===1) ctx.fillRect(0,0,w*frac,h); else ctx.fillRect(w*(1-frac),0,w*frac,h); };
  fill(chip,'#f3f0e6');
  const hg=ctx.createLinearGradient(0,0,0,h);

  fill(cur,hg);

  // AURA tank — every attack draws from this; math refills it
  const mw=236,my=h+6;

    if(side===1) ctx.fillRect(mx0,my,mw*frac,9); else ctx.fillRect(mx0+mw*(1-frac),my,mw*frac,9); };
  seg(as,'rgba(255,225,150,0.8)'); // freshly-spent ghost

  else { pg.addColorStop(0,'#7ae8ff'); pg.addColorStop(1,'#1f9adf'); }

  const foes = (game.mode==='rumble'&&game.fighters)? game.fighters.filter(f=>f!==p&&!f.ko) : [game.enemy];
  let best=0;

function findTrailerSong(){
  if(trailerSongURL) return Promise.resolve(true);
  const tries=['trailer.mp3','trailer.m4a','trailer.ogg','trailer.wav'];
  return tries.reduce((p,f)=>p.then(ok=> ok || fetch(f,{method:'HEAD'}).then(r=> r.ok? ((trailerSongURL=f),true):false).catch(()=>false)), Promise.resolve(false));
}

function trailerDirector(){
  if(game.trailerLoading) return;   // the song decides when we start
  const tr=game.trailer; if(!tr){ setupTrailerScene(0); return; }
  // v10 SONG-LOCKED CLOCK — when your track is playing, IT is the master timeline (1 song-second = 60 ticks). Slow-mo stretches the SIM, never the music; the drop lands where the drop lands.
  let songDriven=false;
  if(game.trailerSongOn && trailerSongEl && tr.songBase!=null){
    const s=trailerSongEl.currentTime;
    if(s>0){ tr.t=Math.max(tr.t, Math.round((s-tr.songBase)*60)); songDriven=true; }
  }
  if(!songDriven) tr.t++;
  const S=TRAILER[tr.scene];
  if(S && S.script && (game.state==='fight'||game.state==='ko')) for(const a of S.script) if(!a._f && tr.t>=a.at){ a._f=true; try{ a.fn(game.player, game.enemy); }catch(_){} }   // the director LANDS the money shots (>= : the song clock can skip exact ticks; ko: the finish stinger plays through)
  game.cinemaSlow = !!(tr.slow && tr.t>=tr.slow[0] && tr.t<=tr.slow[1]);
  if(trailerSongEl && game.trailerSongOn && TRAILER[tr.scene+1]===undefined && tr.dur-tr.t<160){ try{ trailerSongEl.volume=Math.max(0, 0.92*(tr.dur-tr.t)/160); }catch(_){} }   // the song bows out with the logo
  if(tr.t>=tr.dur) setupTrailerScene(tr.scene+1);
}
function drawTrailercard(){   // v4 KINETIC TYPE — word groups slam in on the beat; editorial, not floating-symbol soup
  ctx.fillStyle='#06070c'; ctx.fillRect(0,0,W,H);
  const tr=game.trailer, c=tr&&tr.card; if(!c) return; const t=tr.t;
  ctx.save(); ctx.globalAlpha=0.05; ctx.translate(W/2,H/2); ctx.rotate(-0.5);   // one slow diagonal light shaft
  const sx=((t*1.4)%(W+700))-W/2-350;
  const lg=ctx.createLinearGradient(sx,0,sx+240,0); lg.addColorStop(0,'rgba(122,232,255,0)'); lg.addColorStop(0.5,'#7ae8ff'); lg.addColorStop(1,'rgba(122,232,255,0)');
  ctx.fillStyle=lg; ctx.fillRect(-W,-H,W*2,H*2); ctx.restore();
  if(c.problem){   // v6 THE OPENING FRAME — a math problem, huge, in a fighting-game trailer. The answer digits SLAM in; a ring fires on the enter.
    ctx.font=font(MONO,44);
    const baseW=ctx.measureText(c.problem+' ').width, ansW=c.answer.length*30;
    const x0=W/2-(baseW+ansW)/2, y0=H/2+10;
    const shown=c.problem.slice(0, Math.floor(Math.max(0,t-4)*0.55));
    if(shown) txtO(shown+' ', x0, y0, 44, '#f2f5ff', {mono:true,align:'left',sw:6});
    let n=0; (c.ansAt||[]).forEach((at,i)=>{ if(t>=at) n=i+1; });
    for(let i=0;i<n;i++){
      const gt=t-c.ansAt[i], k=clamp(gt/6,0,1), s=1+(1-k)*(1-k)*0.7;
      ctx.save(); ctx.translate(x0+baseW+i*30+15, y0-14); ctx.scale(s,s);
      txtO(c.answer[i], 0, 14, 46, '#ffd34d', {mono:true,sw:6});
      ctx.restore();
    }
    if(c.ringAt && t>=c.ringAt){ const rt=t-c.ringAt, r=14+rt*11, a=Math.max(0,1-rt/26);   // ⏎ — the answer detonates
      if(a>0){ ctx.strokeStyle='rgba(122,232,255,'+(a*0.8).toFixed(3)+')'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(x0+baseW+ansW/2, y0-16, r, 0, 7); ctx.stroke(); }
      if(rt<4){ ctx.fillStyle='rgba(240,246,255,'+(0.4*(1-rt/4)).toFixed(3)+')'; ctx.fillRect(0,0,W,H); } }
    return;
  }
  const groups=c.words||[{t:c.text,at:0}], landed=groups.filter(g=>t>=g.at), n=landed.length;
  if(!n) return;
  // FIT THE FRAME: long lines shrink to 86% of screen width (EVERYTHING ENDS AT ZERO measured 1048px at 44 — words were literally cut off), and wide lines slam from a smaller overshoot so even the slam stays on screen.
  let fs=44; ctx.font=font(DISP,44);
  for(const g of groups){ const w=ctx.measureText(g.t).width; if(w>W*0.86) fs=Math.min(fs, Math.floor(44*W*0.86/w)); }
  const lh=Math.round(fs*1.36);
  const y0=H/2-(n-1)*lh/2+10, last=landed[n-1], since=t-last.at;
  ctx.save(); if(since<4) ctx.translate(since%2?3:-3, since%2?-2:2);   // 4-tick impact shake on each land
  landed.forEach((g,i)=>{
    ctx.font=font(DISP,fs);
    const wide=ctx.measureText(g.t).width > W*0.6, ov=wide?0.14:0.5;   // long line: a tight 1.14x slam · short line: the full 1.5x punch
    const gt=t-g.at, k=clamp(gt/6,0,1), s=1+(1-k)*(1-k)*ov;
    ctx.save(); ctx.translate(W/2, y0+i*lh); ctx.scale(s,s);
    if(gt<5){ txtO(g.t,-3,0,fs,'rgba(255,90,106,0.7)',{sw:0}); txtO(g.t,3,0,fs,'rgba(122,232,255,0.7)',{sw:0}); }   // 5 ticks of chromatic split
    txtO(g.t, 0, 0, fs, '#f2f5ff', {sw:7});
    ctx.restore();
  });
  ctx.restore();
  const bw=clamp((t-groups[0].at)/8,0,1)*220;   // the accent rule snaps in under the block
  ctx.fillStyle='#7ae8ff'; ctx.fillRect(W/2-bw/2, y0+n*lh-30, bw, 3);
}

// measure-only word wrap → array of lines (ctx.font must already be set)
function wrapLines(s,maxW){
  const words=String(s).split(' '); let line='', out=[];
  for(const w of words){ const t=line? line+' '+w : w;
    if(ctx.measureText(t).width>maxW && line){ out.push(line); line=w; } else line=t; }
  if(line) out.push(line); return out;
}

function drawCsFigure(char, x, groundY, facing, lit, a, phase, act){
  const f=cutsceneFighter(char); f.facing = (act==='turn')? -facing : facing;   // turn AWAY (won't look at you)

  // BODY-ACTING: bend the actual spine + hips (P.lean / P.crouch), not just rotate the whole plank
  let koA=0, dy=0, dx=0, sc=1.5; const P=f.P;
  if(act==='slump'){ P.lean+=0.28; P.crouch+=9; dy=4; koA=0.05; }
  else if(act==='broken'){ P.lean+=0.5; P.crouch+=18; dy=7; koA=0.10; }   // grief: the spine curls + the hips sink
  else if(act==='recoil'){ P.lean-=0.22; dx=facing*8; koA=-0.05; }        // taken aback: lean away
  else if(act==='loom'){ P.lean+=0.12; P.crouch-=5; sc=1.66; dy=-2; }     // menace: tall + leaning in
  else if(act==='step'){ dx=-facing*14; }
  const breath = (act==='broken'||act==='slump')? 0.5 : (act==='loom'? 1.4 : 1);   // slumped barely breathes; looming swells
  const bob=Math.sin(game.frame*0.05+phase*2.3)*3*breath + (lit?Math.sin(game.frame*0.22)*1.4*breath:0);
  const slide=(1-a)*46*(facing>0?-1:1);

  else    drawPose(f,f.P,0,0,0.34,'#0d0b16',koA);   // dim silhouette
  ctx.restore();
}

function postFx(){   // cinematic lighting/atmosphere pass over the world — lifts perceived production value
  // 1) ATMOSPHERIC DEPTH — a cool haze thickening toward the horizon, separating the planes
  const fog=ctx.createLinearGradient(0,H*0.16,0,H*0.74);
  fog.addColorStop(0,'rgba(92,112,165,0.12)'); fog.addColorStop(1,'rgba(92,112,165,0)');
  ctx.fillStyle=fog; ctx.fillRect(0,0,W,H);
  // 2) GOD-RAYS from the moon (upper-centre key light), gently breathing
  const mx=W*0.5, my=H*0.30;
  ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.055+Math.sin(game.frame*0.018)*0.014;
  const rays=ctx.createRadialGradient(mx,my,16, mx,my,H*0.95);
  rays.addColorStop(0,'rgba(224,228,255,0.7)'); rays.addColorStop(0.45,'rgba(176,188,240,0.12)'); rays.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rays; ctx.fillRect(0,0,W,H);
  ctx.restore();
  // 3) COLOR GRADE — cool top, warm floor; soft-light keeps it subtle and cohesive
  ctx.save(); ctx.globalCompositeOperation='soft-light'; ctx.globalAlpha=0.46;
  const acc=ST().accent||'#88a0d0';                        // PER-STAGE GRADE: cool indigo top, the arena's own hue washing the floor
  const grade=ctx.createLinearGradient(0,0,0,H);
  grade.addColorStop(0,'#3a4a7a'); grade.addColorStop(0.55,'#14122a'); grade.addColorStop(1, shade(acc,-0.5));
  ctx.fillStyle=grade; ctx.fillRect(0,0,W,H);
  ctx.restore();
}
let _bloomCv=null;
function bloomPass(){   // soft additive bloom — blooms highlights for a rendered glow (downscaled for speed)
  if(typeof document==='undefined') return;
  if(cv.width<2 || cv.height<2) return;   // guard: a 0-sized canvas (e.g. tab loaded in background) would crash drawImage
  if(!_bloomCv){ _bloomCv=document.createElement('canvas'); }
  const bw=Math.max(1,(cv.width/3)|0), bh=Math.max(1,(cv.height/3)|0);
  if(_bloomCv.width!==bw){ _bloomCv.width=bw; _bloomCv.height=bh; }
  const bx=_bloomCv.getContext('2d');
  bx.clearRect(0,0,bw,bh);
  bx.globalCompositeOperation='source-over';
  bx.filter='contrast(2.6) brightness(0.62)';        // THRESHOLD: keep only highlights, so darks stay dark and the bloom reads as glow, not haze
  bx.drawImage(cv,0,0,bw,bh);                         // downscale the (thresholded) frame
  bx.filter='none';
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.40; ctx.filter='blur(3px)';
  ctx.drawImage(_bloomCv,0,0,cv.width,cv.height);    // tight bloom
  ctx.globalAlpha=0.18; ctx.filter='blur(7px)';
  ctx.drawImage(_bloomCv,0,0,cv.width,cv.height);    // wide bloom halo
  ctx.filter='none'; ctx.globalAlpha=1; ctx.restore();
}
let _grainCv=null;
function makeGrain(){   // one tiling monochrome noise tile for film grain (kills gradient banding, adds shot-on-film texture)
  _grainCv=document.createElement('canvas'); _grainCv.width=_grainCv.height=128;
  const g=_grainCv.getContext('2d'), id=g.createImageData(128,128), d=id.data;
  for(let i=0;i<d.length;i+=4){ const v=(Math.random()*255)|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  g.putImageData(id,0,0);
}
function gradeFrame(){   // master tonemap + film grain — the single cheapest premium lift
  if(typeof document==='undefined' || cv.width<2) return;
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation='source-over'; ctx.filter='contrast(1.07) saturate(1.14) brightness(1.015)';
  ctx.drawImage(cv,0,0);                                   // tonemap: blit the frame through a contrast/saturation filter
  ctx.filter='none';
  ctx.globalCompositeOperation='multiply'; ctx.fillStyle='rgba(26,36,62,0.12)'; ctx.fillRect(0,0,cv.width,cv.height);   // deepen + cool the shadows
  ctx.globalCompositeOperation='soft-light';              // warm the firelight floor
  const wg=ctx.createLinearGradient(0,cv.height*0.52,0,cv.height);
  wg.addColorStop(0,'rgba(255,176,110,0)'); wg.addColorStop(1,'rgba(255,176,110,0.16)');
  ctx.fillStyle=wg; ctx.fillRect(0,cv.height*0.5,cv.width,cv.height*0.5);
  if(!_grainCv) makeGrain();                              // film grain
  ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.045+(cam.trauma||0)*0.05;
  ctx.fillStyle=ctx.createPattern(_grainCv,'repeat');
  ctx.translate((Math.random()*128)|0,(Math.random()*128)|0);
  ctx.fillRect(-128,-128,cv.width+256,cv.height+256);
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; ctx.restore();
}

function computeScore(){
  const s=game.stats||{}, acc=(s.correct||0)/Math.max(1,s.asked||0);
  const diffMul=1+0.5*DIFF.level;                     // hard fights are worth more
  let sc = (s.correct||0)*120 + (s.perfects||0)*300 + (s.maxStreak||0)*60
         + Math.round(s.dmg||0)*2 + (s.auraEarned||0);
  if(game.playerWon) sc += 1500;
  if(s.qed) sc += 800;                          // a SOLVED finisher
  if(game.playerWon && game.player.hp>=game.player.char.hp) sc += 1000; // untouched
  sc = Math.round(sc * diffMul * (0.5 + acc));        // accuracy scales everything
  return Math.max(0, sc);

    P.aura=Math.max(P.aura,20);                         // gas for the 6-cost grab (and a punch to feel it bounce off block first)
    if(dist>110){ E.x += (P.x>E.x?1:-1)*1.4; }          // grabs are short-range — keep him close
    game.tutorT++;

  outro:[
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Huh. You added — and you stopped at the exact right moment. The column closed, the carry went up one place, and your hand came off the slate. Most new kids grab for the Multiply on day one.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'You reached for nothing you hadn’t earned. That’s not a beginner being careful. That’s the discipline I spent twenty years carving into myself, and you walked in wearing it like a borrowed coat.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'That’s the line in the note I’d hoped was the fake. The one that says the other three would come to you just as easily. I watched it pass its first test on my own training floor. I am not relieved.'},
   {w:'YOU',c:ME,t:'You wanted it to be false.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'I wanted the book to be safe. A promise that’s true is a column that won’t close — it carries, and carries, and someone always comes to collect what spilled over.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Stay close. If a coffee-stained margin is right about you, every order in the world will want a piece — and one of them, at the bottom of the page, wants all of it at once.'},
   {w:'NARRATOR',c:N,t:'And under the coffee ring, where no thumb had yet worn through, a name waited — patient as an equals sign. It would be along. It is always, in the end, along.'}]},

 {title:'I · THE FIRST SUM', diff:0, opp:1, points:3, theme:'plus',
  intro:[
   {w:'NARRATOR',c:N,t:'The Brotherhood of the Plus believes in more — but only the kind you can hold. They build their great halls one brick a century, and they think the comma was rushed into the world too soon.'},
   {w:'NARRATOR',c:N,t:'The hall where Addison trains the new ones has stood four hundred years. By the order’s own books, it is three-fifths done. They are not rushing. Rushing is how tall things fall.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'The rule, same as always: more, but slow. Spar with me — add up your hits, but know the rule before you throw a single one.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Every hit is a number in a stack. You may only land what you can CARRY into the next one. A hit you can’t carry isn’t power — it’s debt. And debt, new one, is the first word the Multiply ever said out loud.'},
   {w:'YOU',c:ME,t:'So I spend nothing I haven’t earned.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'...Yes. Just that — and the first time anyone has said it back to me before they bled for it. Most need a stack to fall down before they learn the stack. Hold onto that. Begin — soft.'},
   {w:'YOU',c:ME,t:'You guard that rule like it did something to you.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'It didn’t hurt me. It saved me. Going slow doesn’t come easy to me — it’s a wall I build one brick at a time, against a thing on the far side I won’t name in this hall. Enough. Show me you can carry. Begin.'}],
  outro:[
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Good. You carry your sums the way the Plus do — nothing spent before it’s earned, no hit landed on borrowed money. You’d make a fine adder, if ’fine adder’ were all the note asked for.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'But it asks for four. So go to Lessing of the Difference. Subtraction is the flip side of all I just taught you, and he has to speak for you before the Brotherhood will — we have been sworn to his order since the First Subtraction.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Fair warning. He owns nothing, wants nothing, and trusts that even less. Take only what you need from him. He counts. He always counts. It’s the one habit I have never once caught him drop.'},
   {w:'YOU',c:ME,t:'You speak well of him.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'He keeps me honest. A man who only adds will carry a lie one day and never see the stack went wrong. Lessing sees. Everyone needs a Difference. ...Go. And mind the wall I built — it doesn’t reach that far.'}]},

 {title:'II · THE DIFFERENCE’S OATH', diff:0, opp:2, points:3, theme:'minus',
  intro:[
   {w:'NARRATOR',c:N,t:'Plus and Minus have stood together since the First Subtraction — what one adds, the other keeps honest. They are the two halves of balance.'},
   {w:'NARRATOR',c:N,t:'The hall of the Difference held a stool, a man, and a great deal of carefully kept emptiness. He had taken the rest away, and stood among the gaps like a king standing in his fields.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'So. Addison’s stray new pupil. We of the Difference own nothing — we took it away, and we are lighter for it. You’ll notice I have no chair to offer you. I gave that away too. Sit on the floor; it asks nothing of you.'},
   {w:'YOU',c:ME,t:'Addison sent me to renew the oath between your orders.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'The oath needs no renewing. I have stood at Add’s blind side so long I stopped calling it loyalty. It is just the math of where I stand. He carries; I take back what he carries wrong. We balance.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'But the Difference stands behind no one it has not tested. Here. Take this — all of it, the whole bag, more than your order would let you carry in a year. Go on. No one is watching but me.'},
   {w:'YOU',c:ME,t:'I’ll take only what I need. Nothing more.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Good. You left the rest on the table without a twitch. That is rarer than you know — most men’s hands close before their minds do. Wanting nothing is the one rule I have never once broken. It is the only thing I have ever let myself be proud of.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Now. Pride is a sum, and I’d like to see if yours shrinks under pressure. Stand up. The Difference does not stand behind what it has not taken something from first. Show me what’s left when I start taking.'}],
  outro:[
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Held back. Good. You take away like one of us — you let go of what you didn’t need before I had to take it. Add chose well. He usually does; it is the one thing he refuses to go cheap on.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Tell him the Difference stands with the Plus, as always. I’ll be at his blind side until the columns run out.'},
   {w:'YOU',c:ME,t:'Has anyone ever offered you something you wanted? Truly wanted?'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'No. Not once. But that is no great show of will — I made sure to want nothing, so there has never been anything to offer. You cannot be pulled off a list you keep empty.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'A man who owns nothing has nothing to lose, the saying goes. I have always found that a comfort. I am only now, saying it out loud to you, hearing the other way it could be read.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'No matter. Nothing in this world could turn me from him. Nothing.'}]},

 {title:'III · THE LONG DIVISION', diff:1, opp:3, points:4, theme:'div',
  intro:[
   {w:'NARRATOR',c:N,t:'There is a fourth order that swears loyalty to no one: the Schism. The Divide keeps no friends, only secrets, and the ratios between them.'},
   {w:'NARRATOR',c:N,t:'Its dealer does not go looking for members. He waits at the seam of every whole number, where the cracks already run, and charges you to watch it break.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'An initiate who has sworn to no one. How wonderfully easy to split. Everyone comes to my door wanting the Divide on their side.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'The Divide has no side. The Divide only separates the winners from the losers, and bills both. Every whole must be broken; I only name the price.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Every man is a number, and every number has a seam, a point where he splits clean. The Plus breaks when there is too little. The Minus, when there is too much. I read these the way you would read what is left over.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'But you. You I cannot break down. Nothing divides you but yourself, and the one I cannot place. An initiate who shares no part with the whole world. That should not exist. It delights me, and it should worry you.'},
   {w:'YOU',c:ME,t:'I only came to learn division.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Then learn this for free, which should scare you more than any fee: a Schism is coming. I make my living guessing where alliances crack, and I have already found the crack. Whether it runs between your orders or inside one of them, I have not yet said which.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'There is one account I cannot close, one number at the bottom of every page whose ratio will not work out, who wins the day all of you cancel down to nothing. But that is a longer story. Show me you can cut, and I will say more.'}],
  outro:[
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Hm. You divide clean, and you still will not break down. The first honest mystery I have met in a long, long account.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'So hear the rest, for free, against everything in me that says not to. The crack I found does not run between your Brotherhood and the Multiply. It runs inside your own Brotherhood. One of your own is already being measured for the break.'},
   {w:'YOU',c:ME,t:'When.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Sooner than the Plus would carry it, slower than the Multiply would like. Keep the Schism close, initiate. When the line splits, you will need to know exactly where the cracks run, and I will be the only one who already does.'}]},

 {title:'INTERLUDE · BLOOD AND BALANCE', diff:1, opp:1, points:4, theme:'plus',
  intro:[
   {w:'NARRATOR',c:N,t:'Before the storm, a quiet day. Addison and Lessing trained you together — Add and Subtract, the two halves of balance — laughing like the war was already won. Men laugh that way only when it isn’t.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Watch, new one. The Plus makes the count bigger; the Difference cuts it back to the truth. On our own, one of us is greed and the other is hunger. Together, we are the only real math there is.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'We have run this drill ten thousand mornings. I pile a column too high; he shaves it down to what we truly earned. I always reach too far. He always pulls me back. Begin.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'And when the count gets loud — when I can’t see his right hand — he taps the ledger twice. Two knocks. ’I am here. The side you can’t see is mine.’ Thirty years, and he has never once missed it. Show the boy.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'(He taps the table twice, without looking.) Lessing has guarded the side I can’t see since before you took your oath. There is no column where I trust him anything less than all the way.', sfx:'taps'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Big words, from an adder. I have wanted nothing my whole life. It’s the one wall I have never let crack — no one has offered me the right thing yet.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Then no one ever will, old friend. ...Enough. Show us both what the note made of you. Hold nothing back — Lessing and I will keep the count honest between us.'}],
  outro:[
   {w:'YOU',c:ME,t:'I watched the two of them pass the count back and forth — grow, trim, grow, trim — and finally I got it. The orders aren’t for power. They’re for balance. It was the first thing I was scared to lose.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Hah! The new one keeps up with the First Disciple himself. Addison — we chose well. Whatever wants to break us will have to break us both at the same time.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'We did. (quiet.) You felt my right hand drop, in the third round, and you knocked twice before I knew I was open. You always do. I never have to ask.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'And I never will make you ask, Add. I keep nothing for myself — so there is always a hand free for you.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Then we are settled. Whatever comes, old friend, we meet it the way we always have. Balanced.'}]},

 {title:'IV · THE DOUBLING', diff:1, opp:0, points:4, theme:'mul', rule:{tag:'overflow'},
  hpBeats:[
   {at:'e66', txt:'Why ADD against me? Every hit you land, I have already doubled.', col:FX.mul},
   {at:'e33', txt:'...that guard. You really did keep what I taught my son.', col:FX.mul, slow:true}],
  intro:[
   {w:'NARRATOR',c:N,t:'Then came the Doubling. Maximilian, Warlord of the Multiply, broke the Pact and grew his armies with no limit. Two became four. Four became more than the field could hold.'},
   {w:'NARRATOR',c:N,t:'He did not march. He piled up. Behind him the field filled the way a number runs away from you when no one stops to add it slow — every row folding into two, those two into four, the far edge doing math it could not pay for.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Why ADD when you can MULTIPLY?! More, and more, and MORE — watch them DOUBLE, initiate, watch the line behind me turn into a wall, into a sea, into a thing with no roof and no shame!'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Your Brotherhood sets down one brick a hundred years and calls it faith. I set down a thousand while you blink. THIS is growth. THIS is the only prayer that ever got an answer—'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'...wait. That stance. That careful little guard, hands kept close, nothing spent before it’s earned. Addison. My son — hiding among the cowards of the Plus?', slow:0.66, hold:26, sfx:'reveal', act:'recoil'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'You kept the guard I taught you and turned it AGAINST me. Of course you did. Of COURSE — wanting more runs in the family, boy, and you always wanted most the one thing I could never double: room between you and your own father.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'I am nothing of yours, father. I watched your ’more’ eat everything it touched — the land, the house, every last bit of my mother — a debt you never once paid, only multiplied, until there was nothing left to take.', slow:0.8},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'I did not run from you. I took you away. Clean. And then I learned to add — slow, honest — the exact opposite of how I was raised. That is the practice you’re sneering at. It is also the only door that ever held.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'You always did round down, boy. Always shaving yourself to fit inside a smaller number. Initiate — step up. Let me show you what your gentle teacher is too scared to become, before the Plus rounds you down too.'}],
  outro:[
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Beaten. By my own son’s student. The one no one can solve for, solving ME. There’s a kind of neatness to it I almost like.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'No matter. A product loses one factor and keeps its size in the rest. I have... other deals. Older deals. Quieter than I am.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'He’s stalling. He never stalls unless the real answer is somewhere we aren’t looking. Father — what deals.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Ask the Difference, initiate. Ask Lessing who he’s been dreaming of lately — what he’s been promised he could finally have. I haven’t beaten you here. I beat you somewhere you never thought to count.'},
   {w:'NARRATOR',c:N,t:'And he pulled back into his own doubling ranks, in no rush, a man leaving by a door he knew was already open. Addison said nothing. But his guard, for the first time, did not quite close.'}]},

 {title:'V · THE WHISPER', diff:2, opp:3, points:5, theme:'div', rule:{tag:'read'},
  intro:[
   {w:'NARRATOR',c:N,t:'Maximilian’s last words stuck in you like a splinter. He had talked about Lessing the way a man talks about something already in his pocket. So you went back to the only one who deals in things like that.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'You felt it too. Good. Then here is the number you came for, and I’ll give it to you whole, not split in two, which for me is like standing here with no clothes on: Maximilian has been whispering to your dear Lessing. For months.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Impossible. Lessing swore the oath again at the last carrying. I watched him sign it. Lessing would cut off his own hands before he took anything from this brotherhood.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'You say impossible the way a man says it to a row of numbers he’s already added up twice. You can feel the odds climbing against you, Addison. The crack opening under it. Say the harder word. Say unlikely, and watch the number climb.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Here is the lie, then, since you’ll need to hear it out loud before he says it back to you. Maximilian’s proof: that when you multiply with no top, no limit, the GAP grows bigger than the whole thing. Endlessly more left to take away. Forever.'},
   {w:'YOU',c:ME,t:'That’s wrong. The gap is part of the whole. It can’t be bigger than the thing it came out of.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Right — and you said it in one breath where scholars take three. It doesn’t balance. The two sides of that equation will never meet.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'And yet it was cut to fit Lessing’s empty space exactly: a lie shaped for a man who wants nothing. Hand him an endless nothing to take away, and call it everything.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Now prove to me you can still tell friend from enemy when the crack runs through both at once. This is about to turn into a very hard sum, beginner. Show me what’s left over.'}],
  outro:[
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'The kind part: Lessing is loyal. The true part: Lessing is already gone. I split the two apart for you, no charge. Do the math, beginner, and don’t round the leftover away just to feel better.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'I read his crack once myself. Measured the exact size of the empty space, the place where Minus wanted nothing. And I gave the number away for free, the way I give everything, just to see what hands would do with it. Maximilian’s hands took that measurement and cut the lie to match. Clean work. I do admire clean work.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'And here’s one number I’m not even charging for, because it scares me: Maximilian did not make up this lie. He hasn’t got the patience for fake proofs. He only wants to use them. Someone older handed it to him, already shaped.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'The number your coffee-stained note mentions at the bottom, the one nobody reads. The line at the very end of every page, where every other line is forced to add up to nothing. The note calls him the Solver. I’d tell you his name, but the Quotient does not say it out loud. After tonight, neither will I.'}]},

 {title:'VI · THE DECIMAL HERESY', diff:2, opp:0, points:5, theme:'mul', rule:{tag:'overflow'},
  intro:[
   {w:'NARRATOR',c:N,t:'The Multiply did not march. It piled up. Column by column, the Great Equation woke up owing numbers it had never said yes to.'},
   {w:'NARRATOR',c:N,t:'You came over the last ridge at a run, the prophecy note damp with sweat in your fist. Below, the Product had not built a camp. It had simply grown until there were more of it than the field could hold.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Still adding, new boy? While you carried your neat little ones, I doubled, and doubled, and doubled again. You count what you can hold. I count what I can BECOME.'},
   {w:'YOU',c:ME,t:'Whatever you sold Lessing is a lie. You don’t even believe it — someone fed it to YOU first.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'...Watch your decimals. You say it flat, like my son does, like the whole tiresome Plus — as if one small true thing could stand against a big one. It can’t. But you’re right about the lender.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'He came to me calm, with one flat line for a face. Told me the fastest road to the Overflow ran straight through the Difference’s hunger. I thought the math was mine.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'I thought I was borrowing HIS proof and never paying it back — the one debt I’d ever be glad to owe. Lately the column won’t add up. Lately I wonder who was the lender, and who was the loan. ...No matter. A product doesn’t ask where its first number came from.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'By the time you reach Lessing, he’s mine — carry the one, take the rest. And tell my son, hiding behind his neat little caution: a decimal point is just a wall no one has multiplied through yet.'}],
  outro:[
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Run to your Minus, then. Run. Take away every second you waste here from the time he has left — you’ll only get there in time to watch.'},
   {w:'YOU',c:ME,t:'You saw it just now. The flat-faced thing standing behind your sum. You’re not the warlord here — you’re just one number in someone else’s product.'},
   {w:'NARRATOR',c:N,t:'He laughed, huge and easy, and did not say no. Behind the laugh, for one quiet decimal, something in the Product remembered being multiplied by a hand it never saw.'}]},

 {title:'VII · THE DIFFERENCE’S BETRAYAL', diff:2, opp:2, points:5, theme:'mul',
  hpBeats:[
   {at:'e66', txt:'The doubling — it never stops. Why doesn’t it STOP?', col:FX.minus},
   {at:'e33', txt:'Wait. Take a part away... what’s left is LESS. It was always less.', col:FX.minus, sfx:'hollow', slow:true},
   {at:'e15', txt:'...the line never balanced. He cut the lie to fit me exactly.', col:FX.minus, sfx:'heart', slow:true, shake:0.18}],
  lose:'The Difference took you apart, clean — and somewhere under the lie, the man who taught you did not look away.',
  intro:[
   {w:'NARRATOR',c:N,t:'You found Lessing at the broken altar of the Difference, counting on his fingers in the dark. A man who had owned nothing his whole life, doing the sums he’d never once let himself do.'},
   {w:'NARRATOR',c:N,t:'He did not turn to greet you. That, more than anything, told you the column had already flipped its sign.'},
   {w:'LESSING, TURNED',c:FX.mul,t:'Maximilian showed me the proof, initiate. Let Multiply run with no end, and the DIFFERENCE grows BIGGER than the whole. Endlessly more for me to take away. Forever, with nothing left over.'},
   {w:'LESSING, TURNED',c:FX.mul,t:'I spent my life proud of wanting nothing. Do you understand what he offered me? A nothing so huge it OVERFLOWS. The first thing that ever fit the hole I dug on purpose.'},
   {w:'LESSING, TURNED',c:FX.mul,t:'Plus hid this from me. All those careful centuries, one slow brick a lifetime. Addison didn’t keep me honest. He kept me SMALL.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Lessing. That is not a proof. It’s a lie wearing one. The difference is what you TAKE — a piece cut out of the whole, so it can never be bigger than the thing you cut it from. It doesn’t even balance.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'We had a signal. The blind side, two taps, the one I trusted at my back for thirty years. Give it now. Tap, and tell me a number that doesn’t lie. ...Lessing. Tap.', slow:0.72, hold:64, quiet:true},
   {w:'LESSING, TURNED',c:FX.mul,t:'There is no signal anymore. There is only the doubling, and it never asks before it stops. Spoken like a man scared of his own ceiling, Addison. Step aside. The Difference takes you away now, initiate.', slow:0.86},
   {w:'NARRATOR',c:N,t:'You set your feet. Adding would only feed him; subtracting would meet him on his own ground and finish what the lie began. For the first time, holding the line would take more than one move. Only the one no one can solve could answer a turned friend without wiping him out.'}],
  outro:[
   {w:'LESSING, TURNED',c:FX.minus,t:'Wait. Hold — let me run it again. Difference bigger than the whole... no. Take a part away, what’s left is less. It was always less. That is what ’left’ MEANS.'},
   {w:'LESSING, TURNED',c:FX.minus,t:'The numbers. They don’t— they were never going to— he lied. Maximilian LIED to me. The line doesn’t balance. It was shaped to fit me. It was cut to my exact empty space.', slow:0.72, sfx:'hollow', music:'minus', act:'slump'},
   {w:'LESSING, TURNED',c:FX.minus,t:'I said nothing could turn me from Add. Nothing. And nothing is exactly what they sold me. I never even checked the sign.'},
   {w:'LESSING, TURNED',c:FX.minus,t:'What have I taken away?', slow:0.6, hold:84, quiet:true, sfx:'heart', act:'broken'}]},

 {title:'VIII · WHAT IS LEFT', diff:2, opp:2, points:5, theme:'minus', rule:{tag:'subtract'},
  intro:[
   {w:'NARRATOR',c:N,t:'A traitor who is sorry is still a traitor, and the blade in his hand has not heard the apology. Lessing could not be talked down - only added up.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'Don’t comfort me, beginner. Comfort adds. I am a man who has only ever known how to take away, and I won’t learn a new trick on the one day my count finally went below zero.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'I broke the oldest promise there is. You can’t make me whole again - forgiving is adding, and my count doesn’t run that way, and it shouldn’t. There’s only one honest thing left to take away: my shame. Through you, if you can do it.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'I see it now, what they did to me. I trained myself to want nothing - called it discipline, called it the proud empty count. It was a safe with the door open. The lie was just the first thing anyone ever set inside.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'A man who wants nothing has no guard against anything. I learned that one column too late. So take it from me, all of it, the way I taught you - exactly. Leave nothing false standing.'},
   {w:'YOU',c:ME,t:'You told me once - take only what you need, then count what’s left. I’ve been counting. I know exactly what’s false in you, and it isn’t much. Stand up. I’ll take it away, down to what’s true.'}],
  outro:[
   {w:'NARRATOR',c:N,t:'The Beginner did not strike to wound. He struck the way Lessing had once shown him - taking out only the false parts, one at a time, until the line could not be made any smaller.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'...What’s left, when everything false is taken away, is the truth. You left me the truth. Thank you. I had forgotten my own rule could be turned to heal a man instead of empty him.', slow:0.8, hold:38, sfx:'warm', music:'minus'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'I will stand with the Plus once more - and I will take Maximilian out of this world myself, if it’s the last thing the Difference ever removes.'},
   {w:'LESSING of the DIFFERENCE',c:FX.minus,t:'But hear me. You took the shame. You couldn’t take the subtraction itself - that I did, that I chose. That’s the one piece left over no enemy will ever lift from me, and I’d never let them.'},
   {w:'NARRATOR',c:N,t:'He stood up lighter, the way he always did - but not whole, and he knew it. Some difference never closes to zero. Lessing would fight at your side to the end and never quite forgive himself. He did not want to.'}]},

 {title:'INTERLUDE · THE BROKER’S PRICE', diff:2, opp:3, points:5, theme:'div',
  intro:[
   {w:'NARRATOR',c:N,t:'With Lessing brought back and Maximilian tearing toward the Overflow, you came back to the Schism. You had bought truths from Krishna before. This time you came to buy the man.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'You want the Divide to pick. To choose one side, after a whole life of selling clean to both. Do you know how much I’d have to NOT charge?'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'It’s worse than a fee, new blood. I am the line itself, the cut between the winners and the losers. Pick a side, and the line closes. I stop being the thing that splits, and turn into a thing that can BE split. Taken from. Spent.'},
   {w:'YOU',c:ME,t:'Maximilian will overflow the world. There won’t be two sides left to sell to.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'...A fair trade. You think I give truths away for fun. No. I give them away so I can watch from the line, never inside the total, never an amount anyone can take. Picking a side ends that. It turns me into a number. And numbers get balanced down to nothing.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Back in III I told you to keep the Schism close, that soon you’d need to know where the cracks ran. I never said the deepest crack was in me. The broker has been hiding inside his own ’I take no sides’ the whole time.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'So. The Schism names its price: prove the one no one can solve is worth solving for. Cut me, new blood. Nothing left over, not the smallest remainder. Cut me clean, and I am yours.'}],
  outro:[
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Hm. Split all the way down to the last decimal. Nothing left over anywhere, and I looked.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'Back in III I told you the truth I charge the most for: I can’t break you down. I’ve spent every interlude since trying to work you out, to shrink you to a neat little fraction I could put a price on and sell to the other side.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'And tonight I finally have the answer, and the answer is that there ISN’T one. You don’t break down. The unknown never lands on a number. THAT is the thing I am betting the Schism on, the one number no one at the bottom of the page can balance to zero.'},
   {w:'KRISHNA of the QUOTIENT',c:FX.div,t:'For once the Schism won’t play both sides. I stand with you. Not because it pays me. Because the line only balances one way now, and I have never once stood on the wrong side of a number.'}]},

 {title:'IX · THE COMPOUNDING', diff:2, opp:0, points:5, theme:'mul', rule:{tag:'overflow'},
  hpBeats:[
   {at:'e33', txt:'Slowed is not stopped! A number merely slowed is still GROWING!', col:FX.mul}],
  intro:[
   {w:'NARRATOR',c:N,t:'His lie out in the open, Maximilian quit recruiting and started flooding. No target, no limit — just more, betting that enough of anything can drown the truth.'},
   {w:'NARRATOR',c:N,t:'Across the valley the books bled red, then ran out of red. The Equation itself began to groan — columns it never agreed to owe, sums too big to carry, every line top-heavy and starting to tip.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'So the Difference wriggled off my hook. FINE. I don’t need followers anymore. I’ll make so much of everything that there’s no room left for your precious balance.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Count if you want, little robe. By the time you finish one number, I’ve DOUBLED it. By the time you carry, I’ve doubled the carry. There’s no solid ground left to count from.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'He’s doubling on the doubling. Past the line, the whole Equation spills over — and you can’t carry THAT. This isn’t a duel anymore. It’s a flood, and we’re the wall.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Initiate, you’re the only one who can add against him, take away his gains, split his speed, AND double him right back in one breath — all four at once. The margin note promised it. I never thought we’d NEED it. Hold him. Answer everything.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'My whole life I trained to grow without greed. He never taught me the other half — how to take something away from MYSELF, on purpose. There’s a door inside me I locked at the First Sum. Tonight it has to open.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Buy me this one fight. While you hold the line, I’ll learn the thing my father never could, and Plus never dared teach. To subtract myself. It’s the only answer to a man who won’t stop.'},
   {w:'YOU',c:ME,t:'Then I’ll be the wall. Go find your door.'}],
  outro:[
   {w:'NARRATOR',c:N,t:'You held. You added against his doubling, took away his gains, split his speed, then doubled it all back at him — four moves in one breath, just as the footnote promised. The flood broke against you and, for a moment, the columns stood.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'Hold me? You only SLOWED me. And a number that’s merely slowed is still... growing.'},
   {w:'MAXIMILIAN of the PRODUCT',c:FX.mul,t:'You bought your friend his quiet evening. Spend it well. There’s no sum that holds me, no break that cuts me in half — only a CEILING, and the sky has never built one.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'He’s right. Holding is just slower drowning. He needs a limit — a wall that doesn’t add, that just says no further. Tomorrow I’ll have learned to be it. Even if the wall is the part of me I take away.'}]},

 {title:'X · THE OVERFLOW', diff:2, opp:0, points:6, theme:'mul', cpuTier:3, rule:{tag:'overflow'},
  hpBeats:[
   {at:'e33', txt:'A number this big cannot LOSE. It cannot even be COUNTED!', col:FX.mul},
   {at:'e15', txt:'...carry the one. No. There is nothing left to carry it INTO.', col:FX.mul, sfx:'hollow', slow:true, shake:0.2}],
  lose:'The Overflow swallowed the field, and you with it. Addison never reached the door he meant to open.',
  intro:[
   {w:'NARRATOR',c:N,t:'Maximilian doubled himself one time too many. The world began to OVERFLOW — and at last the son stepped between his father and the edge.'},
   {w:'MAXIMILIAN, LEGION',c:FX.mul,t:'LOOK AT ME! I am a thousand of me! I am every coin that ever grew into more coins! I am the number too big to fit in the box!'},
   {w:'MAXIMILIAN, LEGION',c:FX.mul,t:'There is no roof high enough to call me a thief! No wall I have not split into more of me! Count me if you dare — I have run right off the END of the COLUMN!'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Listen to yourself, father. You are not a number anymore. You ran past the last spot the box can hold, and a number that does that does not turn mighty — it turns into an ERROR. A broken thing. The place where a value used to be, and isn’t.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'You spent your whole life learning to grow, father. You never once learned to STOP.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'A limit is not the wall you laughed at. It is the missing half of growing — the line that lets a number MEAN something instead of drowning it. You taught me to add. Tonight I teach you the move we both never learned.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'Initiate — lend me everything you have added, taken away, divided. Tonight, we teach him the limit.'}],
  outro:[
   {w:'NARRATOR',c:N,t:'The thousand of him grew fewer. The thousand columns folded back toward one, the way a flooded book of sums drains down to a single honest line — and for the first time in his life, Maximilian came to rest.'},
   {w:'MAXIMILIAN, LEGION',c:FX.mul,t:'...carry the... no. That cannot be right. I have... overflowed.'},
   {w:'ADDISON of the PLUS',c:FX.plus,t:'I am not taking you away to be rid of you, father. I am carrying you. To the one place a number this big is allowed to rest. That is the only taking-away I ever wanted to learn.', slow:0.7, hold:52, quiet:true, sfx:'heart', music:'plus', act:'slump'},
   {w:'MAXIMILIAN, LEGION',c:FX.mul,t:'Addison. You were always... the better move. I should have... added you up while I had the chance.', slow:0.58, hold:74, quiet:true, sfx:'heart', act:'broken'},
   {w:'YOU',c:ME,t:'I said nothing. I had been the one no one could solve for so long that I had forgotten a value could simply settle. I watched one finally land on something — and found it touched me more than I let on.'}]},

 {title:'XI · THE FINAL PROBLEM', diff:2, opp:'boss', points:7, theme:'james', cpuTier:3, rule:{tag:'zero'},
  hpBeats:[
   {at:'p50', txt:'Feel it? Every line you hold wants to fall to me. To zero.', col:FX.james},
   {at:'e33', txt:'Noise. Still so much noise. Reduce. Resolve.', col:FX.james},
   {at:'e15', txt:'...two sides. I only ever counted one. ...Ah.', col:FX.james, sfx:'toll', slow:true, shake:0.2}],
  lose:'Solomon balanced you down to nothing. For now. The unknown, the note says, can always be re-stated.',
  intro:[
   {w:'NARRATOR',c:N,t:'The greed undone, the Difference forgiven, the four orders gathered to fix the Pact. They came carrying their dead and their account books, and could not say which weighed more.'},
   {w:'NARRATOR',c:N,t:'And the figure at the bottom of the page — the one the margin note pointed to, the one Maximilian owned up to in the end — finally looked up from the line he had been keeping even since the first mark was made.'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'Plus. Minus. Times. Divide. So much work. So much... noise. You scribble, you carry, you cross things out. I sold one warlord a lie and let you wear yourselves out cleaning it up. Tidy.'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'A great church built one brick a century. A man who owned nothing, and so was so easy to fill. A son who buried his father; a leftover who cannot forgive himself. I did not have to break a single one of you. I only had to wait at the bottom of the column you were already falling down.'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'I am what every sum is trying to reach. I am the Solver. I am the Equals. That coffee ring on your precious note? You read all the way to the bottom of the page and stopped at a brown smudge. My name was the smudge. I have been sitting under it the whole time.', slow:0.72, sfx:'reveal', act:'loom'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'But I am not cruel. I can offer the one thing you have never had, unknown — an answer. A place you resolve to. Belong to. You could stop being the stranger in every room. Just hold still, and let me solve you. Wouldn’t that be a relief?', slow:0.74, shot:'them'},
   {w:'YOU',c:ME,t:'(it would. it really would.) ...No. A variable that resolves is just a number someone is finished with. I’d rather stay the question.', slow:0.76, hold:32, shot:'you', youAct:'recoil'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'I have come to boil you all down to one answer. The same answer everything reaches in the end. Nothing. Even the unknown — no, ESPECIALLY the unknown. The one no one could ever solve boils down cleanest of all. To zero. Hold still.', slow:0.66, hold:30, quiet:true, sfx:'dread', act:'loom'},
   {w:'YOU',c:ME,t:'Every sum has two sides. You only ever counted one.'}],
  outro:[
   {w:'YOU',c:ME,t:'Plus, to carry what I’d earned. Minus, to set down what I hadn’t. Divide, to find the crack in you. Multiply, to say no to a ceiling. Four sides. Cross out one, three are left. You never had enough zeroes.'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'...balanced. The sum holds. The unknown does not come out to zero after all.', slow:0.7, hold:40, sfx:'toll'},
   {w:'SOLOMON, the EQUALS',c:FX.james,t:'Maybe the answer was never a number. Maybe the answer was... you. I will not say it twice. I do not have to.'},
   {w:'NARRATOR',c:N,t:'And so the Pact was fixed. Addison forgave the Difference. Lessing never quite forgave himself — he kept the one number he could not take away, and called it the price he paid. And you — the one no method could solve — were left unsolved, exactly as a good unknown should be.'},
   {w:'NARRATOR',c:N,t:'Somewhere in a workbook so old the cover has forgotten its own rule, a coffee-stained margin note finally came true. The ring that had hidden Solomon’s name had dried to a pale circle, and the name under it had come to nothing.'},
   {w:'NARRATOR',c:N,t:'Beside it, in the same margin where the lie had once been kept, someone had written the answer in a steadier hand. It read: “It never came out to zero. — A.”', slow:0.82, hold:54, sfx:'warm', music:'plus'},
   {w:'NARRATOR',c:N,t:'THE END. Or the place it rests. Zeno held that the proof never finishes being written — that there is always one more line. No one alive has proven him wrong.'}]},
];
