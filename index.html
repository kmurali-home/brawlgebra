<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MODULUS</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body {
    height:100%; background:#04020a; color:#eee;
    font-family:"Segoe UI",system-ui,sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  #wrap {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:10px;
    background:
      radial-gradient(1300px 700px at 50% -12%, #220a38 0%, transparent 60%),
      radial-gradient(900px 500px at 50% 115%, #2a0818 0%, transparent 55%),
      #04020a;
  }
  #frame {
    position:relative; width:min(96vw, 162vh); aspect-ratio:16/9;
    border-radius:12px; padding:3px;
    background:linear-gradient(160deg,#3d1a5e,#171029 40%,#3d1430);
    box-shadow:0 0 60px rgba(70,20,120,.45), 0 18px 50px rgba(0,0,0,.6);
  }
  #game { width:100%; height:100%; display:block; border-radius:9px; background:#000; }
  #hint {
    font-size:12px; color:#6f5f86; letter-spacing:.4px; text-align:center;
  }
  kbd {
    background:#1c1130; border:1px solid #3d2658; border-bottom-width:2px;
    border-radius:4px; padding:1px 6px; font-size:11px; color:#cabbe0; margin:0 1px;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="frame"><canvas id="game"></canvas></div>
  <div id="hint">
    <kbd>←</kbd><kbd>→</kbd> move (2×tap = dash) · <kbd>↑</kbd> jump · <kbd>↓</kbd> block (↓+↑ drop)
    &nbsp;|&nbsp; answer + <kbd>⏎</kbd> to refill <b>AURA</b> &amp; slip &nbsp;|&nbsp; <kbd>M</kbd> music · <kbd>P</kbd> pause
  </div>
</div>

<script>
"use strict";
//======================================================================
//  MODULUS — the one no one can solve. A fighter where the mind is the blade.
//  Single file, Canvas 2D, zero dependencies. Double-click to play.
//======================================================================
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");
const W = 960, H = 540;            // logical resolution
const WORLD_W = 2200;              // war-field arena — room to hide, scavenge, outplay
const GROUND = 470;                // world y of the floor
let S = 1;                         // backing-store scale (dpr-aware)

function fitCanvas(){
  const w = cv.clientWidth|0, h = cv.clientHeight|0, d = window.devicePixelRatio||1;
  if(cv.width !== Math.round(w*d) || cv.height !== Math.round(h*d)){
    cv.width = Math.round(w*d); cv.height = Math.round(h*d);
  }
  S = cv.width / W;
  ctx.setTransform(S,0,0,S,0,0);
}

//----------------------------------------------------------------------
// Utils & easing
//----------------------------------------------------------------------
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const lerp  = (a,b,t)=> a+(b-a)*t;
// seeded RNG — the Daily Challenge routes problem generation through it so the math is identical all day
let _mrng=null, _mathSeq=false;
function mulberry32(s){ return function(){ s|=0; s=s+0x6D2B79F5|0; let t=Math.imul(s^s>>>15,1|s); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const rnd   = (a,b)=> a + Math.floor(((_mathSeq&&_mrng)?_mrng():Math.random())*(b-a+1));
const frnd  = (a,b)=> a + Math.random()*(b-a);
const eoCubic = t=> 1-Math.pow(1-t,3);
const eoBack  = t=> { const c=1.70158, c3=c+1; return 1 + c3*Math.pow(t-1,3) + c*Math.pow(t-1,2); };
const bounce  = t=> { const n=7.5625, d=2.75;
  if(t<1/d) return n*t*t;
  if(t<2/d) return n*(t-=1.5/d)*t+.75;
  if(t<2.5/d) return n*(t-=2.25/d)*t+.9375;
  return n*(t-=2.625/d)*t+.984375; };
function shade(hex, f){ // f -1..1
  const n = parseInt(hex.slice(1),16);
  let r=n>>16, g=(n>>8)&255, b=n&255;
  if(f<0){ r*=1+f; g*=1+f; b*=1+f; } else { r+=(255-r)*f; g+=(255-g)*f; b+=(255-b)*f; }
  return `rgb(${r|0},${g|0},${b|0})`;
}
function hexA(hex, a){ // hex colour → rgba with alpha
  const n=parseInt(hex.slice(1),16); return `rgba(${n>>16},${(n>>8)&255},${n&255},${a})`;
}
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
const DISP = '900 %spx "Arial Black","Avenir Next Condensed",Impact,sans-serif';
const MONO = '700 %spx ui-monospace,Menlo,Consolas,monospace';
function font(tmpl,size){ return tmpl.replace('%s',size); }
function txtO(s,x,y,size,fill,o={}){
  ctx.save();
  ctx.font = font(o.mono?MONO:DISP, size);
  ctx.textAlign = o.align||'center'; ctx.textBaseline = o.base||'alphabetic';
  ctx.globalAlpha = (o.alpha==null?1:o.alpha) * ctx.globalAlpha;
  if(o.sw!==0){ ctx.lineWidth = o.sw||Math.max(3,size/9); ctx.lineJoin='round';
    ctx.strokeStyle = o.stroke||'#0a0814'; ctx.strokeText(s,x,y); }
  ctx.fillStyle = fill; ctx.fillText(s,x,y);
  ctx.restore();
}

//----------------------------------------------------------------------
// Audio — tiny synth + a moody half-time loop, all WebAudio.
//----------------------------------------------------------------------
let AC=null, masterG=null, sfxG=null, musG=null, noiseB=null;
let impactBus=null, verbC=null, verbG=null;   // impact send + a short convolution reverb so hits sit in a space, not bone-dry
// ─── REAL-ART PIPELINE ───────────────────────────────────────────────────────
// Drop PNGs into an `assets/` folder next to index.html and they're used automatically;
// if a file is absent the game falls back to the procedural look (nothing breaks).
// Supported now: per-stage painted backdrops `assets/bg_<stageId>.png` (ids: pit, frost, schism, forge, void, proving)
// and an optional `assets/title.png` logo. See assets/README.md for the full spec.
const IMG = {};
function loadImg(name, src){ if(typeof Image==='undefined') return;
  const im=new Image(); im.onload=()=>{ if(im.naturalWidth>0) IMG[name]=im; }; im.onerror=()=>{}; im.src=src; }
function loadAssets(){
  if(typeof document==='undefined') return;
  try{ for(const s of STAGES) loadImg('bg_'+s.id, 'assets/bg_'+s.id+'.png'); loadImg('title','assets/title.png'); }catch(e){}
}
let musicMuted=false;
const MUS = {step:0, next:0, bpm:132, t:null};
// Each order has its own original, procedurally-generated theme.
//  bass = root progression (Hz, 0 = rest), wave/cut = bass timbre,
//  pad = sustained chord, kick = which 8th-steps thump, dbl = excess double-kick,
//  hat = hi-hat density, evil = darker kick, sparse = strip the snare, toll = boss bell.
const MUSIC_THEMES = {
  default: {bpm:132, bass:[55,55,65.41,49],        wave:'sawtooth', cut:300, pad:[110,130.8,164.8],     padCut:520, kick:[0,6],     dbl:false, hat:1.0, vol:1.0, detune:7},
  // PLUS — noble, measured, warm major. Growth with caution.
  plus:    {bpm:116, bass:[65.41,65.41,98,87.31],  wave:'triangle', cut:430, pad:[130.8,164.8,196],     padCut:700, kick:[0,4,6],   dbl:false, hat:0.7, vol:1.0, detune:4},
  // MINUS — austere, hollow open fifths, half the notes removed. Subtraction.
  minus:   {bpm:92,  bass:[55,0,55,0],             wave:'sine',     cut:240, pad:[110,164.8],           padCut:360, kick:[0],       dbl:false, hat:0.2, vol:0.85,detune:2, sparse:true},
  // DIVIDE — scheming, syncopated, ambiguous quartal/diminished. The betrayer.
  div:     {bpm:138, bass:[58.27,69.3,46.25,61.74],wave:'square',   cut:520, pad:[116.5,155.6,196,233], padCut:780, kick:[0,3,5,6], dbl:false, hat:1.2, vol:0.95,detune:10, swing:true},
  // MULTIPLY — EVIL. Fast, driving double-kick, tritone dissonance, reckless excess.
  mul:     {bpm:152, bass:[55,55,58.27,55],        wave:'sawtooth', cut:760, pad:[110,155.6,164.8,220], padCut:980, kick:[0,2,4,6], dbl:true,  hat:1.5, vol:1.1, detune:16, evil:true},
  // SOLOMON — the Equals. Slow, grand, dread; deep tritone toll. The final answer.
  james:   {bpm:78,  bass:[43.65,43.65,61.74,41.2],wave:'sawtooth', cut:330, pad:[87.31,123.47,130.8],  padCut:540, kick:[0],       dbl:false, hat:0.25,vol:1.1, detune:6, evil:true, toll:true},
};
function setMusic(key){
  const th = MUSIC_THEMES[key] || MUSIC_THEMES.default;
  if(MUS.t===th) return;
  MUS.t = th; MUS.bpm = th.bpm;
}
function audio(){
  if(!AC){
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      masterG = AC.createGain(); masterG.gain.value = 0.85; masterG.connect(AC.destination);
      sfxG = AC.createGain(); sfxG.gain.value = 1; sfxG.connect(masterG);
      musG = AC.createGain(); musG.gain.value = 0.4; musG.connect(masterG);
      const n = AC.sampleRate*1.2, buf = AC.createBuffer(1,n,AC.sampleRate), d = buf.getChannelData(0);
      for(let i=0;i<n;i++) d[i] = Math.random()*2-1;
      noiseB = buf;
      // REVERB BUS — a short synthesized impulse (stone-arena decay) so impacts breathe instead of clicking dry
      const rn = (AC.sampleRate*0.34)|0, ir = AC.createBuffer(2, rn, AC.sampleRate);
      for(let ch=0; ch<2; ch++){ const c = ir.getChannelData(ch);
        for(let i=0;i<rn;i++){ const env = Math.pow(1 - i/rn, 2.6); c[i] = (Math.random()*2-1)*env; } }
      verbC = AC.createConvolver(); verbC.buffer = ir; verbC.connect(sfxG);
      verbG = AC.createGain(); verbG.gain.value = 0.34; verbG.connect(verbC);   // wet send level
      impactBus = AC.createGain(); impactBus.gain.value = 1; impactBus.connect(sfxG); impactBus.connect(verbG); // dry + wet
      MUS.next = AC.currentTime + 0.1;
      applyVolumes(); // honor persisted sliders no matter how the AC was woken
    }catch(e){}
  }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
function tone(type,f0,dur,vol,{f1,bus,at=0.004,curve=2}={}){
  if(!AC) return;
  const t0 = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f0,t0);
  if(f1) o.frequency.exponentialRampToValueAtTime(Math.max(20,f1), t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(vol,t0+at);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g).connect(bus||sfxG);
  o.start(t0); o.stop(t0+dur+0.02);
}
function hiss(dur,vol,{lo=300,hi=3000,bus}={}){
  if(!AC||!noiseB) return;
  const t0 = AC.currentTime;
  const src = AC.createBufferSource(); src.buffer = noiseB;
  const f = AC.createBiquadFilter(); f.type='bandpass';
  f.frequency.value = Math.sqrt(lo*hi); f.Q.value = 0.7;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  src.connect(f).connect(g).connect(bus||sfxG);
  src.start(t0); src.stop(t0+dur+0.02);
}
const SFX = {
  ui(){ tone('square',540,0.05,0.06); },
  whoosh(){ hiss(0.10,0.05,{lo:500,hi:2400}); },
  hit(){ const B=impactBus||sfxG;            // layered: low thud + mid body + transient crack, sent to the reverb space
    tone('sine',155,0.13,0.24,{f1:48,bus:B}); tone('triangle',300,0.07,0.12,{f1:150,bus:B}); hiss(0.05,0.18,{lo:1800,hi:6500,bus:B}); },
  heavy(){ const B=impactBus||sfxG;          // deeper thud + body + click + a sharper crack
    tone('sine',120,0.26,0.36,{f1:38,bus:B}); tone('triangle',210,0.12,0.18,{f1:88,bus:B}); tone('square',80,0.07,0.10,{bus:B}); hiss(0.07,0.24,{lo:1500,hi:6000,bus:B}); },
  block(){ tone('square',240,0.06,0.10); tone('square',360,0.05,0.07); hiss(0.04,0.08,{lo:2000,hi:6000}); },
  correct(){ tone('triangle',660,0.08,0.09); setTimeout(()=>tone('triangle',880,0.10,0.09),55); },
  perfect(){ [523,784,1046,1568].forEach((f,i)=> setTimeout(()=>tone('triangle',f,0.10,0.10),i*42));
             hiss(0.25,0.05,{lo:3000,hi:9000}); tone('sine',90,0.25,0.16,{f1:50}); },
  wrong(){ tone('sawtooth',130,0.24,0.14,{f1:62}); hiss(0.07,0.10,{lo:200,hi:900}); },
  fizzle(){ tone('square',110,0.09,0.09,{f1:68}); hiss(0.05,0.05,{lo:100,hi:420}); },
  pickup(){ tone('triangle',880,0.07,0.09); setTimeout(()=>tone('triangle',1320,0.09,0.08),50); },
  spend(){ tone('square',290,0.045,0.05,{f1:210}); },
  charge(){ tone('sawtooth',140,0.45,0.10,{f1:760}); },
  special(){ const B=impactBus||sfxG; hiss(0.3,0.14,{lo:200,hi:1400,bus:B}); tone('sawtooth',180,0.5,0.14,{f1:900,bus:B}); tone('sine',110,0.3,0.20,{f1:48,bus:B}); },
  jump(){ hiss(0.06,0.03,{lo:600,hi:2000}); },
  land(){ hiss(0.06,0.06,{lo:120,hi:500}); },
  ko(){ const B=impactBus||sfxG; tone('sine',200,0.8,0.36,{f1:38,bus:B}); tone('sine',70,0.7,0.26,{f1:30,bus:B}); hiss(0.5,0.20,{lo:150,hi:1200,bus:B}); duckMusic(); },
  round(){ tone('sine',110,0.3,0.3,{f1:55}); hiss(0.2,0.1,{lo:100,hi:600}); },
  fight(){ tone('sine',130,0.25,0.34,{f1:60}); hiss(0.25,0.16,{lo:400,hi:3000}); },
};
function duckMusic(){
  if(!AC||!musG) return;
  musG.gain.cancelScheduledValues(AC.currentTime);
  musG.gain.setValueAtTime(0.1, AC.currentTime);
  musG.gain.linearRampToValueAtTime(musicMuted?0:settings.music*0.8, AC.currentTime+1.6);
}
// ---- CUTSCENE DIRECTION: sustained music ducking + per-line emotional stingers (synth-only, no assets) ----
function musicDuckHold(){ if(!AC||!musG) return; musG.gain.cancelScheduledValues(AC.currentTime); musG.gain.linearRampToValueAtTime(0.012, AC.currentTime+0.5); }
function musicRestore(){ if(!AC||!musG) return; musG.gain.cancelScheduledValues(AC.currentTime); musG.gain.linearRampToValueAtTime(musicMuted?0:settings.music*0.8, AC.currentTime+0.9); }
const STINGERS={
  taps(){ tone('square',300,0.05,0.08); setTimeout(()=>{try{tone('square',300,0.05,0.08);}catch(e){}},150); },            // the blind-side signal: tap, tap
  hollow(){ tone('sine',98,0.9,0.15,{f1:58}); hiss(0.5,0.03,{lo:80,hi:360}); },                                          // a gut goes hollow
  heart(){ tone('sine',74,0.34,0.17,{f1:46}); },                                                                         // one low heartbeat
  warm(){ tone('triangle',392,0.5,0.07,{f1:523}); tone('triangle',523,0.6,0.05,{f1:659}); },                            // a small warmth returns
  reveal(){ tone('sawtooth',220,0.18,0.10,{f1:660}); setTimeout(()=>{try{tone('sine',55,1.1,0.16,{f1:40});}catch(e){}},120); }, // a bright catch, then the floor drops out
  toll(){ tone('sawtooth',58.3,1.7,0.17,{f1:41.2}); tone('sine',43.65,1.7,0.12); hiss(0.7,0.04,{lo:50,hi:240}); },       // the Equals tolls at the bottom of the page
  dread(){ tone('sawtooth',46,1.4,0.13,{f1:38}); hiss(0.8,0.04,{lo:60,hi:280}); },                                       // dread rises
};
function playStinger(k){ if(!k) return; audio(); const s=STINGERS[k]; if(s){ try{ s(); }catch(e){} } }
function sfxSolveOp(op){   // DIEGETIC: each operation has its own little sound, so you HEAR which function you solved
  if(!AC) return;
  try{
    if(op==='+'){ tone('triangle',523,0.07,0.045); setTimeout(()=>tone('triangle',659,0.09,0.045),58); }      // rising third — carry up
    else if(op==='−'){ tone('triangle',587,0.07,0.045); setTimeout(()=>tone('triangle',440,0.10,0.045),58); } // falling — take away
    else if(op==='×'){ tone('square',392,0.06,0.04); setTimeout(()=>tone('square',784,0.09,0.045),52); }       // octave up — doubling
    else if(op==='÷'){ tone('sine',680,0.06,0.04); setTimeout(()=>tone('sine',510,0.09,0.04),48); }            // split interval — division
  }catch(e){}
}
function musicTick(){
  if(!AC || musicMuted) return;
  const sd = 60/MUS.bpm/2; // 8th notes
  while(MUS.next < AC.currentTime + 0.18){
    schedStep(MUS.step, MUS.next);
    MUS.next += sd; MUS.step = (MUS.step+1)%32;
  }
}
function schedStep(i,t){
  const T = MUS.t || MUSIC_THEMES.default;
  const bar = i>>3, s = i&7;
  if(T.swing && (s%2===1)) t += (60/MUS.bpm/2)*0.16;                  // shuffle the off-beats
  const kick = (f0,vol)=>{ const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine'; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(36,t+0.16);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
    o.connect(g).connect(musG); o.start(t); o.stop(t+0.25); };
  const nz = (dur,vol,fq,type)=>{ const src=AC.createBufferSource(); src.buffer=noiseB;
    const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=fq;
    const g=AC.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.connect(f).connect(g).connect(musG); src.start(t); src.stop(t+dur+0.02); };
  // drums
  if(T.kick.includes(s)) kick(T.evil?96:115, 0.5*T.vol);
  if(T.dbl && (s===1||s===5)) kick(118, 0.26*T.vol);                  // excess double-kick
  if(s===4 && !T.sparse){ nz(0.12,0.10*T.vol,1500,'bandpass'); kick(180,0.12); }  // snare
  if(Math.random() < T.hat*0.9) nz(0.035, s%2?0.012:0.022, 7000,'highpass');      // hats by density
  // bass
  const bn = T.bass[bar%T.bass.length];
  if(bn>0 && (s===0||s===3||s===6)){
    const o=AC.createOscillator(),f=AC.createBiquadFilter(),g=AC.createGain();
    o.type=T.wave; o.frequency.value=bn;
    f.type='lowpass'; f.frequency.value=T.cut;
    g.gain.setValueAtTime(0.13*T.vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
    o.connect(f).connect(g).connect(musG); o.start(t); o.stop(t+0.26);
  }
  if(i===0){                                                          // sustained pad, once per phrase
    T.pad.forEach(fq=>{
      const o=AC.createOscillator(),f=AC.createBiquadFilter(),g=AC.createGain();
      o.type = T.evil?'sawtooth':'triangle'; o.frequency.value=fq; o.detune.value=frnd(-T.detune,T.detune);
      f.type='lowpass'; f.frequency.value=T.padCut;
      g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.017*T.vol,t+0.8);
      g.gain.linearRampToValueAtTime(0.0001,t+3.4);
      o.connect(f).connect(g).connect(musG); o.start(t); o.stop(t+3.5);
    });
    if(T.toll){                                                       // Solomon — the deep tritone bell
      const o=AC.createOscillator(),g=AC.createGain();
      o.type='sine'; o.frequency.value=T.bass[0]/2;
      g.gain.setValueAtTime(0.13,t); g.gain.exponentialRampToValueAtTime(0.0001,t+2.6);
      o.connect(g).connect(musG); o.start(t); o.stop(t+2.7);
    }
  }
}
//----------------------------------------------------------------------
// Input — digits feed the math buffer, letters drive the fighter.
//----------------------------------------------------------------------
const keys = {};
let ans1 = "", ans2 = "";
const game = {state:'title', frame:0, paused:false};
const mouse = {x:0,y:0};
function store(k,v){ try{ localStorage.setItem('mk_'+k, JSON.stringify(v)); }catch(err){} }
function load(k,d){ try{ const v=localStorage.getItem('mk_'+k); return v===null? d : JSON.parse(v); }catch(err){ return d; } }
// Single-player layout: right hand on the ARROW keys (move/jump/block), left hand on A/S/D (attacks).
const KEYS = Object.assign({left:'arrowleft',right:'arrowright',jump:'arrowup',block:'arrowdown',punch:'a',kick:'s',special:'d'}, load('keys2',{}));
const keyLabel=k=>({arrowleft:'←',arrowright:'→',arrowup:'↑',arrowdown:'↓',' ':'SPC'}[k]||String(k).toUpperCase());
const settings = Object.assign({music:0.5, sfx:1, shake:1, flash:1, mathDiff:-1, hazards:1}, load('settings',{}));
function applyVolumes(){
  if(musG) musG.gain.value = musicMuted? 0 : settings.music*0.8;
  if(sfxG) sfxG.gain.value = settings.sfx;
}

addEventListener("keydown", e => {
  audio(); applyVolumes();
  if(game.state==='splash'){ game.state='title'; return; }   // skippable studio bumper
  const k = e.key, lk = k.toLowerCase(), code = e.code;
  if(game.trailerMode){ exitTrailer(); SFX.ui(); return; }   // any key stops the auto-trailer
  if(lk==='v' && ['fight','intro','title','select','story','ko','matchend','modes'].includes(game.state)){   // CINEMATIC SHOWCASE — clean frame + both sides auto-fight, for hands-free trailer capture

// ---- GAMEPAD: a connected controller is translated into the SAME synthetic key events, so movement / dash / jump / attacks / menus all work unchanged ----
const _padPrev={};
function pollGamepad(){
  if(!navigator.getGamepads) return;
  let gp=null; const pads=navigator.getGamepads(); if(pads) for(const p of pads){ if(p){ gp=p; break; } }
  if(!gp) return;
  const b=i=>!!(gp.buttons[i]&&gp.buttons[i].pressed), ax=gp.axes[0]||0, ay=gp.axes[1]||0, K=KEYS;
  const map={};
  map[K.left]=b(14)||ax<-0.45;  map[K.right]=b(15)||ax>0.45;                 // d-pad / left-stick X
  map[K.jump]=b(0)||b(12)||ay<-0.55;                                        // A / d-pad up / stick up
  map[K.block]=b(13)||b(4)||b(6)||ay>0.55;                                  // d-pad down / LB / LT / stick down
  map[K.punch]=b(2); map[K.kick]=b(3); map[K.special]=b(1)||b(5);           // X punch · Y kick · B/RB special
  map['Enter']=b(9)||b(7);                                                  // Start / RT → confirm / submit
  for(const key in map){
    const now=map[key], was=!!_padPrev[key];
    if(now&&!was){ try{ dispatchEvent(new KeyboardEvent('keydown',{key:key})); }catch(e){} }        // press edge → keydown (dash double-tap, buffering, menus all handled by the existing listener)
    else if(!now&&was){ try{ dispatchEvent(new KeyboardEvent('keyup',{key:key})); }catch(e){} }      // release edge → keyup
    _padPrev[key]=now;
  }
}

const DIFF = {
  level:1, names:['EASY','NORMAL','HARD'],
  taglines:['arithmetic warm-up','mental-math sprint','algebra · fractions · negatives'],
  set(n){ this.level=n; SFX.ui(); },
  cpu(){ const lv=(game.mode==='story'&&game.cpuTier!=null)?game.cpuTier:this.level; return [
    // react = frames of reaction lag (lower = faster = harder, more punishing); burstReact = frames you can combo before it breaks out; baitP = chance to feint
    {telMul:1.5, cool:[110,180], dmgMul:0.75, speed:1.4, regen:0.10, react:20, burstReact:999, baitP:0.00},
    {telMul:1.0, cool:[70,130],  dmgMul:1.0,  speed:1.9, regen:0.17, react:13, burstReact:40,  baitP:0.05},
    {telMul:0.65,cool:[45,90],   dmgMul:1.3,  speed:2.4, regen:0.26, react:8,  burstReact:22,  baitP:0.10},
    {telMul:0.58,cool:[42,84],   dmgMul:1.3,  speed:2.5, regen:0.27, react:6,  burstReact:14,  baitP:0.12},  // TIER 3 — the climactic foes (Overflow, the Equals) react fastest; math stays at the chapter's level for fairness
  ][lv]; },
};
// Escalating math: tier grows with difficulty AND within a round (heat), unlocking
// bigger operands, two-step expressions, squares and 2-digit×2-digit. Answers stay
// ≤ ~625 (the 3-digit input cap). EASY starts on pure +/− and eases × in slowly.
// STORY math focus: the operation you're fighting ABOUT. The teaching chapters drill
// ONE function (Addison→+, Lessing→−, Krishna→÷, Maximilian→×); the mix widens as you
// learn more, until the boss throws every function — and mixed expressions — at you.
const STORY_MATH = [
  ['add'],                       // 0  PROLOGUE · Plus
  ['add'],                       // 1  I · Plus
  ['sub'],                       // 2  II · Difference
  ['div'],                       // 3  III · Schism
  ['add','sub'],                 // 4  INTERLUDE · Add + Subtract, the two halves of balance
  ['mul'],                       // 5  IV · The Doubling (Maximilian)
  ['div','add','sub'],           // 6  V · The Whisper (Krishna — you now know +, −, ÷)
  ['mul','add'],                 // 7  VI · The Decimal Heresy (Maximilian)
  ['sub','mul'],                 // 8  VII · The Difference's Betrayal (Lessing, ×-corrupted)
  ['sub','add','div'],           // 9  VIII · What Is Left (Lessing, redeemed)
  ['div','add','sub','mul'],     // 10 INTERLUDE · The Broker's Price (everything in play)
  ['mul','add','sub','div'],     // 11 IX · The Compounding
  ['mul','add','sub','div'],     // 12 X · The Overflow
  ['all'],                       // 13 XI · The Final Problem — all functions + mixed expressions
];
function storyForms(ci, lvl, tier){
  const base = STORY_MATH[ci] || ['all'];
  if(base[0]==='all'){                              // boss — full arithmetic onslaught + the GEBRA
    const f=['add','sub','mul','div'];
    if(tier>=2) f.push('mul','div','square','solvex');
    if(tier>=3) f.push('step2','mulbig','solvex');
    if(tier>=4) f.push('step2','square','frac');
    return f;
  }
  const f=[...base];                                // stay within this chapter's functions
  if(base.includes('mul')){ if(tier>=2) f.push('square'); if(tier>=3) f.push('mulbig'); }
  return f;
}
const FORM_OP={add:'+',sub:'−',mul:'×',mulbig:'×',div:'÷',square:'×',frac:'÷',negsub:'−',dec:'×',pct:'×',oop:'×',solvex:'×',step2:'+'}; // form → operation, for OP FOCUS
function newProblem(heat){
  _mathSeq=true;                                   // draw from the seeded stream while it's set (Daily)
  // SPACED REPETITION: re-serve a recently-missed problem ~30% of the time (never in the seeded Daily)
  if(!game.daily && game.missQ && game.missQ.length && Math.random()<0.3){
    const p=game.missQ.shift(); _mathSeq=false; game.problemAt=game.frame; return p;
  }
  if(game.daily){ game.dailyN=(game.dailyN||0)+1; heat=Math.min(8,Math.floor(game.dailyN/3)); } // deterministic ramp
  // math difficulty can be decoupled from foe difficulty (Settings → MATH DIFFICULTY);
  // story keeps its curated per-chapter level; Daily is a fixed challenge for everyone.
  const lvl = game.daily? 2 : ((game.mode!=='story' && settings.mathDiff>=0) ? settings.mathDiff : DIFF.level);
  // ADAPTIVE: a persisted skill estimate nudges difficulty to meet the player (NOT in story/daily — authored/fixed there)
  const adapt = (game.mode==='story'||game.daily) ? 0 : Math.round(clamp(((game.skill||0.5)-0.5)*6, -2, 3));
  const tier = Math.max(0, lvl*2 + Math.floor(heat/2) + adapt);   // ramps with the round AND the player's skill
  const addBig = Math.min(8 + tier*4, 99);
  const mulA   = Math.min(3 + tier, 9 + lvl*3);
  const mulB   = Math.min(3 + Math.floor(tier/2), 9);
  let forms;
  if(game.mode==='story' && typeof game.storyCh==='number' && game.storyCh>=0){
    forms = storyForms(game.storyCh, lvl, tier);    // math themed to the chapter you're fighting
  } else {
    forms = ['add','sub'];
    if(lvl>=1) forms.push('mul','div'); else if(tier>=3) forms.push('mul');   // EASY: × only after warming up
    if(lvl>=2){ forms.push('mul','step2','solvex','negsub'); if(tier>=4) forms.push('mulbig','square','step2','solvex','frac','negsub','dec'); }  // HARD earns the GEBRA: solve-for-x, fractions, negatives, decimals
    else if(lvl>=1 && tier>=4) forms.push('step2','square','solvex','negsub');        // NORMAL hot: a taste of algebra + going below zero
    if(tier>=6) forms.push('pct','oop','mulbig');     // a skilled player (adaptive) earns true upper-tier work
  }
  // OP FOCUS: the player can bias the stream toward one operation (to arm a chosen Function Strike on demand)
  if(game.focusOp && !game.daily && game.mode!=='story' && Math.random()<0.66){
    const ff=forms.filter(x=>FORM_OP[x]===game.focusOp); if(ff.length) forms=ff;
  }
  const f = forms[rnd(0,forms.length-1)];
  let a,b,c,ans,text,op='+';   // op = the operation this problem trains → arms the matching Function Strike
  if(f==='add'){ a=rnd(2,addBig); b=rnd(2,addBig); ans=a+b; text=a+' + '+b; op='+'; }
  else if(f==='sub'){ a=rnd(2,addBig); b=rnd(2,a); ans=a-b; text=a+' − '+b; op='−'; }
  else if(f==='mul'){ a=rnd(2,mulA); b=rnd(2,mulB); ans=a*b; text=a+' × '+b; op='×'; }
  else if(f==='mulbig'){ a=rnd(11,Math.min(29,12+tier)); b=rnd(3,Math.min(19,6+lvl*4)); ans=a*b; text=a+' × '+b; op='×'; }
  else if(f==='div'){ b=rnd(2,9+lvl*2); ans=rnd(2,Math.min(20,6+tier)); a=b*ans; text=a+' ÷ '+b; op='÷'; }
  else if(f==='square'){ a=rnd(4,Math.min(25,8+tier*2)); ans=a*a; text=a+'²'; op='×'; }
  else if(f==='solvex'){                            // SOLVE FOR X — algebra, integer answer
    const k=rnd(0,3);
    if(k===0){ const x=rnd(2,addBig), n=rnd(2,addBig); ans=x; text='x + '+n+' = '+(x+n)+',   x'; op='+'; }
    else if(k===1){ const x=rnd(3,addBig), n=rnd(2,x-1); ans=x; text='x − '+n+' = '+(x-n)+',   x'; op='−'; }
    else if(k===2){ const m=rnd(2,9), x=rnd(2,Math.min(12,4+tier)); ans=x; text=m+'x = '+(m*x)+',   x'; op='÷'; }
    else { const m=rnd(2,9), x=rnd(2,Math.min(10,3+tier)), n=rnd(2,addBig); ans=x; text=m+'x + '+n+' = '+(m*x+n)+',   x'; op='×'; }
  }
  else if(f==='frac'){                              // FRACTION OF A QUANTITY — clean integer answer
    const fr=[['½',2,1],['¼',4,1],['¾',4,3],['⅓',3,1],['⅔',3,2]][rnd(0,4)];
    const q=fr[1], p=fr[2], N=q*rnd(2,Math.min(12,4+tier));
    ans=N*p/q; text=fr[0]+' of '+N; op='÷';
  }
  else if(f==='negsub'){                            // GOES BELOW ZERO — negative answer (type − to flip sign)
    a=rnd(2,Math.min(40,10+tier*3)); b=rnd(a+1, a+Math.min(40,10+tier*3)); ans=a-b; text=a+' − '+b; op='−';
  }
  else if(f==='dec'){                               // DECIMALS — clean answers (type . for the point)
    const k=rnd(0,2);
    if(k===0){ a=rnd(3,15); ans=a*0.5; text=a+' × 0.5'; op='×'; }
    else if(k===1){ a=rnd(2,12); ans=a*0.25; text=a+' × 0.25'; op='×'; }
    else { a=rnd(1,9); b=rnd(1,9); ans=a+b+0.5; text=a+'.5 + '+b; op='+'; }
  }
  else if(f==='pct'){                               // PERCENT OF A QUANTITY — clean integer (N is a multiple of 20)
    const p=[10,20,25,50,75][rnd(0,4)], N=20*rnd(2,Math.min(10,3+tier));
    ans=N*p/100; text=p+'% of '+N; op='×';
  }
  else if(f==='oop'){                               // ORDER OF OPERATIONS — a + b×c (precedence matters)
    a=rnd(2,Math.min(20,8+tier)); b=rnd(2,Math.min(9,3+Math.floor(tier/2))); c=rnd(2,9);
    ans=a+b*c; text=a+' + '+b+' × '+c; op='×';
  }
  else {                                            // two-step, non-negative
    const k=rnd(0,2);
    if(k===0){ a=rnd(2,addBig); b=rnd(2,addBig); c=rnd(2,a+b); ans=a+b-c; text=a+' + '+b+' − '+c; op='+'; }
    else if(k===1){ a=rnd(2,Math.min(12,mulA)); b=rnd(2,9); c=rnd(2,addBig); ans=a*b+c; text=a+' × '+b+' + '+c; op='×'; }
    else { a=rnd(2,Math.min(12,mulA)); b=rnd(2,9); c=rnd(2,a*b); ans=a*b-c; text=a+' × '+b+' − '+c; op='×'; }
  }
  _mathSeq=false;
  game.problemAt=game.frame;                        // timestamp for the adaptive solve-speed signal
  const prob={text,ans,op};
  // GAMBIT — occasionally a high-risk ×2-or-bust problem; more often when you're on the ropes (a comeback beat). Never in seeded Daily / online / 2P.
  if(!game.daily && !game.online && !game.mode2p && game.player){
    const lowHP = game.player.hp < game.player.char.hp*0.30;
    if(Math.random() < (lowHP?0.26:0.15)) prob.gambit=true;
  }
  return prob;
}

const cam = {x:WORLD_W/2, z:1, tz:1, tx:WORLD_W/2, trauma:0, kickX:0};
cam.lookY = ()=> 300 + (cam.z-1)*58;
let hitstop = 0;
let slowUntil = 0, slowScale = 1, timeScale = 1;
const flashFx = {a:0, col:'#fff'};
function addTrauma(n){ cam.trauma = Math.min(1, cam.trauma+n); }
function slowmo(ms, scale){ slowUntil = performance.now()+ms; slowScale = scale; }
function flash(a,col){ if(!settings.flash) a=Math.min(a*0.22, 0.07);   // photosensitivity-safe: dampen full-screen flashes
  flashFx.a = Math.max(flashFx.a,a); flashFx.col = col||'#fff'; }
function camUpdate(){
  const p=game.player, e=game.enemy;
  if(game.online && net.role==='guest'){ // mirror the host's framing
    cam.tx=net.camX; cam.tz=net.camTz;
    cam.z += (cam.tz-cam.z)*0.1; const half=(W/2)/cam.z;
    cam.x += (clamp(cam.tx,half,WORLD_W-half)-cam.x)*0.15;
    cam.trauma*=0.91; cam.kickX*=0.85; return;
  }
  if(game.mode==='rumble' && game.fighters && (game.state==='fight'||game.state==='intro'||game.state==='matchend')){
    const set = living().length? living() : game.fighters;
    let lo=1e9,hi=-1e9; for(const f of set){ lo=Math.min(lo,f.x); hi=Math.max(hi,f.x); }
    cam.tz = clamp(820/((hi-lo)+440), 0.46, 1.02); cam.tx=(lo+hi)/2;
  } else if(p&&e){
    const mid=(p.x+e.x)/2, dist=Math.abs(p.x-e.x);
    if((game.state==='ko'||game.state==='finisher'||game.state==='qed') && game.koLoser){
      cam.tz = game.state==='finisher'?1.3 : game.state==='qed'?1.52 : 1.42;
      // the finisher frames the WINNER posed in triumph — the Steam-capsule shot — not the dissolving loser
      const focus = game.state==='qed' ? (game.koLoser===game.player?game.enemy:game.player) : game.koLoser;
      cam.tx = lerp(mid, (focus||game.koLoser).x, 0.62);
    } else if(game.state==='title'){ cam.tz=1.0; cam.tx=WORLD_W/2; }
    else { cam.tz = clamp(990/(dist+320), 0.68, 1.15); cam.tx = mid; }
  }
  cam.z += (cam.tz-cam.z)*0.06;
  const half = (W/2)/cam.z;
  cam.x += (clamp(cam.tx, half, WORLD_W-half) - cam.x)*0.08;
  cam.trauma *= 0.91; cam.kickX *= 0.85;
}

const parts = [];   // world-space fx
const bgParts = []; // ambient glyphs/embers behind fighters
const floaters = [];
function sparks(x,y,n,col,spd,dirX=0){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2, s = frnd(1,spd);
    parts.push({k:'spark',x,y,vx:Math.cos(a)*s+dirX,vy:Math.sin(a)*s-1.5,
      life:1,dec:frnd(0.03,0.06),col,len:frnd(4,10)});
  }
}
function ring(x,y,col,maxR,w=4){ parts.push({k:'ring',x,y,r:6,maxR,w,col,life:1,dec:0.05}); }
function dust(x,y,n=6,spd=2){
  for(let i=0;i<n;i++) parts.push({k:'dust',x:x+frnd(-8,8),y:y+frnd(-3,0),
    vx:frnd(-spd,spd),vy:frnd(-1.6,-0.3),life:1,dec:frnd(0.02,0.04),r:frnd(3,7)});
}
function ember(x,y,col){ parts.push({k:'ember',x,y,vx:frnd(-0.4,0.4),vy:frnd(-1.6,-0.7),
  life:1,dec:frnd(0.012,0.025),col,r:frnd(1.5,3)}); }
function homing(x,y,target,col,n=6){
  for(let i=0;i<n;i++) parts.push({k:'home',x,y,sx:x,sy:y,t:-i*0.06,target,col,
    ox:frnd(-70,70),oy:frnd(-50,10)});
}
function converge(f,col){ // energy pulled into a charging fighter
  const a=Math.random()*Math.PI*2, r=frnd(34,60);
  const cx=f.x+Math.cos(a)*r, cy=f.y-86+Math.sin(a)*r*0.7;
  parts.push({k:'spark',x:cx,y:cy,vx:(f.x-cx)*0.09,vy:(f.y-86-cy)*0.09,
    life:0.7,dec:0.07,col,len:6});
}
function updateParts(m){
  for(let i=parts.length-1;i>=0;i--){
    const q=parts[i];
    if(q.k==='home'){
      q.t += 0.05*m;
      if(q.t>=1){ sparks(q.x,q.y,2,q.col,2); parts.splice(i,1); continue; }
      if(q.t>0){
        const tt=eoCubic(q.t), tx=q.target.x, ty=q.target.y-92;
        const mx=(q.sx+tx)/2+q.ox, my=(q.sy+ty)/2+q.oy;
        q.x = (1-tt)*(1-tt)*q.sx + 2*(1-tt)*tt*mx + tt*tt*tx;
        q.y = (1-tt)*(1-tt)*q.sy + 2*(1-tt)*tt*my + tt*tt*ty;
      }

    if(this.ko && !this.daze && !this.dissolving){
      P.hlx=8;P.hly=-46;P.hrx=-8;P.hry=-44;P.lean=0;P.crouch=4;P.headX=-3;
    } else if((game.state==='ko'||game.state==='qed'||game.state==='finisher') && game.koLoser && game.koLoser!==this){ // victory / finisher hero pose — fist raised
      P.hlx=14;P.hly=-132; P.hrx=-8;P.hry=-120; P.lean=0;
      P.crouch=4+Math.sin(t*0.18)*2;
    } else if(a){
      const d=a.def;
      const dur = a.ph==='tel'?a.tel : a.ph==='wind'?d.wind : a.ph==='act'?d.act : d.rec;
      const p = clamp(1 - a.t/Math.max(1,dur), 0, 1);
      if(a.ph==='tel'){
        P.crouch=12+Math.sin(t*0.55)*1.6; P.lean=-0.10+Math.sin(t*0.9)*0.015;
        P.hlx=6;P.hly=-78;P.hrx=-12;P.hry=-72;
      } else if(a.type==='punch'){
        if(a.ph==='wind'){ P.hlx=lerp(24,-2,p); P.hly=-86; P.lean=lerp(0.10,-0.06,p); P.crouch=8; }
        else if(a.ph==='act'){ const e=eoCubic(p); P.hlx=lerp(-2,66,e); P.hly=-90; P.lean=0.34; P.hipX=6; P.hrx=-8;P.hry=-76; P.crouch=4; }
        else { const e=eoCubic(p); P.hlx=lerp(66,24,e); P.hly=lerp(-90,-88,e); P.lean=lerp(0.34,0.10,e); P.hipX=lerp(6,0,e); }
      } else if(a.type==='kick'||a.type==='airkick'){
        const ext = a.type==='airkick'?{x:48,y:-42}:{x:64,y:-62};
        if(a.ph==='wind'){ P.frx=lerp(-13,8,p); P.fry=lerp(0,-34,p); P.lean=-0.12; P.hlx=18;P.hly=-92; }
        else if(a.ph==='act'){ const e=eoCubic(p); P.frx=lerp(8,ext.x,e); P.fry=lerp(-34,ext.y,e);
          P.lean=-0.36; P.hipX=3; P.flx=4; P.hlx=6;P.hly=-96; P.hrx=-20;P.hry=-76; }
        else { const e=eoCubic(p); P.frx=lerp(ext.x,-13,e); P.fry=lerp(ext.y,0,e); P.lean=lerp(-0.36,0.10,e); }
      } else if(a.type==='special'){
        if(a.ph==='wind'){ P.crouch=13; P.hlx=2;P.hly=-60;P.hrx=-6;P.hry=-58; P.lean=-0.06+Math.sin(t*0.9)*0.02; }
        else if(a.ph==='act'){ const e=eoCubic(p); P.hlx=lerp(2,84,e); P.hly=-88; P.lean=0.42; P.hipX=8; P.crouch=2; P.hrx=-14;P.hry=-70; }
        else { const e=eoCubic(p); P.hlx=lerp(84,24,e); P.hly=lerp(-88,-88,e); P.lean=lerp(0.42,0.10,e); P.hipX=lerp(8,0,e); }
      }
    } else if(this.hurtT>0){
      P.lean=-0.34; P.crouch=9; P.hlx=-2;P.hly=-70; P.hrx=-18;P.hry=-86; P.headX=-4;
    } else if(this.dizzy>0){
      P.lean=Math.sin(t*0.2)*0.12; P.crouch=12;
      P.hlx=10;P.hly=-58; P.hrx=-12;P.hry=-56; P.headX=Math.sin(t*0.23)*3;
    } else if(!this.grounded){
      P.crouch=2; P.flx=12;P.fly=-26; P.frx=-6;P.fry=-20;
      P.hlx=26;P.hly=-92; P.hrx=-2;P.hry=-84; P.lean=0.06+clamp(this.vy*0.009,-0.12,0.14);
    } else if(this.blocking){
      P.crouch=13; P.lean=0.05; P.hlx=19;P.hly=-95; P.hrx=15;P.hry=-76;
    } else if(Math.abs(this.vx)>0.6){
      const ph=this.walkPh;
      P.crouch=7+Math.sin(ph*2)*1.4;
      P.flx=15+Math.sin(ph)*13;       P.fly=-Math.max(0,Math.sin(ph+0.5))*8;
      P.frx=-13+Math.sin(ph+Math.PI)*13; P.fry=-Math.max(0,Math.sin(ph+Math.PI+0.5))*8;
      P.hipX=Math.sin(ph*2)*1.5;
      P.lean=(this.moveX*this.facing>=0)?0.17:-0.05;
    }
    if(this.dodgeT>0){ P.lean-=0.22*(this.dodgeT/12); P.crouch+=4; }
    P.crouch += this.landT*1.1;
    return P;
  }
  updatePose(){
    const T=this.targetPose();
    if(!this.P){ this.P={...T}; return; }
    const k=this.attack?0.55:0.32;
    for(const key of POSE_KEYS) this.P[key]+=(T[key]-this.P[key])*k;
  }
}

//----------------------------------------------------------------------
// Fighter rendering
//----------------------------------------------------------------------
function drawPose(f,P,x,y,alpha,tint,koAng){
  ctx.save();
  ctx.translate(x,y);
  const chScale=f.char.scale||1;
  ctx.scale(f.facing*chScale,chScale);
  if(koAng){ ctx.translate(0,-2); ctx.rotate(-koAng); }
  ctx.globalAlpha=alpha;
  const flash = f.flashT>0 && (f.flashT%4<2) && !tint;
  const frozen = f.frozenT>0 && !tint;
  const gi  = tint|| (flash?'#fff': frozen?'#9adcf0':f.cols.gi);
  const giD = tint|| (flash?'#fff': frozen?'#5a9cc8':f.cols.giD);
  const trim= tint|| (flash?'#fff': frozen?'#d8f0ff':f.cols.trim);
  const out = tint? null : f.cols.out;
  const build = f.char.build||{};
  const bw = build.torso||21;                    // torso bulk — the core of each fighter's silhouette

  const hipY=-50+P.crouch, hipX=P.hipX;
  const shx = hipX+Math.sin(P.lean)*38, shy = hipY-Math.cos(P.lean)*38;

  // rear limbs (darker = depth)
  vLimb(hipX-3,hipY, P.frx,P.fry, 27,27,-1, 9.5,7.5,5, giD, out);
  boot(P.frx,P.fry, tint||f.cols.trimD, out);
  const ra=vLimb(shx-2,shy+2, P.hrx,P.hry, 19,19, 1, 7.5,5.5,4.2, giD, out);
  fist(ra.tx,ra.ty,5.2, tint||shade(f.cols.trim,-0.25), out);

  // gi skirt
  const flare = clamp(-f.vx*f.facing*0.9,-7,7);
  if(build.cape && !tint){                        // LESSING's austere shoulder-cape (replaces ribbon flair)
    const sway=Math.sin(f.animT*0.1)*4 - f.vx*f.facing*2;
    ctx.fillStyle=giD;
    ctx.beginPath();
    ctx.moveTo(shx+3,shy-1);
    ctx.quadraticCurveTo(shx-20+sway*0.3, shy+28, hipX-15+flare*0.5, hipY+20);
    ctx.lineTo(hipX-5, hipY+9);
    ctx.quadraticCurveTo(shx-6, shy+12, shx-5,shy);
    ctx.closePath();
    if(out){ ctx.strokeStyle=out; ctx.lineWidth=3; ctx.lineJoin='round'; ctx.stroke(); }
    ctx.fill();
  }
  ctx.beginPath();
  ctx.moveTo(hipX-11,hipY+1); ctx.lineTo(hipX+11,hipY+1);
  ctx.lineTo(hipX+13+flare,hipY+15); ctx.lineTo(hipX-13+flare,hipY+15); ctx.closePath();
  if(out){ ctx.strokeStyle=out; ctx.lineWidth=4; ctx.lineJoin='round'; ctx.stroke(); }
  if(tint){ ctx.fillStyle=tint; }
  else { const sg=ctx.createLinearGradient(0,hipY,0,hipY+16); sg.addColorStop(0,shade(f.cols.gi,-0.08)); sg.addColorStop(1,shade(f.cols.giD,-0.22)); ctx.fillStyle=sg; }  // skirt falls into shadow at the hem
  ctx.fill();

  // torso — a filled, tapered trunk (waist → broad shoulders), volumetrically shaded
  const waistR=bw*0.46, shR=bw*0.66, midx=(hipX+shx)/2, midy=(hipY+shy)/2;
  if(out){ ctx.fillStyle=out; capPath(hipX,hipY,shx,shy, waistR+2.4, shR+2.4); ctx.fill(); ctx.beginPath(); ctx.arc(shx,shy,shR+2.4,0,7); ctx.fill(); }
  if(tint){ ctx.fillStyle=tint; }
  else { const tg=ctx.createRadialGradient(midx+5,midy-5,2, midx,midy,bw*1.05); tg.addColorStop(0,shade(gi,0.34)); tg.addColorStop(0.62,gi); tg.addColorStop(1,shade(gi,-0.32)); ctx.fillStyle=tg; }
  capPath(hipX,hipY,shx,shy, waistR, shR); ctx.fill();
  ctx.beginPath(); ctx.arc(shx,shy,shR,0,7); ctx.fill();   // round the shoulders
  if(!tint){
    const a=ctx.globalAlpha;
    ctx.globalAlpha=a*0.4; ctx.fillStyle=shade(gi,-0.42); capPath(hipX+2.5,hipY,shx+2.5,shy, waistR*0.62, shR*0.6); ctx.fill();
    ctx.globalAlpha=a*0.72; ctx.fillStyle=shade(gi,0.5); capPath(hipX-3,hipY,shx-3,shy, waistR*0.3, shR*0.34); ctx.fill();
    ctx.globalAlpha=a;
  }
  // belt + ribbon
  ctx.strokeStyle=trim; ctx.lineWidth=5.5;
  ctx.beginPath(); ctx.moveTo(hipX-11,hipY-1); ctx.lineTo(hipX+11,hipY-1); ctx.stroke();
  const rp=Math.sin(f.animT*0.12)*4 - f.vx*f.facing*2;
  ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(hipX-9,hipY);
  ctx.quadraticCurveTo(hipX-16, hipY+9, hipX-15+rp*0.4, hipY+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hipX-9,hipY);
  ctx.quadraticCurveTo(hipX-13, hipY+11, hipX-9+rp*0.6, hipY+21); ctx.stroke();

  // clan sigil emblazoned on the robe (the unsworn protagonist has none)
  if(f.char && f.char.sigil && !tint){
    const cxp=(hipX+shx)/2 + Math.sin(P.lean)*5, cyp=(hipY+shy)/2 + 2;
    ctx.save();
    ctx.translate(cxp,cyp); ctx.scale(f.facing,1); ctx.rotate(P.lean*0.5);  // un-mirror the glyph
    ctx.globalAlpha=alpha*0.9;
    ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.arc(0,0,9.5,0,7); ctx.fill();
    ctx.fillStyle=trim; ctx.font=font(DISP,16); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(f.char.sigil, 0, 1);
    ctx.restore(); ctx.globalAlpha=alpha;
  }
  // front leg
  vLimb(hipX+3,hipY, P.flx,P.fly, 27,27,-1, 9.5,7.5,5, gi, out);
  boot(P.flx,P.fly, tint||f.cols.trim, out);

  // neck — connect the trunk to the head so the head doesn't float
  const hx=shx+P.headX+Math.sin(P.lean)*5, hy=shy-14+P.headY;
  if(!tint){ ctx.fillStyle=shade(gi,-0.18); capPath(shx,shy-1, hx,hy+6, shR*0.42, 6); ctx.fill(); }
  // head — a shaded sphere lit from the upper-front, with a rim light
  ctx.beginPath(); ctx.arc(hx,hy,13,0,7);
  if(out){ ctx.strokeStyle=out; ctx.lineWidth=4.5; ctx.stroke(); }
  if(tint){ ctx.fillStyle=tint; ctx.fill(); }
  else {
    const hg=ctx.createRadialGradient(hx+3,hy-5,1.5, hx,hy,15);
    hg.addColorStop(0, shade(gi,0.42)); hg.addColorStop(0.62, gi); hg.addColorStop(1, shade(gi,-0.3));
    ctx.fillStyle=hg; ctx.fill();
    ctx.globalAlpha=alpha*0.8; ctx.strokeStyle=shade(gi,0.55); ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(hx,hy,11.6, Math.PI*1.02, Math.PI*1.6); ctx.stroke();   // upper rim catch-light
    ctx.globalAlpha=alpha;
  }
  // headband + tails
  ctx.strokeStyle=trim; ctx.lineWidth=4.5;
  ctx.beginPath(); ctx.arc(hx,hy,12.5, Math.PI*1.05, Math.PI*1.95); ctx.stroke();
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(hx-11,hy-4);
  ctx.quadraticCurveTo(hx-22,hy+2, hx-26, hy+8+rp*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx-11,hy-4);
  ctx.quadraticCurveTo(hx-20,hy+6, hx-21, hy+13+rp*0.7); ctx.stroke();
  // headgear — the silhouette signature that tells the cast apart at a glance
  if(!tint && build.head && build.head!=='plain'){
    const hd=build.head;
    if(hd==='crown'){            // SOLOMON — the final answer, wears the result like a crown
      ctx.fillStyle=trim;
      ctx.beginPath();
      ctx.moveTo(hx-9,hy-8); ctx.lineTo(hx-9,hy-15); ctx.lineTo(hx-4.5,hy-11);
      ctx.lineTo(hx,hy-17); ctx.lineTo(hx+4.5,hy-11); ctx.lineTo(hx+9,hy-15); ctx.lineTo(hx+9,hy-8);
      ctx.closePath();
      if(out){ ctx.strokeStyle=out; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke(); }
      ctx.fill();
    } else if(hd==='horns'){     // MAXIMILIAN — the boundless product, a brute's horns
      ctx.fillStyle=giD;
      for(const s of [-1,1]){
        ctx.beginPath();
        ctx.moveTo(hx+s*8,hy-7);
        ctx.quadraticCurveTo(hx+s*18,hy-13, hx+s*14,hy-20);
        ctx.quadraticCurveTo(hx+s*10,hy-12, hx+s*4,hy-9);
        ctx.closePath();
        if(out){ ctx.strokeStyle=out; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke(); }
        ctx.fill();
      }
    } else if(hd==='topknot'){   // ADDISON — disciplined, measured
      ctx.strokeStyle=trim; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(hx,hy-11); ctx.lineTo(hx,hy-15); ctx.stroke();
      ctx.fillStyle=trim;
      ctx.beginPath(); ctx.arc(hx,hy-17,4,0,7);
      if(out){ ctx.strokeStyle=out; ctx.lineWidth=2.5; ctx.stroke(); }
      ctx.fill();
    } else if(hd==='hood'){      // LESSING — the austere cowl of the Difference
      ctx.fillStyle=giD;
      ctx.beginPath();
      ctx.arc(hx,hy,14.6, Math.PI*0.95, Math.PI*1.98, false);
      ctx.arc(hx,hy,10.6, Math.PI*1.98, Math.PI*0.95, true);
      ctx.closePath();
      if(out){ ctx.strokeStyle=out; ctx.lineWidth=2; ctx.stroke(); }
      ctx.fill();
    } else if(hd==='halo'){      // KRISHNA — the quotient's divine ring
      ctx.strokeStyle=trim; ctx.lineWidth=2.2;
      ctx.globalAlpha=alpha*(0.65+Math.sin(f.animT*0.1)*0.25);
      ctx.beginPath(); ctx.ellipse(hx,hy-17,9,3,0,0,7); ctx.stroke();
      ctx.globalAlpha=alpha;
    }
  }
  // face
  if(!tint){
    if(f.ko){
      ctx.strokeStyle='#0a0814'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(hx+2,hy-5); ctx.lineTo(hx+8,hy-1); ctx.moveTo(hx+8,hy-5); ctx.lineTo(hx+2,hy-1); ctx.stroke();
    } else if(f.hurtT>0){
      ctx.strokeStyle='#0a0814'; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.moveTo(hx+2,hy-3); ctx.lineTo(hx+9,hy-3); ctx.stroke();
    } else {
      const blink = (f.animT % 188) < 5;           // a slow blink so heads feel alive at rest
      if(blink){
        ctx.strokeStyle='#0a0814'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(hx+3,hy-3); ctx.lineTo(hx+9,hy-3); ctx.stroke();
      } else {
        ctx.fillStyle='#f4f2ff';
        ctx.beginPath(); ctx.ellipse(hx+5.5,hy-3,3.4,2.6,0,0,7); ctx.fill();
        ctx.fillStyle='#101020';
        ctx.beginPath(); ctx.arc(hx+6.8,hy-3,1.5,0,7); ctx.fill();
      }
      ctx.strokeStyle='#0a0814'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(hx+1.5,hy-7.5); ctx.lineTo(hx+9,hy-6); ctx.stroke();   // brow
      ctx.strokeStyle='rgba(10,8,20,0.5)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(hx+11,hy-1); ctx.lineTo(hx+9.5,hy+2.4); ctx.stroke();  // nose/jaw hint
    }
  }
  // front arm
  const la=vLimb(shx+2,shy+2, P.hlx,P.hly, 19,19, 1, 7.5,5.5,4.2, gi, out);
  const heroPose = (game.state==='ko'||game.state==='qed'||game.state==='finisher') && game.koLoser && game.koLoser!==f && !f.ko;
  const bigFist = (f.attack && f.attack.type==='special' && f.attack.ph==='act') || heroPose;  // raised glowing fist on the winner
  fist(la.tx,la.ty, bigFist?8:6.2, tint||f.cols.trim, out);
  if(bigFist && !tint){
    ctx.globalCompositeOperation='lighter'; ctx.globalAlpha=0.85;
    ctx.fillStyle=f.cols.trim;
    ctx.beginPath(); ctx.arc(la.tx,la.ty,13+Math.sin(f.animT)*2,0,7); ctx.fill();
    ctx.globalCompositeOperation='source-over';
  }
  ctx.restore();
  ctx.globalAlpha=1;
}
function fist(x,y,r,col,out){
  ctx.beginPath(); ctx.arc(x,y,r,0,7);
  if(out){ ctx.strokeStyle=out; ctx.lineWidth=3.8; ctx.stroke(); }
  const g=ctx.createRadialGradient(x-r*0.35,y-r*0.42,r*0.1, x,y,r*1.18);   // a lit, rounded knuckle
  g.addColorStop(0,shade(col,0.42)); g.addColorStop(0.68,col); g.addColorStop(1,shade(col,-0.3));
  ctx.fillStyle=g; ctx.fill();
  if(r>5){ ctx.strokeStyle='rgba(10,8,20,0.42)'; ctx.lineWidth=1.1; ctx.beginPath(); ctx.arc(x,y,r*0.55,Math.PI*0.12,Math.PI*0.88); ctx.stroke(); }
}
function boot(x,y,col,out){
  ctx.beginPath(); ctx.ellipse(x+2,y-1,8.5,5.5,0,0,7);
  if(out){ ctx.strokeStyle=out; ctx.lineWidth=3.8; ctx.stroke(); }
  const g=ctx.createLinearGradient(0,y-7,0,y+4); g.addColorStop(0,shade(col,0.22)); g.addColorStop(1,shade(col,-0.26));
  ctx.fillStyle=g; ctx.fill();
}
function drawFinisherSpotlight(){   // radial glow behind the posed winner on every win — the capsule money-shot
  if(!(game.state==='qed'||game.state==='ko'||game.state==='finisher') || !game.koLoser) return;
  const w=game.koLoser===game.player?game.enemy:game.player;
  if(!w || w.ko) return;
  const cx=w.x, cy=GROUND-118, ac=w.accent||'#ffd34d';
  const g=ctx.createRadialGradient(cx,cy,8, cx,cy,270);
  g.addColorStop(0, ac+'55'); g.addColorStop(0.45, ac+'22'); g.addColorStop(1, ac+'00');
  ctx.save(); ctx.globalCompositeOperation='lighter';
  ctx.fillStyle=g; ctx.fillRect(cx-300, cy-300, 600, 480);
  // ground pool of light
  const gp=ctx.createRadialGradient(cx,GROUND,4, cx,GROUND,150);
  gp.addColorStop(0, ac+'44'); gp.addColorStop(1, ac+'00');
  ctx.fillStyle=gp; ctx.beginPath(); ctx.ellipse(cx,GROUND,150,30,0,0,7); ctx.fill();
  ctx.restore();
}
function fighterSquash(f){   // SQUASH & STRETCH — render-only (never touches physics); the biggest "alive" upgrade on the rig
  if(f._air===undefined) f._air=!f.grounded;
  const air=!f.grounded;
  if(air) f.peakVy=Math.max(f.peakVy||0, f.vy);                                  // remember fall speed before landing
  if(f._air && !air){ if((f.peakVy||0)>3) f.landPulse=Math.min(1,(f.peakVy||0)/13); f.peakVy=0; } // touchdown splat
  if(!f._air && air) f.jumpPulse=1;                                              // takeoff pop
  f._air=air;
  f.landPulse=(f.landPulse||0)*0.80; f.jumpPulse=(f.jumpPulse||0)*0.82;
  if(f.ko||f.falling||f.dissolving) return {sx:1,sy:1};
  let sx=1, sy=1;
  if(air){ const st=clamp(Math.abs(f.vy)/17,0,0.46); sy+=st; sx-=st*0.55; }      // stretch along vertical motion
  sy-=0.34*f.landPulse; sx+=0.40*f.landPulse;                                    // landing squash
  sy+=0.16*f.jumpPulse;                                                          // crouch-release stretch
  if(f.hurtT>0){ const h=clamp(f.hurtT/16,0,1)*0.5; sy-=0.16*h; sx+=0.20*h; }    // hit jelly
  if(f.attack && f.attack.ph==='act' && f.attack.type!=='special'){ sx+=0.13; sy-=0.07; } // strike extension
  else if(f.attack && f.attack.ph==='wind'){ sy-=0.06; sx+=0.04; }              // anticipation crouch
  return {sx:clamp(sx,0.72,1.5), sy:clamp(sy,0.62,1.6)};
}
function drawFighter(f){
  if(f.dissolving){ // unmade by mathematics
    if(f.gone||f.dissolveT>=1) return;
    ctx.save(); ctx.globalAlpha=1-f.dissolveT;
    ctx.translate(frnd(-3,3)*f.dissolveT,0);
    drawPose(f,f.P,f.x,f.y,1,null,0);
    ctx.restore(); ctx.globalAlpha=1;
    return;
  }
  if(f.falling){ // tumbling into the pit
    if(f.gone) return;
    const depth=clamp((f.y-GROUND)/420,0,1);
    ctx.save(); ctx.globalAlpha=1-depth*0.75;
    ctx.translate(f.x,f.y); ctx.rotate(-f.koSpin*f.facing);
    ctx.scale(1-depth*0.45,1-depth*0.45); ctx.translate(-f.x,-f.y);
    drawPose(f,f.P,f.x,f.y,1,null,0);
    ctx.restore(); ctx.globalAlpha=1;
    return;
  }
  // WHIFF-PUNISH readability: a foe in the recovery of their own swing is OPEN — a pulsing amber tell teaches the player to punish (and that their own recovery is punishable)
  if(f.attack && f.attack.ph==='rec' && !f.ko && f.grounded){
    const p=0.5+0.5*Math.sin(game.frame*0.45);
    ctx.save(); ctx.globalAlpha=0.28+0.34*p; ctx.strokeStyle='#ffd34d'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(f.x, f.y-70, 28, 72, 0, 0, Math.PI*2); ctx.stroke(); ctx.restore(); ctx.globalAlpha=1;
    if(f===game.enemy && !game.mode2p) txtO('▸ OPEN', f.x, f.y-180, 11, '#ffd34d', {mono:true,sw:0});
  }

  if(f===game.player && f.blocking && !game.mode2p){
    const hi=f.guardStance==='high';
    txtO(hi?'HIGH GUARD':'LOW GUARD', f.x, f.y-168, 9.5, hi?'#8fd8f8':'#ffd34d', {mono:true,sw:0});
  }
  // #4 FOCUS-channel tell — a cyan arc closes around the fighter while the bank lands; readable by BOTH sides (you're open, and the foe knows it)
  if((f.focusT||0)>0 && !f.ko){
    const k=1-f.focusT/12;
    ctx.save(); ctx.strokeStyle='#7ae8ff'; ctx.globalAlpha=0.85; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(f.x, f.y-88, 42, -Math.PI/2, -Math.PI/2+Math.PI*2*k); ctx.stroke();
    ctx.globalAlpha=0.35; ctx.beginPath(); ctx.arc(f.x, f.y-88, 42, 0, Math.PI*2); ctx.stroke();
    ctx.restore(); ctx.globalAlpha=1;
    txtO('∑', f.x, f.y-196, 15, '#7ae8ff', {mono:true,sw:0});
  }

  const fy = f.floorY||GROUND;
  const hgt = clamp((fy-f.y)/260,0,1);
  const sc = 1-hgt*0.55;
  const g = ctx.createRadialGradient(f.x,fy+5,4, f.x,fy+5,62);
  g.addColorStop(0, f.spReady()? f.accent+'' : f.glow);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha = f.spReady()? 0.16+Math.sin(game.frame*0.15)*0.06 : 0.08;
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(f.x,fy+5,62,14,0,0,7); ctx.fill();
  ctx.globalAlpha=0.32*sc;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(f.x,fy+6,30*sc+8,7*sc+2,0,0,7); ctx.fill();
  ctx.globalAlpha=1;

  for(const t of f.trail) drawPose(f,t.P,t.x,t.y,t.a,f.accent,0);

  if(f.attack && f.attack.ph==='tel'){
    ctx.globalAlpha=0.22+Math.sin(game.frame*0.5)*0.1;
    ctx.fillStyle='#ff3b3b';
    ctx.beginPath(); ctx.ellipse(f.x,f.y-70,34,76,0,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  const koAng = (f.ko && !f.daze && !f.dissolving)? Math.PI/2*0.96*bounce(f.koP)
              : ((f.downed||0)>0 ? Math.PI/2*0.78 : 0);   // DOWNED = lying on the ground (reads as a knockdown; rises as downed ticks out)
  if(f.ko && !f.daze && !f.dissolving && !f.koDust && f.koP>0.38){ f.koDust=true; dust(f.x,GROUND,12,3.4); addTrauma(0.35); }

    ctx.save(); ctx.globalCompositeOperation='lighter';
    const bgl=ctx.createRadialGradient(f.x,f.y-78,6, f.x,f.y-78,70);
    bgl.addColorStop(0, hexA(f.glow,0.42)); bgl.addColorStop(0.7, hexA(f.glow,0.06)); bgl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bgl; ctx.beginPath(); ctx.ellipse(f.x,f.y-78,44,82,0,0,7); ctx.fill();
    ctx.restore();
  }
  if(!f.gone && !f.falling && f.y>=GROUND-30){ // wet-floor reflection — a polished, rendered touch
    ctx.save(); ctx.globalAlpha=0.13; ctx.translate(0,GROUND*2); ctx.scale(1,-1);
    drawPose(f,f.P,f.x,f.y,1,f.glow,0);
    ctx.restore(); ctx.globalAlpha=1;
  }
  // SMEAR — a stretched ghost during the active frames so fast strikes flow instead of teleporting
  if(f.attack && f.attack.ph==='act' && f.attack.type!=='special' && !f.ko){
    ctx.save(); ctx.globalAlpha=0.20; ctx.translate(f.x-f.facing*9,f.y); ctx.scale(1.26,0.9); ctx.translate(-f.x,-f.y);
    drawPose(f,f.P,f.x,f.y,1,f.accent,0); ctx.restore(); ctx.globalAlpha=1;
  }
  // SQUASH & STRETCH — scale the rig about its feet for weight + snap (render-only)
  const sq=fighterSquash(f);
  ctx.save(); ctx.translate(f.x,f.y); ctx.scale(sq.sx,sq.sy); ctx.translate(-f.x,-f.y);
  drawPose(f,f.P,f.x,f.y,1,null,koAng);
  ctx.restore();
  // dizzy glyphs orbiting the head
  if(f.dizzy>0){
    const glyphs=['?','÷','7','×'];
    for(let i=0;i<3;i++){
      const a=game.frame*0.13+i*2.1;
      ctx.globalAlpha=0.85;
      txtO(glyphs[(i+ (f.dizzy>>4))%4], f.x+Math.cos(a)*22, f.y-158+Math.sin(a)*7, 15,'#ffd34d',{mono:true,sw:3});
    }
    ctx.globalAlpha=1;
  }
  if(f===game.player && game.state==='fight' && game.playerHidden){
    txtO('HIDDEN', f.x, f.y-184, 12, '#9fdcff',
      {mono:true, sw:3, alpha:0.65+Math.sin(game.frame*0.1)*0.2});
  }
  // telegraph "!"
  if(f.attack && (f.attack.ph==='tel') ){
    const popS = f.attack.pop>0? eoBack(1-f.attack.pop/8):1;
    const by = f.y-182 - Math.abs(Math.sin(game.frame*0.18))*7;
    ctx.save(); ctx.translate(f.x,by); ctx.scale(popS,popS);
    txtO('!',0,0,30,'#ff4040',{sw:5});
    ctx.restore();
  }
}

function controlPlayer(p){
  p.moveX = 0;
  const arrows = !game.mode2p; // in 2P the arrows belong to P2
  if(keys[KEYS.left] ||(arrows&&keys['arrowleft']))  p.moveX -= 1;
  if(keys[KEYS.right]||(arrows&&keys['arrowright'])) p.moveX += 1;
  const _down = keys[KEYS.block]||(arrows&&keys['arrowdown']);
  const _back = p.facing>0 ? (keys[KEYS.left]||(arrows&&keys['arrowleft'])) : (keys[KEYS.right]||(arrows&&keys['arrowright']));
  p.wantBlock = !!(_down || _back);
  if(_down) p.guardStance='low'; else if(_back) p.guardStance='high';   // ↓ = LOW guard (blocks low+mid); hold BACK = HIGH guard (blocks high+mid). Guess wrong and the hit lands — or out-solve it in the ⚡NOW window.
}
function controlP2(f){
  f.moveX = 0;
  if(keys['arrowleft'])  f.moveX -= 1;
  if(keys['arrowright']) f.moveX += 1;
  f.wantBlock = !!keys['arrowdown'];
}
// PER-ARCHETYPE CPU PILOTS — each fighter's AI plays its OWN game-plan, so glass-cannon-vs-tank is a real matchup, not a mirror
const CPU_PROFILE = {
  //          preferred [min,max] range | advance | retreat | special-use | retreat-below hp% | throw-when-you-block | jump-in chance
  mauler:   { rng:[52,112],  adv:1.2,  ret:0.5,  sp:0.5,  retHp:0,  thr:0.11, jmp:0.015 },  // TANK: walks you down, blocks, throws heavies, eats chip to close
  ember:    { rng:[56,120],  adv:1.3,  ret:0.65, sp:0.4,  retHp:0,  thr:0.06, jmp:0.055 },  // RUSHDOWN: fast relentless pressure + jump-ins
  frost:    { rng:[230,540], adv:0.55, ret:1.35, sp:0.9,  retHp:0,  thr:0.02, jmp:0.01 },   // ZONER: runs to fullscreen, fishes spears
  oracle:   { rng:[150,300], adv:0.9,  ret:1.05, sp:0.6,  retHp:38, thr:0.04, jmp:0.05 },   // GLASS DART: keeps mid, darts on your recovery, bails when low
  initiate: { rng:[78,140],  adv:1.0,  ret:1.0,  sp:0.4,  retHp:0,  thr:0.05, jmp:0.03 },   // balanced all-rounder
  james:    { rng:[66,130],  adv:1.1,  ret:0.75, sp:0.55, retHp:0,  thr:0.06, jmp:0.04 }    // SOLOMON: relentless finisher
};
function cpuProfile(c){ return CPU_PROFILE[(c&&c.char&&c.char.id)] || CPU_PROFILE.initiate; }
function controlCPU(c){
  const p = c.opp, cfg = DIFF.cpu();
  if(!p){ c.moveX=0; return; }
  c.dmgMul = cfg.dmgMul*c.char.dmg; // persona power × difficulty
  c.moveX = 0; c.wantBlock = c.blockHold>0;
  // COMBO ESCAPE — once you've chained it a few hits, the foe breaks out after a difficulty-scaled window (learnable: you learn how long YOUR combo lasts before it bursts)
  if((c.comboedHits||0)>=2 && c.stun>0){
    c.burstT=(c.burstT||0)+1;
    if(c.burstT>=cfg.burstReact && c.burst()){ c.burstT=0; return; }
  } else c.burstT=0;
  // MATH-ECONOMY MIRROR — when disengaged + low on aura the CPU stops to "solve" (a visible, whiff-punishable refuel beat you can rush)
  if(c.thinkT>0){ c.thinkT--; c.moveX=0; if(c.thinkT<=0){ c.addAura(34); floatText(c.x,c.y-150,'+ SOLVED','#7ae8ff',14); } return; }   // aura is EARNED here (the visible, punishable refuel) — break it by hitting them mid-solve
  // v3 #2 THROW TECH — the CPU learns to tech (difficulty-scaled, never twice in a row), so throws are a MIXUP, not a lock. Runs BEFORE the canAct gate: teching works from blockstun (the tick-throw read).
  {
    const pThrow = p.attack && p.attack.type==='throw' && (p.attack.ph==='wind'||p.attack.ph==='act') && Math.abs(p.x-c.x)<84;
    if(pThrow && !c._sawThrow){ c._sawThrow=true;
      const techP = c._justTeched? 0 : Math.min(0.7, 0.2+0.25*(DIFF.level||0));   // just-teched one? this one lands — throw twice is a real read
      if(Math.random()<techP){ c.throwTechAt=game.frame; c._justTeched=true; } else c._justTeched=false;
    } else if(!pThrow) c._sawThrow=false;
  }
  if(!c.canAct()) return;
  const dist = Math.abs(p.x-c.x), dir = p.x>c.x?1:-1;
  // #4 PUNISH-THE-REFUEL — a player banking mid-fight (FOCUS channel) is an opening the foe HUNTS, exactly as you can rush its ∑ solve. Bank at range or behind cover; bank in its face and eat the counter.
  if((p.focusT||0)>0 && c.grounded){
    if(dist<138){ const t=dist>92?'kick':'punch';
      if(Math.round(ATK[t].cost*c.char.costMul)<=c.aura){ c.cpuAttack(t, Math.round(18*Math.max(0.5,cfg.telMul))); c.aiThink=rnd(cfg.cool[0],cfg.cool[1]); return; } }
    else if(dist<560){ c.moveX=dir; return; }   // smells the open bank — closes in
  }
  // #5 OKIZEME — a downed player is a SCHEDULED mix-up, not a breather: walk to point-blank, loom through the invuln (readable menace), then commit ONE read per knockdown — a wakeup-timed meaty STRIKE, a post-getup THROW (beats a wakeup block; v3: cannot OTG, so it must land after you rise), or just the loom. Your answers: block the strike, tech/jump the throw, or D = REVERSAL (which the bait beats).
  if((p.downed||0)>0 && c.grounded && !c.attack && c.stun<=0){
    if(!c.okiPlan){ const thr=cpuProfile(c).thr||0.2;

    if(dist>96){ c.moveX=dir; return; }                       // close in while you're down
    if(p.downed>12){ c.moveX=0; return; }                     // looming — the wait IS the tell

      if(c.okiPlan==='throw'){
        if(p.downed<=2 && c.aura>=6){ c.tryThrow(); c.okiPlan=null; c.aiThink=rnd(cfg.cool[0],cfg.cool[1]); }   // starts as you rise -> grabs AFTER the invuln (teched/jumped, never OTG)
        else c.moveX=0;
        return;
      }
      if(c.okiPlan==='strike'){
        const t=dist>80?'kick':'punch';
        if(Math.round(ATK[t].cost*c.char.costMul)<=c.aura) c.cpuAttack(t, 12);   // tel 12 + windup lands on the vulnerable wakeup — blockable, reversal-able
        c.okiPlan=null; c.aiThink=rnd(cfg.cool[0],cfg.cool[1]);

    }

  } else if((p.downed||0)<=0) c.okiPlan=null;
  // MATH-ECONOMY MIRROR — the foe's power comes from SOLVING, not a passive drip. When it can't afford a special and it's safe, it stops to solve — a real opening you can rush and interrupt.
  if(c.aura<58 && dist>140 && !(p.attack&&p.attack.ph!=='rec') && c.grounded && c.aiThink>8 && Math.random()<0.07){ c.thinkT=Math.round(22+cfg.react*1.3); c.moveX=0; floatText(c.x,c.y-178,'∑ solving…','#9fb0c8',12); return; }
  c.aiThink--;
  // READS — the foe builds a picture of YOUR defensive habit and decays it (recency). Its offense then adapts (below), so the attacker becomes readable + counter-conditionable.
  const rd = c.read || (c.read={block:0,punish:0,dodge:0});
  rd.block*=0.992; rd.punish*=0.994; rd.dodge*=0.994;
  if(p.wantBlock && Math.abs(p.x-c.x)<150) rd.block+=0.06;   // you've been turtling
  const canAfford = t => Math.round(ATK[t].cost*c.char.costMul)<=c.aura;
  const pRec  = p.attack && p.attack.ph==='rec';
  const pWind = p.attack && p.attack.ph==='wind';
  // ── REACTION ENGINE — the foe RESPONDS to your real frames after a difficulty-scaled delay, then acts reliably.
  //    Learnable & conditionable: a fast enough attack beats its block; spacing so it whiffs the punish; baiting its block with a feint. NOT a coin-flip. ──
  let opening=null;
  if(!p.grounded && p.vy>0.4 && dist<122 && c.grounded) opening='antiair';                 // jump-in falling into range
  else if(pRec && dist<128 && c.grounded) opening='punish';                                 // committed/whiffed in range = free punish
  else if(pWind && dist<142 && c.grounded && c.blockHold<=0) opening='block';               // your startup → put up a guard
  if(opening){
    if(c.reactKind!==opening){ c.reactKind=opening; c.reactT = (opening==='antiair'? Math.max(2,cfg.react-4) : cfg.react); }
    else if(c.reactT>0) c.reactT--;
  } else { c.reactKind=null; c.reactT=0; }
  if(c.reactKind && c.reactT<=0 && c.grounded){
    const k=c.reactKind; c.reactKind=null;
    if(k==='block'){ c.blockHold=rnd(16,28); c.wantBlock=true; return; }                     // reliably guards once it reads your startup — frame-trap it or stagger your timing
    if(k==='antiair' && canAfford('kick')){ c.cpuAttack('kick',Math.round(28*Math.max(0.55,cfg.telMul))); c.aiThink=rnd(cfg.cool[0],cfg.cool[1]); return; }
    if(k==='punish'){ let type=dist>92?'kick':'punch'; if(!canAfford(type)) type='punch';
      if(canAfford(type)){ c.cpuAttack(type,Math.round((type==='punch'?24:32)*Math.max(0.5,cfg.telMul))); c.aiThink=rnd(cfg.cool[0],cfg.cool[1]); return; } }
  }
  if(c.blockHold>0) return;
  const hidden = isConcealed(p,c);
  // scavenge: contest pickups when hungry and closer than the player
  let seek=null;
  for(const pk of pickups){
    const d=Math.abs(pk.x-c.x);
    if(d<560 && d<Math.abs(pk.x-p.x)
       && (c.aura<46 || pk.type.k==='surge' || (pk.type.k==='shard'&&c.hp<70)))
      if(!seek || d<Math.abs(seek.x-c.x)) seek=pk;
  }
  if(seek){
    c.moveX=(seek.x>c.x?1:-1)*0.24*cfg.speed; hopCover(c);
    if((seek.gy||GROUND)<GROUND-40 && Math.abs(seek.x-c.x)<90 && c.grounded){ c.vy=-12.4; c.grounded=false; }
    return;
  }
  if(hidden){ c.moveX = dir*0.10*cfg.speed; hopCover(c); return; }  // lost sight — stalk slowly toward you (aura is earned by solving, not by hiding)
  // spacing — each archetype fights its OWN preferred range + advance/retreat tempo (the game-plan that makes the matchup FELT)
  const P = cpuProfile(c);
  let rMin=P.rng[0], rMax=P.rng[1];
  const lowHp = P.retHp>0 && c.hp < c.char.hp*(P.retHp/100);      // a glass-cannon bails when hurt
  if(lowHp){ rMin+=140; rMax+=220; }
  const clockLow = (game.timer!=null && game.timer<20);          // anti-timeout: even a runaway zoner must engage late
  if(clockLow && dist>100)      c.moveX = dir*0.24*cfg.speed;     // force the approach when the clock's low
  else if(dist > rMax)          c.moveX = dir*0.22*cfg.speed*P.adv;  // too far → approach at this fighter's tempo
  else if(dist < rMin)          c.moveX = -dir*0.16*cfg.speed*P.ret; // too close → back off at this fighter's tempo
  else if(Math.random()<0.01)   c.moveX = -dir*0.2*cfg.speed;

  if(dist<50 && c.grounded && p.wantBlock && c.aiThink<=0 && Math.random()<P.thr && c.aura>=6){
    if(c.tryThrow()){ c.aiThink=rnd(cfg.cool[0]+10,cfg.cool[1]+20); return; }
  }
  // JUMP-IN overhead — occasionally hop in so your new HIGH/LOW cuts both ways (a jump-in must be stand-blocked)
  if(c.grounded && dist>80 && dist<210 && c.aiThink<=0 && Math.random()<P.jmp){
    c.vy=-12.4; c.grounded=false; c.moveX=dir*0.5*cfg.speed; c._jumpInAt=game.frame; c.aiThink=rnd(cfg.cool[0],cfg.cool[1]);
  }
  if(!c.grounded && c.vy>1.2 && (game.frame-(c._jumpInAt||-99))<40 && dist<95 && !c.attack && canAfford('kick')){ c.cpuAttack('kick', 6); c._jumpInAt=-99; }  // airkick on the way down = the overhead
  // player took the high ground — climb after them, tier by tier
