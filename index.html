    let stepPf=null;
    for(const pf of PLATFORMS)
      if(pf.y<c.y-20 && pf.y>c.y-130 && (!stepPf || Math.abs(pf.x-c.x)<Math.abs(stepPf.x-c.x))) stepPf=pf;
    if(stepPf){ c.moveX=(stepPf.x>c.x?1:-1)*0.25*cfg.speed; if(Math.abs(stepPf.x-c.x)<70){ c.vy=-12.4; c.grounded=false; } }
  }
  // FEINT — occasionally step out of your startup to bait a whiff, then punish next beat (a mix-up, kept unpredictable on purpose)
  if(pWind && dist<120 && dist>66 && c.grounded && Math.random()<cfg.baitP){
    c.moveX = -dir*0.34*cfg.speed; hopCover(c); return;
  }
  // HARD pressure — if you just spent a solve-dodge, a fast strike beats the cooldown: you must BLOCK (a deterministic punish on the dodge window)
  if(DIFF.level>=2 && dist<140 && c.aiThink<=0 && p.dodgeCd>12 && c.grounded){
    let type = (c.char.dmg||1)>=1.08?'kick':'punch'; if(!canAfford(type)) type='punch';
    if(canAfford(type)){ c.cpuAttack(type, type==='punch'?18:26); c.aiThink = rnd(cfg.cool[0], cfg.cool[1]); return; }
  }
  // ranged personas open fire from distance (lance/sigil kits)
  const ranged = c.char.spKind==='spear'||c.char.spKind==='sigil';
  if(ranged && c.aiThink<=0 && dist>=150 && dist<520 && c.aura>=Math.round(ATK.special.cost*c.char.costMul)){
    c.cpuAttack('special', Math.round(80*cfg.telMul)); SFX.charge(); c.aiThink = rnd(cfg.cool[0]+30, cfg.cool[1]+40);
  }
  // commit to an attack on cadence — telegraphed (your math window). The OFFENSE now ADAPTS to your habit, so it's readable + counter-conditionable.
  if(c.aiThink<=0 && dist<150){
    const dom = (rd.block>1.2 && rd.block>=rd.punish && rd.block>=rd.dodge) ? 'block'
              : (rd.punish>1.2 && rd.punish>=rd.dodge) ? 'punish'
              : (rd.dodge>1.2) ? 'dodge' : null;
    if(dom==='punish' && dist>72 && Math.random()<0.7){   // you keep whiff-punishing → it BAITS: steps back to make you whiff, strikes next beat. Stop mashing.
      c.moveX=-dir*0.3*cfg.speed; hopCover(c); c.aiThink=rnd(16,28);
      if(game.frame-(c._readLineAt||0)>300){ c._readLineAt=game.frame; floatText(c.x,c.y-184,'reading you…','#cdb8ff',12); }
      return;
    }
    let spChance = P.sp;   // per-archetype special-use (zoner fishes specials a lot; rushdown/tank rely on normals)
    let kickChance = (c.char.dmg||1)>=1.08?0.58:0.4;
    if(dom==='block'){ spChance=Math.min(0.92, spChance+0.42);   // you turtle → it cracks the guard with specials (chip + guard-crush). Stop blocking, start dodging.
      if(game.frame-(c._readLineAt||0)>300){ c._readLineAt=game.frame; floatText(c.x,c.y-184,'cracking your guard','#ff9f6a',12); } }
    if(dom==='dodge') kickChance=0.7;                            // you keep dodging → faster, committed pressure that beats the dodge cooldown
    if(c.aura>=Math.round(ATK.special.cost*c.char.costMul) && Math.random()<spChance){
      c.cpuAttack('special', Math.round(95*cfg.telMul)); SFX.charge(); c.aiThink = rnd(cfg.cool[0], cfg.cool[1]);
    } else {
      let type = Math.random()<kickChance?'kick':'punch';
      if(Math.round(ATK[type].cost*c.char.costMul)>c.aura) type='punch'; // save up when broke
      const tel = dom==='dodge'? Math.round((type==='punch'?34:46)*cfg.telMul) : Math.round((type==='punch'?48:66)*cfg.telMul);
      c.cpuAttack(type, tel); c.aiThink = rnd(cfg.cool[0], cfg.cool[1]);
    }
  }
  if(c.aura<6) c.addAura(0.5);   // tiny floor so a fully-starved foe can still scrape together a cheap punch to make space — solving (above) is the real, dominant, punishable aura source
}
function hopCover(c){ // jump cover that blocks the path
  if(!c.grounded || !c.moveX) return;
  for(const pl of PILLARS){
    const dxp=pl.x-c.x;
    if(Math.sign(dxp)===Math.sign(c.moveX) && Math.abs(dxp)<62){
      c.vy=-12.4; c.grounded=false; dust(c.x,c.y,4,1.4); break;
    }
  }
}
// CPU drift during telegraph (menace)
function cpuTelegraphDrift(c){
  if(c.attack && c.attack.ph==='tel' && c.opp) c.vx += (c.opp.x>c.x?1:-1)*0.10;
}

//----------------------------------------------------------------------
// Combat resolution
//----------------------------------------------------------------------
function resolveHits(att,def){
  if(att.hitThisSwing) return;
  const hb=att.hitbox(); if(!hb) return;
  const pl=pillarBetween(att.x,def.x); // grounded attacks clang off cover; jump-ins clear it
  if(pl && att.y>GROUND-90 && hb.x<pl.x+16 && hb.x+hb.w>pl.x-16){
    att.hitThisSwing=true;
    sparks(pl.x,GROUND-70,8,'#b48cff',4);
    floatText(pl.x,GROUND-126,'CLANG','#b48cff',14);
    SFX.block();
    return;
  }
  const bd=def.body();
  if(hb.x<bd.x+bd.w && hb.x+hb.w>bd.x && hb.y<bd.y+bd.h && hb.y+hb.h>bd.y){
    att.hitThisSwing=true;
    const dir = def.x<att.x?-1:1;
    let dmg=hb.dmg, ambush=false;
    // math streak sharpens strikes (any human fighter)
    dmg += Math.min(3,Math.floor(att.streak/3))*(hb.type==='special'?2:1)*att.char.streakMul;
    if(att===game.player) dmg *= pFn(hb.type); // story: trained Plus/Minus/Multiply empower punch/kick/special
    if(att===game.player && !game.mode2p && game.hiddenRecent>0){
      dmg=Math.round(dmg*1.3); ambush=true; game.hiddenRecent=0;
    }
    // aura was already spent up front when the swing started, so a landed hit is pure payoff
    // COMBO: stringing hits scales damage; a hit charged by a mid-combo solve becomes a CHAIN FINISHER
    let chain=false;
    if(att.combo>0) dmg *= 1 + 0.10*Math.min(att.combo,5);
    if(att.chargedHit){ dmg *= 1.7; chain=true; att.chargedHit=false; }
    let overclocked=false;
    if((att.overclock||0)>game.frame){ dmg *= 1.25; overclocked=true; att.overclock=0; }  // OVERCLOCK — fast-solve bonus cashed on the swing
    let gcombo=0;
    if(att.attack && att.attack.galaxyComboMul){ gcombo=att.attack.galaxyComboMul; dmg *= gcombo; }  // GALAXY combo finisher — the unlocked string pays off big (×2..×5)
    let punish=false;
    if(def.attack && def.attack.ph==='rec' && hb.type!=='special'){ punish=true; dmg *= 1.3; }   // WHIFF-PUNISH: catch a foe in the recovery of their own swing — reward the read
    const airHit = !def.grounded && !!def.knockingDown;   // hitting a LAUNCHED (juggled) foe
    if(airHit) dmg *= Math.pow(0.72, def.airHits||0);     // JUGGLE decay — each extra air hit does less (no infinite juggle)
    if(att.attack && att.attack.just){ dmg *= 1.2; if(att===game.player) game.rushMeter=Math.min(RUSH_MAX,(game.rushMeter||0)+4); }   // #8 JUST-frame cancel — precise late-cancel timing pays off (a skill lever OFF the math)
    dmg = Math.round(dmg);
    const res=def.takeHit(dmg,dir,hb.heavy,false,hb.guardLevel);
    if(res==='dodge'){ floatText(def.x,def.y-160,'DODGED','#9fdcff',17); return; }
    const cx=def.x-dir*6, cy=def.y-90;
    if(res==='block'){ hitstop=Math.max(hitstop,3); ring(cx,cy,'#9fdcff',26,3);
      if(att.attack && hb.type!=='special' && !att.attack.reversal){ att.attack.cancelOK=Math.max(att.attack.cancelOK||0,10); att.attack.blockCancel=true;   // #3 ON-BLOCK PRESSURE: a blocked normal opens a SHORT cancel window — a tight P>P/P>K follow-up is a frame trap (beats a mash, loses to continued block); capped by the drainable guard + throw. NO special-cancel on block. #5: a blocked REVERSAL gets NO window — it's the punishable option.
        if(att===game.player && game.frame-(att._blockCueAt||0)>50){ att._blockCueAt=game.frame; floatText(att.x+att.facing*28, att.y-120, 'PRESSURE ▸', '#9fdcff', 12); } }
      return; }
    if(res==='armor'){ hitstop=Math.max(hitstop,4); ring(cx,cy,'#ffcf6a',30,3); return; }   // MAXIMILIAN plowed through the startup — no combo/punish/launcher credit for the attacker
    // clean hit
    if(punish){ att.addAura(14); def.stun=(def.stun||0)+6;   // punishing a foe's recovery = your neutral REFUEL + a confirm window: fence to earn aura, don't turtle to bank it
      floatText(att.x, att.y-198, 'PUNISH ▸', '#ffd34d', 18); sparks(def.x,def.y-90,10,'#ffd34d',5); addTrauma(0.18); }
    if(ambush) floatText(def.x,def.y-206,'AMBUSH!','#b48cff',20);
    if(att===game.player){ game.stats.dmg+=Math.round(dmg); game.rushMeter=Math.min(RUSH_MAX,(game.rushMeter||0)+6); }  // landing hits charges FOCUS
    def.streak=0; def.combo=0; def.chargedHit=false; // getting tagged breaks focus AND your combo
    att.combo=(att.combo||0)+1; att.comboT=84; att.comboShownAt=game.frame;  // extend the chain window (more forgiving) + stamp for the HUD meter
    if(att.attack && att.attack.launcher){ def.vy=-9; def.grounded=false; def.knockingDown=true; def.airHits=0; def.stun=Math.max(def.stun||0,30); floatText(def.x,def.y-208,'LAUNCH!','#ffd34d',18); ring(cx,cy,'#ffd34d',56,5); addTrauma(0.25); }   // ↑+kick LAUNCHER pops the foe low into a juggle route
    else if(airHit){ def.airHits=(def.airHits||0)+1; if(def.airHits>=2) def.vy=Math.max(def.vy,4.5); }   // JUGGLE cap — after 2 air hits they fall into a knockdown (#6)
    if(att.attack && hb.type!=='special'){ att.attack.cancelOK=22; att.attack.blockCancel=false;   // a CLEAN-hit confirm opens the full cancel window (~0.37s) — special-cancel allowed (unlike the block window)
      if(att===game.player && game.frame-(att._chainCueAt||0)>40){ att._chainCueAt=game.frame; floatText(att.x+att.facing*28, att.y-118, 'CHAIN ▸', '#7ae8ff', 13); }   // surface the invisible cancel window so the combo layer is discoverable
    }
    if(chain){ announce('CHAIN!','#ff9f2a'); flash(0.18,'#ffd9a0'); slowmo(220,0.42); ring(cx,cy,'#ff9f2a',82,6); floatText(att.x,att.y-212,'CHAIN FINISHER','#ff9f2a',20); }
    else if(att.combo>=2) floatText(att.x,att.y-202,'COMBO ×'+att.combo,'#ffd34d',15+Math.min(9,att.combo));
    if(overclocked){ ring(cx,cy,'#ffd34d',46,4); floatText(cx,cy-30,'◆',('#ffd34d'),20); }
    if(gcombo){ const big=gcombo>=3; flash(0.22,'#ffd9f0'); addTrauma(0.45+gcombo*0.06); ring(cx,cy, big?'#ff7ac0':'#ffd34d', 70+gcombo*16, 7); slowmo(240,0.4);
      floatText(def.x,def.y-212, '✦ COMBO ×'+gcombo, big?'#ff7ac0':'#ffd34d', 22+Math.min(8,gcombo*2));
      if(att.attack && att.attack.galaxyLaunch){ def.vy=-13; def.grounded=false; def.stun=Math.max(def.stun,34); def.dizzy=Math.max(def.dizzy,80); def.knockingDown=true; } }  // bigger combos launch
    hitstop=Math.max(hitstop, hb.heavy?8:5);
    addTrauma(hb.heavy?0.45:0.25);
    cam.kickX = dir*(hb.heavy?5:2.5);
    ring(cx,cy, hb.heavy?'#ffd34d':'#fff', hb.heavy?54:34, hb.heavy?5:3);
    flash(hb.heavy?0.16:0.08, hb.heavy?'#ffd9a0':'#fff');
    // CLAY DEBRIS — chunks of the defender's body spray off in the hit direction (meaty impact)
    sparks(cx,cy, hb.heavy?11:6, def.glow||'#cdb', hb.heavy?5.2:3.6, dir);
    sparks(cx,cy, hb.heavy?4:2, '#fff', 4.2, dir);
    dust(cx,cy+8, hb.heavy?4:2, 2);
    if(hb.type==='special'){
      slowmo(260,0.35); flash(0.3,'#ffe9b0'); addTrauma(0.6);
      ring(cx,cy,'#ffd34d',90,7);
      floatText(def.x,def.y-188,'CRITICAL!','#ffd34d',26);
      if((att.attack.kind||'dash')==='dash') for(let i=0;i<11;i++) ember(def.x+frnd(-22,22), def.y-frnd(20,116), att.accent); // INFERNO DASH scorch
    }
    if(def.hp<=0) lethal(def, hb.type==='special');
  }
}

//----------------------------------------------------------------------
// Answer submission — the heart of the game
//----------------------------------------------------------------------
const cardFx={flash:0,col:'#0f0',shake:0};
function cardWorldPoint(){ // world coords beneath the math card
  return {x:cam.x, y:cam.lookY() + (442-300)/cam.z};
}
function computeDanger(f){ // the foe winding up on f right now (whole telegraph) — drives the WARNING UI
  const foes = (game.mode==='rumble'&&game.fighters)? game.fighters.filter(x=>x!==f&&!x.ko&&!x.gone) : [f.opp];
  for(const o of foes){
    if(!o || !o.attack) continue;
    const ph=o.attack.ph, ok = game.mode2p? (ph==='wind'||ph==='act') : (ph==='tel'||ph==='wind'||ph==='act');
    if(ok && Math.abs(o.x-f.x)<190) return o;
  }
  return null;
}
function framesToHit(o){ // frames until o's current attack hitbox goes live (∞ if not attacking)
  const a=o&&o.attack; if(!a) return Infinity;
  if(a.ph==='act')  return 0;
  if(a.ph==='wind') return a.t;
  if(a.ph==='tel')  return a.t + (a.def?a.def.wind:0);
  return Infinity;
}
const PERFECT_WIN=26;   // max window; the ACTUAL window scales with each attack's telegraph (tight on fast strikes)
function perfectWin(o){ return clamp(Math.round((o.attack && o.attack.fuse || 40)*0.42), 10, PERFECT_WIN); }
function perfectFoe(f){  // the foe whose strike is inside its tight perfect-dodge window, or null
  const foes=(game.mode==='rumble'&&game.fighters)? game.fighters.filter(x=>x!==f&&!x.ko&&!x.gone):[f.opp];
  for(const o of foes){ if(o && o.attack && Math.abs(o.x-f.x)<190 && framesToHit(o)<=perfectWin(o)) return o; }
  return null;
}
// Apply a solved/missed math result to fighter f. Shared by offline + online
// (host runs this for every seat). Returns aura gained (0 on miss).
function applySolve(f, result, st, op){
  st = st || game.stats;
  if(f.ko) return 0;
  st.asked++;
  if(f===game.player){
    // per-operation mastery (drives the post-match breakdown) + a persisted adaptive skill estimate
    if(op){ const o=(game.opStats=game.opStats||{})[op]=(game.opStats||{})[op]||{a:0,c:0}; o.a++; if(result!=='miss') o.c++; }
    const took = game.frame-(game.problemAt||game.frame);
    if(result==='miss') game.skill=clamp((game.skill||0.5)-0.06,0,1);
    else                game.skill=clamp((game.skill||0.5)+(took<70?0.05:took<140?0.03:0.012),0,1);
    store('skill', game.skill);
    if(result!=='miss' && took<40){ f.overclock=game.frame+90; floatText(f.x,f.y-204,'SHARPENED','#ffd34d',15); }  // a FAST solve arms a +25% next swing
  }
  if(result==='miss'){
    // a wrong answer RATTLES you — but doesn't freeze you out: short stun, and you can BLOCK through the wobble (missWobble) to recover
    f.streak=0; f.dizzy=30; f.stun=16; f.missWobble=30; f.flashT=5;
    if(f===game.player && game.problem && game.problem.gambit){ f.aura=0; f.auraChipT=18; f.dizzy=46;  // GAMBIT bust — you bet your bank and lost it
      floatText(f.x,f.y-198,'GAMBIT LOST!','#ff4d5e',20); addTrauma(0.06); }
    floatText(f.x,f.y-170,'THE LINE BROKE','#ff4d5e',20); addTrauma(0.12); SFX.wrong();
    if(f===game.player) reactBanter('onMiss');
    if(f===game.player && game.chRule && game.chRule.tag==='subtract' && game.enemy && !game.enemy.ko){   // LESSING VIII: a sloppy answer leaves a false part standing — it heals him
      game.enemy.hp=Math.min(game.enemy.char.hp, game.enemy.hp+6); floatText(game.enemy.x,game.enemy.y-172,'+ false part','#ff9f6a',14); }
    return 0;
  }
  st.correct++;
  f.streak++; f.streakAt=game.frame; st.maxStreak=Math.max(st.maxStreak||0,f.streak);
  if(f===game.player && f.streak>0 && f.streak%5===0) reactBanter('onStreak');   // a long solve streak gets a reaction
  if(f.char.id==='oracle' && f.streak===5){
    floatText(f.x,f.y-212,'ASCENDED','#ffd34d',26); flash(0.12,'#ffd34d'); ring(f.x,f.y-90,'#ffd34d',80,5);
    if(f===game.player) floatText(f.x,f.y-182,'CHAINS EXTEND','#ffe9a0',14);   // SIGNATURE payoff, named: Krishna can now P>P>P
  }
  if(f.dizzy>0||f.stun>0){ f.dizzy=0; f.stun=0; floatText(f.x,f.y-170,'FOCUSED!','#9fdcff',20); }
  const perfect = result==='perfect';
  // #1 COMMITTAL SLIP — a reactive (NOW-window) solve slips only the height you're GUARDING (mid always; low/high per stance, mirroring the block) and a THROW blows straight through it. Read it right = slip + counter-stagger; read it wrong = you still BANK aura, but the blow lands. This un-collapses "always solve on their commit" so the high/low block + throw finally matter.
  let slipOK = true;
  if(perfect){
    const foe = perfectFoe(f) || computeDanger(f);
    const ia = foe && foe.attack;
    const throwInc = !!(ia && (ia.type==='throw' || ia.kind==='throw'));
    const inc = (ia && ia.def && ia.def.guardLevel) || 'mid';   // specials/projectiles default MID → a timed solve still slips the telegraphed special (keystone preserved)
    const grd = f.guardStance || 'low';
    slipOK = !throwInc && (inc==='mid' || (inc==='low' && grd==='low') || (inc==='high' && grd==='high'));
  }
  let gain = Math.round((18+Math.min(8,f.streak))*f.char.gainMul);   // a SAFE (untimed) solve BANKS the full amount — the economy lane
  if(perfect) gain = Math.round(gain*0.5);   // a REACTIVE solve banks LESS: the slip + counter IS the payoff — math is now slip-vs-bank, not a free super
  // stage quirks (math-fused, only in story/versus on the relevant stage)
  let qtag='', qcol='#7ae8ff';
  if(onPitLip(f)){ gain+=6; qtag='+6 EDGE'; qcol='#ffd34d'; }              // CHASM: brave the lip, earn more
  else if(schismLit(f)){ gain*=2; qtag='×2 RATIO'; qcol='#b48cff'; }       // SCHISM: solve atop a lit rune = double
  let gambit=false;
  if(f===game.player && game.problem && game.problem.gambit){ gain=Math.round(gain*2); gambit=true; }  // GAMBIT pays double
  // SOLVE-TO-PARRY: on a COVERED perfect, holding TOWARD the foe stays in the pocket to punish (committed: smaller window) vs holding back = full evasive dodge
  const parry = perfect && slipOK && f===game.player && !game.mode2p && !game.online &&
    ((f.facing>0)? (keys[KEYS.right]||keys['arrowright']) : (keys[KEYS.left]||keys['arrowleft']));
  if(perfect && slipOK) f.doDodge(true, parry);
  else if(perfect){ f.iframes=0; f.slipActive=false; f.vx=-f.facing*2.6; f.dodgeT=6; f.dodgeCd=30; }   // wrong guard height (or a throw): NO slip — the blow lands, but you still banked the aura below
  else f.doDodge(false, false);
  f.addAura(gain); st.auraEarned=(st.auraEarned||0)+gain;
  floatText(f.x,f.y-(perfect?190:170),'+'+gain+' AURA','#7ae8ff',17);
  if(qtag) floatText(f.x,f.y-(perfect?214:194), qtag, qcol, 15);
  if(gambit){ f.chargedHit=true; f.comboT=Math.max(f.comboT,80); floatText(f.x,f.y-(perfect?240:220),'GAMBIT — DOUBLED','#ff7ac0',16); flash(0.1,'#ff7ac0'); }
  if(perfect && slipOK){
    const o=perfectFoe(f)||computeDanger(f); if(o) o.staggered(f.char.perfectStun, f.char.id==='frost');
    st.perfects=(st.perfects||0)+1; slowmo(380,0.45); flash(0.22,'#fff1c0'); addTrauma(0.2);
    if(f===game.player) game.rushMeter=Math.min(RUSH_MAX,(game.rushMeter||0)+12);   // a clutch perfect-dodge charges FOCUS fast
    if(f===game.player && game.enemy){ const r=game.enemy.read||(game.enemy.read={block:0,punish:0,dodge:0}); r.dodge+=1; }   // you keep dodging → it learns to fast-pressure
    ring(f.x,f.y-90,'#ffd34d',70,5); announce('PERFECT DODGE','#ffd34d'); SFX.perfect();
  } else if(perfect){   // reactive solve, WRONG height read (or you tried to slip a throw)
    if(f===game.player) floatText(f.x,f.y-196,'WRONG GUARD — HIT','#ff8a8a',15);
    SFX.correct();
  } else SFX.correct();
  if(f===game.player && op) sfxSolveOp(op);   // hear which function you just used
  if(f===game.player && game.chRule && game.enemy && !game.enemy.ko){   // per-foe rule: how you solve shapes the fight
    if(game.chRule.tag==='subtract' && perfect){ game.enemy.hp=Math.max(0,game.enemy.hp-9); floatText(game.enemy.x,game.enemy.y-172,'− cleanly','#7ae8ff',14); }  // LESSING VIII: a clean solve cuts the false part away
    else if(game.chRule.tag==='read' && op){ if(op===game.lastSolveOp){ game.enemy.addAura(14); floatText(game.enemy.x,game.enemy.y-150,'read.','#b48cff',13); } game.lastSolveOp=op; }  // KRISHNA: repeating an operator feeds the Schism
  }
  // (retired) operator-armed Function Strikes — specials are now the per-fighter 3-tier KIT (D fires the best you can afford)
  // every solve builds account-wide four-function mastery (any mode, not just story)
  if(f===game.player && op){
    const fk={'+':'plus','−':'minus','×':'mul','÷':'div'}[op];
    if(fk && addFnXP(fk, perfect?3:2)){ const F=FUNCS.find(x=>x.key===fk); if(F) floatText(f.x,f.y-150, F.name+' LV UP', F.col, 15); }
  }
  // COMBO × MATH: solving mid-combo charges your next hit into a CHAIN FINISHER (string commands, interspersed by math)
  if(f.combo>0 && !f.ko){ f.chargedHit=true; f.comboT=Math.max(f.comboT,80); floatText(f.x,f.y-150,'CHAIN CHARGED','#ff9f2a',14); }
  return gain;
}
function methodHint(p){   // a one-line "how" shown on a miss — teach the method, not just the answer
  if(!p) return '';
  const t=p.text;
  if(/% of/.test(t))                 return 'find 1% (the number ÷ 100), then multiply by the percent';
  if(/x/.test(t))                    return 'isolate x: do the inverse operation to BOTH sides';
  if(/½|¼|¾|⅓|⅔|of /.test(t))        return 'split the whole into equal parts, then take that many';
  if(/×.*\+|\+.*×/.test(t))          return 'order of operations: do the × before the +';
  if(/²/.test(t))                    return 'a square is the number times itself';
  if(p.op==='+') return 'add the bigger number first, then count on';
  if(p.op==='−') return 'count up from the smaller number — and keep going below zero if it’s bigger';
  if(p.op==='×') return 'it’s repeated adding: that many groups of the second number';
  if(p.op==='÷') return 'ask: how many groups of the divisor fit into the total?';
  return 'take it one step at a time';
}
function completeFocus(f){   // #4 the FOCUS channel pays out — the banked answer lands (unless a hit broke it first)
  const pd=f.pendingSolve; f.pendingSolve=null; if(!pd || f.ko) return;
  const sp=game.problem, sa=game.problemAt;
  game.problem=pd.problem; game.problemAt=pd.problemAt;   // restore the ANSWERED problem's context (applySolve reads game.problem for gambit + solve-speed)
  const gain=applySolve(f,'ok',pd.st,pd.problem&&pd.problem.op);
  game.problem=sp; game.problemAt=sa;
  if(gain) hudFloat(pd.isP1,'+'+gain,'#7ae8ff');
  ring(f.x,f.y-86,'#7ae8ff',44,4);
}
function submitFor(f, buf){ // local typed answer (offline, or a player's own seat)
  if(game.state==='rush') return rushSubmit(f,buf);
  if(game.state==='finisher') return finisherSubmit(f,buf);
  if(game.galaxy) return '';   // GALAXY: no solving during the fight itself — only in the bursts
  if(game.state!=='fight'||game.paused||!buf||f.ko) return '';
  const st = f===game.player? game.stats : game.stats2;
  const isP1 = f===game.player;
  const correct = buf!=='' && buf!=='-' && Math.abs(+buf - game.problem.ans) < 1e-6;  // tolerant: integers, negatives, decimals
  cardFx.flash = correct?10:12; cardFx.col = correct?'#46e08a':'#ff4d5e';
  if(!correct){
    cardFx.shake=10; game.reveal={txt:game.problem.text+' = '+game.problem.ans, t:175, hint:methodHint(game.problem)};
    if(isP1 && !game.daily){ // spaced repetition: queue the missed item to re-ask soon (cap the queue)
      game.missQ=game.missQ||[];
      game.missQ.push({text:game.problem.text, ans:game.problem.ans, op:game.problem.op});
      if(game.missQ.length>8) game.missQ.shift();
    }
  }
  if(correct){ const cw=cardWorldPoint(); homing(cw.x,cw.y,f,f.accent,5); }
  const result = correct? (perfectFoe(f)?'perfect':'ok') : 'miss';   // PERFECT only inside the tight reactive window
  if(game.online && net.role==='guest'){ // guests report results; host applies & syncs
    netLocalCosmetic(result);
  } else if(result==='ok' && f===game.player && !game.online && !game.mode2p && !f.ko){
    // #4 FOCUS CHANNEL — an UNTIMED correct answer takes a readable beat to bank: ~12f standing open (no swing/dash/block), then the aura lands. A hit mid-channel breaks it, no refund — the exact mirror of you rushing the CPU's ∑ solve. PERFECT (NOW-window) solves stay instant so the reactive slip is crisp; misses land instantly.
    if(f.focusT>0 && f.pendingSolve) completeFocus(f);   // roll an in-flight bank in first (humanly near-impossible at 12f, but never silently lose one)
    f.focusT=12; f.pendingSolve={problem:game.problem, problemAt:game.problemAt, st, isP1};
    floatText(f.x,f.y-166,'∑ FOCUS','#7ae8ff',13);
    if((game.focusChanTaught||0)<2){ game.focusChanTaught=(game.focusChanTaught||0)+1; tip('focuschan','Banking takes a BEAT — you’re open while it lands. Answer when it’s safe, or in the ⚡NOW window to slip instead.'); }
  } else {
    const gain=applySolve(f, result, st, game.problem.op);
    if(gain) hudFloat(isP1,'+'+gain,'#7ae8ff');
  }
  game.heat+=0.45;
  let _h=Math.floor(game.heat);   // THREAT-COUPLED MATH (fusion): ease the problem when there's a dodge to make (reward the READ, not arithmetic); nudge harder when cornered
  if(!game.daily && !game.online && !game.mode2p && !game.galaxy){
    const danger = (game.enemy && game.enemy.attack && (game.enemy.attack.ph==='wind'||game.enemy.attack.ph==='tel')) || (typeof dangerInfo==='function' && dangerInfo()>0);

  if(acc>=0.8) return 'A';
  if(acc>=0.6) return 'B';
  if(acc>=0.4) return 'C';
  return 'D';
}

function eliminate(f){

function rumbleRank(leaders){ // leaders first (winner / hp-sorted survivors), then reverse death order

  for(let i=game.placements.length-1;i>=0;i--)
    if(!rank.includes(game.placements[i])) rank.push(game.placements[i]);
  game.rumbleRank=rank;
  game.rumbleWinner=rank[0]||null;
  game.playerWon = game.rumbleWinner===game.player;
  game.rumblePlace = rank.indexOf(game.player)+1;

function rumbleStep(){
  const fs=game.fighters;
  for(const f of fs) if(!f.ko){ const t=nearestFoe(f); if(t) f.opp=t; }
  if(game.online){ // host drives: own seat by keys, guest seats by net input, empty seats by AI
    for(const f of fs){
      if(f.ko) continue;
      if(f===game.player) controlPlayer(f);
      else if(f.human){ const gs=net.guestState[f.seat]||{}; f.moveX=gs.mv||0; f.wantBlock=!!gs.bl; }
      else { controlCPU(f); cpuTelegraphDrift(f); }
    }
  } else {
    controlPlayer(game.player);
    for(const f of fs) if(f!==game.player && !f.ko){ controlCPU(f); cpuTelegraphDrift(f); }
  }
  for(const f of fs) f.update(true);
  for(let i=0;i<fs.length;i++) for(let j=i+1;j<fs.length;j++){ // body push, living pairs
    const a=fs[i], b=fs[j]; if(a.ko||b.ko) continue;
    const dx=b.x-a.x, min=52;
    if(Math.abs(dx)<min && a.grounded===b.grounded){
      const push=(min-Math.abs(dx))/2*Math.sign(dx||1);
      b.x=clamp(b.x+push,70,WORLD_W-70); a.x=clamp(a.x-push,70,WORLD_W-70);
    }
  }
  for(const f of fs) if(!f.ko) for(const pl of PILLARS){
    const dx=f.x-pl.x;
    if(Math.abs(dx)<36 && f.y>GROUND-104) f.x=pl.x+Math.sign(dx||1)*36;
  }

  game.playerHidden=false; game.hiddenRecent=0;

    if(game.player.spReady()) tip('spn','SPECIAL ready — press '+keyLabel(KEYS.special));
  }
  for(const a of fs) if(!a.ko) for(const b of fs) if(b!==a && !b.ko) resolveHits(a,b);
  game.timer -= 1/60;
  const alive=living();
  if(alive.length<=1){ endRumble(alive[0]||null); return; }

}

function step(){
  game.frame++;

  if(game.trailerMode) trailerDirector();   // auto-playing trailer: advance the director's timeline + cut scenes
  if(game.paused) return;
  if(hitstop>0){ hitstop--; updateParts(0.3); updateFx(); return; }

  camUpdate();
  updateParts(1);
  updateFx();
  if(game.banner){ game.banner.t+=0.016; if(game.banner.t>1) game.banner=null; }
  if(cardFx.flash>0)cardFx.flash--; if(cardFx.shake>0)cardFx.shake--;
  if(game.tip && game.tip.t>0) game.tip.t--;
  if(game.reveal && game.reveal.t>0) game.reveal.t--;

  if(game.state==='warmup'){ warmupTick(); return; }   // both sides solve the opener locally (guests run it too, then follow snapshots once the host rings the bell)
  if(game.online && net.role==='guest'){ guestTick(); return; } // guests render, never simulate

  if(['splash','welcome','title','keyart','trailercard','modes','rumbleChoose','matchend','select','howto','settings','interlude','lobby','story','dialogue','training','reward','codex','naming','records'].includes(game.state)){
    if(game.state==='splash' && --game.splashT<=0) game.state = game.seenHow? 'title' : 'welcome';   // first run → learn-to-fight gate
    p.update(false); e.update(false);
    if(game.state==='select') for(const pv of previews) pv.update(false);
    return;
  }
  if(game.state==='intro'){
    if(game.mode==='rumble' && game.fighters){ for(const f of game.fighters) f.update(false); }
    else { p.update(false); e.update(false); }
    game.introT--;
    if(game.introT===55){ SFX.fight(); addTrauma(0.25); flash(0.15,'#fff');
      ring(cam.x,GROUND-80,'#ffd34d',120,6); }
    if(game.introT<=40){
      if(game.galaxy && !game.practice && (game.galaxyBurstsDone||0)===0){ enterGalaxyBurst(1); }   // GALAXY: load your combos before the fight
      else if(game.galaxy && game.practice){ game.galaxyBest=99; game.state='fight'; game.fightAt=game.frame; }   // PRACTICE galaxy: all combos unlocked, no burst
      else { game.state='fight'; game.fightAt=game.frame; }
    }
    return;
  }
  if(game.state==='fight'){
    if(game.galaxy && !game.practice && (game.galaxyBurstsDone||0)===1 && game.timer<=37){ enterGalaxyBurst(2); return; }   // GALAXY: halftime burst (not in practice)
    if(game.practice){   // free training vs a still dummy that can't die; you can't lose; clock frozen
      if(e.hp<=e.char.hp*0.15){ e.hp=e.char.hp; e.hpShown=e.hp; floatText(e.x,e.y-182,'RESET','#9fb0c8',13); }
      p.hp=p.char.hp; game.timer=99;
      tip('prac','PRACTICE · '+(game.pracFight?'dummy FIGHTS BACK (F: idle)':'F: make the dummy fight back')+' · P: move list · ESC quit'+(game.galaxy?' · B: re-roll burst':''));
    }
    forgeTick();                       // MULTIPLY stage: oscillate the central forge platform
    stageHazardTick();                 // ambient stage hazards (gated on settings.hazards)
    if(game.tutorial) tutorTick();     // first-run guided bout drives the dummy + the lesson script
    if(game.mode==='rumble'){ rumbleStep(); return; }
    if(game.cinema && !game.mode2p && !game.tutorial && !game.practice && !game.galaxy){ p.opp=game.enemy; controlCPU(p); cpuTelegraphDrift(p); }   // SHOWCASE: the player auto-fights too
    else controlPlayer(p);
    if(game.mode2p) controlP2(e);
    else if(game.online){ const gs=net.guestState[e.seat]||{}; e.moveX=gs.mv||0; e.wantBlock=!!gs.bl; }   // ONLINE DUEL: the foe is your friend — drive from streamed input, not AI
    else if(!game.tutorial && (!game.practice || game.pracFight)){ controlCPU(e); cpuTelegraphDrift(e); }   // PRACTICE: dummy idle by default; F makes it fight back so you can drill block / dodge / burst
    p.update(true); e.update(true);
    if(game.ally){ allyControl(game.ally); game.ally.update(true); }   // LESSING fights at your side in the finale
    // body push
    const dx=e.x-p.x, min=54;
    if(Math.abs(dx)<min && p.grounded===e.grounded){
      const push=(min-Math.abs(dx))/2*Math.sign(dx||1);
      e.x=clamp(e.x+push,70,WORLD_W-70); p.x=clamp(p.x-push,70,WORLD_W-70);
    }
    for(const f of [p,e]) for(const pl of PILLARS){ // solid cover (jumpable)
      const dx=f.x-pl.x;
      if(Math.abs(dx)<36 && f.y>GROUND-104) f.x=pl.x+Math.sign(dx||1)*36;
    }
    updatePickups(); updateProjs(); updateHazards();
    game.playerHidden = !game.mode2p && isConcealed(p,e);
    game.hiddenRecent = game.playerHidden? 20 : Math.max(0,(game.hiddenRecent||0)-1);
    if(game.playerHidden) tip('hide','Hidden! But your rival banks aura while you rest…');
    if(dangerInfo()>0) tip('tel','He commits — match his height (↓ low / back high) and answer in the NOW window to slip clean. A THROW you must TECH.');
    // ANSWER RELOCK — when a strike crosses into its tight perfect window, your typed answer is WIPED.
    // A perfect dodge now demands SOLVING inside the ⚡NOW window (or BLOCK) — no holding a pre-typed answer from neutral.
    if(!game.mode2p && !game.online && !game.galaxy){   // GALAXY has no solve-dodge — math lives only in the bursts
      const pf=perfectFoe(p);
      if(pf){
        if(pf.attack!==game.relockAtk){ game.relockAtk=pf.attack;
          if(ans1!==''){ ans1=''; cardFx.shake=Math.max(cardFx.shake||0,9); }
          cardFx.flash=Math.max(cardFx.flash||0,11); cardFx.col='#ffd34d';
          floatText(p.x,p.y-200,'ANSWER — NOW','#ffd34d',18);
          tip('relock','Your answer clears the instant he commits — answer again in the NOW window, or BLOCK.');
        }
      } else game.relockAtk=null;
    }
    if(p.spReady()) tip('sp','SPECIAL ready — press '+keyLabel(KEYS.special)+'. Finish with it for a surprise…');
    if(game.burstChallenge){ game.burstChallenge.t--; if(game.burstChallenge.t<=0 || (p.comboedHits||0)<2 || p.ko) game.burstChallenge=null; }  // MATH-BURST window
    if((game.digitLockT||0)>0) game.digitLockT--;   // v3 #3 busted-burst digit lockout ticks down
    resolveHits(p,e); resolveHits(e,p);
    if(game.ally) resolveHits(game.ally, game.enemy);   // Lessing's strikes chip Solomon (Solomon never targets the ally)
    storyBeatTick();                    // marquee story lines that PLAY as HP crosses a threshold
    chRuleTick();                       // per-foe combat philosophy (Maximilian's overflow meter, etc.)
    if(game.mode==='story' && game.storyCh===STORY.length-1 && !game.galaxy && !game.practice && p.aura>0){
      p.aura=Math.max(0, p.aura-0.04);   // SOLOMON reduces the unknown toward zero — clean solving is the only push-back (codex thesis, played)
      if(game.frame%150===0) floatText(p.x, p.y-152, '↓ to zero', '#ff9f2a', 12);
      tip('solz','Solomon pulls your AURA toward zero — keep solving to hold the line.');
    }
    game.timer -= 1/60;
    if(game.timer<=0 && game.state==='fight') endByTime();
    return;
  }
  if(game.state==='rush'){
    if(game.frame%6===0) slowmo(140,0.3);     // sustain slow-time for the whole window (input stays real-speed)
    p.moveX=0; e.moveX=0; e.stun=Math.max(e.stun,30);  // keep the foe frozen

  }
  if(game.state==='finisher'){

    if(game.finT<=0) failFinisher();

  }
  if(game.state==='qed'){

    const L=game.koLoser;
    if(game.mathT<110 && L.dissolveT<1){      // hold the posed hero-frame ~40 frames, THEN the loser dissolves

          vx:frnd(-2.2,2.2), vy:frnd(-4.5,-1), life:1, dec:0.014,
          col:Math.random()<0.5?'#ff5070':'#ffd34d',

    if(game.mathT<=0){ L.gone=true; finishKO(); }
    return;
  }
  if(game.state==='ko'){
    p.update(true); e.update(true);
    p.moveX=0; e.moveX=0;
    const winner = game.koLoser===p? e:p;
    if(!winner.ko && winner.grounded && game.koTimer%48===20){ winner.vy=-5.5; winner.grounded=false; } // victory hops
    if(game.pitFinish && !game.koLoser.falling && game.koTimer===104){
      const L=game.koLoser;
      L.falling=true; L.vy=-8.5; L.vx=-L.facing*5.5;
      SFX.special();
    }
    game.koTimer--;
    if(game.koTimer<=0) finishKO();
    return;
  }
}

function hpBar(f, side){ // side: 1 = left, -1 = right
  const w=330,h=17, y=24;
  const x = side===1? 36 : W-36-w;
  ctx.save();
  ctx.translate(x+(side===1?0:w), y);
  ctx.transform(1,0,side*-0.32,1,0,0);
  ctx.translate(side===1?0:-w,0);
  ctx.fillStyle='rgba(5,6,16,0.8)'; ctx.fillRect(-3,-3,w+6,h+6);
  ctx.fillStyle='#33080f'; ctx.fillRect(0,0,w,h);
  const chip=clamp(f.hpShown/f.char.hp,0,1), cur=clamp(f.hp/f.char.hp,0,1);
  const ax = side===1? 0 : w; // anchored at the outer edge
  const fill=(frac,style)=>{ ctx.fillStyle=style;
    if(side===1) ctx.fillRect(0,0,w*frac,h); else ctx.fillRect(w*(1-frac),0,w*frac,h); };
  fill(chip,'#f3f0e6');
  const hg=ctx.createLinearGradient(0,0,0,h);
  if(f.hp>f.char.hp*0.3){ hg.addColorStop(0,'#b8f06a'); hg.addColorStop(1,'#37c452'); }
  else { const pl=Math.sin(game.frame*0.2)>0; hg.addColorStop(0,pl?'#ff8a6a':'#ffb06a'); hg.addColorStop(1,'#e03a2a'); }
  fill(cur,hg);
  ctx.fillStyle='rgba(255,255,255,0.20)'; ctx.fillRect(0,0,w,5);
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){ ctx.beginPath(); ctx.moveTo(w*i/4,0); ctx.lineTo(w*i/4,h); ctx.stroke(); }
  // AURA tank — every attack draws from this; math refills it
  const mw=236,my=h+6;
  const mx0 = side===1?0:w-mw;
  if(!game.galaxy){   // GALAXY: attacks are FREE, so there's no aura tank — it'd just be a confusing full bar
  ctx.fillStyle='rgba(5,6,16,0.8)';
  ctx.fillRect(mx0-2,my-2,mw+4,13);
  ctx.fillStyle='#0a2030'; ctx.fillRect(mx0,my,mw,9);
  const af=clamp(f.aura/100,0,1), as=clamp(f.auraShown/100,0,1);
  const seg=(frac,style)=>{ ctx.fillStyle=style;
    if(side===1) ctx.fillRect(mx0,my,mw*frac,9); else ctx.fillRect(mx0+mw*(1-frac),my,mw*frac,9); };
  seg(as,'rgba(255,225,150,0.8)'); // freshly-spent ghost
  const pg=ctx.createLinearGradient(0,my,0,my+9);
  if(f.spReady()){ pg.addColorStop(0,'#ffe9a0'); pg.addColorStop(1,'#ffb02a'); }
  else { pg.addColorStop(0,'#7ae8ff'); pg.addColorStop(1,'#1f9adf'); }
  seg(af,pg);
  if(f.char.auraMax<100){ // capped tank — dead zone past the cap
    const dz=mw*(1-f.char.auraMax/100);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    if(side===1) ctx.fillRect(mx0+mw-dz,my,dz,9); else ctx.fillRect(mx0,my,dz,9);
  }
  ctx.fillStyle='rgba(255,255,255,0.5)'; // cost tick marks (this fighter's real prices)
  for(const bc of [ATK.punch.cost,ATK.kick.cost,ATK.special.cost]){
    const tc=Math.round(bc*f.char.costMul);
    const tx = side===1? mx0+mw*tc/100 : mx0+mw*(1-tc/100);
    ctx.fillRect(tx-0.75,my-2,1.5,13);
  }
  if(f.spReady()){ // shimmer sweep
    const sx=mx0+((game.frame*4)%(mw+40))-20;
    ctx.save(); ctx.beginPath(); ctx.rect(mx0,my,mw,9); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillRect(sx,my,12,9); ctx.restore();
  }
  if(f.auraFlash>0 && f.auraFlash%4<2){ // "can't afford" warning
    ctx.strokeStyle='#ff4d5e'; ctx.lineWidth=2; ctx.strokeRect(mx0-2,my-2,mw+4,13);
  }
  }   // end: aura tank hidden in GALAXY
  // GUARD strip — drains as you block; empty = your guard cracks (a brief crushed window)
  const gy=my+11, gf=clamp((f.guard||0)/(f.guardMax||100),0,1);
  ctx.fillStyle='rgba(5,6,16,0.7)'; ctx.fillRect(mx0-2,gy-1,mw+4,5);

function dangerInfo(){
  if(game.mode2p) return 0; // humans don't telegraph
  const p=game.player;
  if(p.ko) return 0;
  const foes = (game.mode==='rumble'&&game.fighters)? game.fighters.filter(f=>f!==p&&!f.ko) : [game.enemy];
  let best=0;
  for(const e of foes){
    if(game.state==='fight' && e.attack && (e.attack.ph==='tel'||e.attack.ph==='wind') && Math.abs(e.x-p.x)<190){
      const a=e.attack;
      const remain = a.ph==='tel'? a.t+a.def.wind : a.t;
      best=Math.max(best, clamp(remain/Math.max(1,a.fuse),0,1));
    }
  }
  return best;
}

function wrapLines(s,maxW){
  const words=String(s).split(' '); let line='', out=[];
  for(const w of words){ const t=line? line+' '+w : w;

}

function drawCsFigure(char, x, groundY, facing, lit, a, phase, act){
  const f=cutsceneFighter(char); f.facing = (act==='turn')? -facing : facing;   // turn AWAY (won't look at you)
  try{ f.update(false); }catch(e){}
  // BODY-ACTING: bend the actual spine + hips (P.lean / P.crouch), not just rotate the whole plank
  let koA=0, dy=0, dx=0, sc=1.5; const P=f.P;
  if(act==='slump'){ P.lean+=0.28; P.crouch+=9; dy=4; koA=0.05; }
  else if(act==='broken'){ P.lean+=0.5; P.crouch+=18; dy=7; koA=0.10; }   // grief: the spine curls + the hips sink
  else if(act==='recoil'){ P.lean-=0.22; dx=facing*8; koA=-0.05; }        // taken aback: lean away
  else if(act==='loom'){ P.lean+=0.12; P.crouch-=5; sc=1.66; dy=-2; }     // menace: tall + leaning in
  else if(act==='step'){ dx=-facing*14; }
  const breath = (act==='broken'||act==='slump')? 0.5 : (act==='loom'? 1.4 : 1);   // slumped barely breathes; looming swells
  const bob=Math.sin(game.frame*0.05+phase*2.3)*3*breath + (lit?Math.sin(game.frame*0.22)*1.4*breath:0);
  const slide=(1-a)*46*(facing>0?-1:1);
  ctx.save(); ctx.translate(x+slide+dx, groundY+bob+dy); ctx.scale(sc,sc);
  if(lit) drawPose(f,f.P,0,0,Math.max(0.2,a),null,koA);
  else    drawPose(f,f.P,0,0,0.34,'#0d0b16',koA);   // dim silhouette
  ctx.restore();
}

  if(d.camZ==null){ d.camZ=tz; d.camX=tx; d.camY=ty; }                                     // snap on the first frame of a scene
  d.camZ+=(tz-d.camZ)*0.09; d.camX+=(tx-d.camX)*0.09; d.camY+=(ty-d.camY)*0.09;
  // staged scene under the moving camera

function fnEffect(key, lvl){
  const b=lvl-1;
  if(key==='plus')  return ['powers your PUNCH',   b>0?'+'+(b*10)+'% punch damage':'punch damage'];
  if(key==='minus') return ['powers your KICK',    b>0?'+'+(b*10)+'% kick damage':'kick damage'];
  if(key==='mul')   return ['powers your SPECIAL', b>0?'+'+(b*12)+'% damage · cheaper':'special damage'];
  return ['powers your DODGE', b>0?'+'+(b*3)+' dodge i-frames':'dodge window'];
}

function postFx(){   // cinematic lighting/atmosphere pass over the world — lifts perceived production value

  ctx.fillStyle=rays; ctx.fillRect(0,0,W,H);
  ctx.restore();
  // 3) COLOR GRADE — cool top, warm floor; soft-light keeps it subtle and cohesive

let _bloomCv=null;
function bloomPass(){   // soft additive bloom — blooms highlights for a rendered glow (downscaled for speed)
  if(typeof document==='undefined') return;
  if(cv.width<2 || cv.height<2) return;   // guard: a 0-sized canvas (e.g. tab loaded in background) would crash drawImage
  if(!_bloomCv){ _bloomCv=document.createElement('canvas'); }
  const bw=Math.max(1,(cv.width/3)|0), bh=Math.max(1,(cv.height/3)|0);
  if(_bloomCv.width!==bw){ _bloomCv.width=bw; _bloomCv.height=bh; }
  const bx=_bloomCv.getContext('2d');
  bx.clearRect(0,0,bw,bh);
  bx.globalCompositeOperation='source-over';
  bx.filter='contrast(2.6) brightness(0.62)';        // THRESHOLD: keep only highlights, so darks stay dark and the bloom reads as glow, not haze
  bx.drawImage(cv,0,0,bw,bh);                         // downscale the (thresholded) frame
  bx.filter='none';
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=0.40; ctx.filter='blur(3px)';
  ctx.drawImage(_bloomCv,0,0,cv.width,cv.height);    // tight bloom
  ctx.globalAlpha=0.18; ctx.filter='blur(7px)';
  ctx.drawImage(_bloomCv,0,0,cv.width,cv.height);    // wide bloom halo
  ctx.filter='none'; ctx.globalAlpha=1; ctx.restore();
}
let _grainCv=null;
function makeGrain(){   // one tiling monochrome noise tile for film grain (kills gradient banding, adds shot-on-film texture)
  _grainCv=document.createElement('canvas'); _grainCv.width=_grainCv.height=128;
  const g=_grainCv.getContext('2d'), id=g.createImageData(128,128), d=id.data;
  for(let i=0;i<d.length;i+=4){ const v=(Math.random()*255)|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; }
  g.putImageData(id,0,0);
}
function gradeFrame(){   // master tonemap + film grain — the single cheapest premium lift
  if(typeof document==='undefined' || cv.width<2) return;
  ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  ctx.globalCompositeOperation='source-over'; ctx.filter='contrast(1.07) saturate(1.14) brightness(1.015)';
  ctx.drawImage(cv,0,0);                                   // tonemap: blit the frame through a contrast/saturation filter
  ctx.filter='none';
  ctx.globalCompositeOperation='multiply'; ctx.fillStyle='rgba(26,36,62,0.12)'; ctx.fillRect(0,0,cv.width,cv.height);   // deepen + cool the shadows
  ctx.globalCompositeOperation='soft-light';              // warm the firelight floor
  const wg=ctx.createLinearGradient(0,cv.height*0.52,0,cv.height);
  wg.addColorStop(0,'rgba(255,176,110,0)'); wg.addColorStop(1,'rgba(255,176,110,0.16)');
  ctx.fillStyle=wg; ctx.fillRect(0,cv.height*0.5,cv.width,cv.height*0.5);
  if(!_grainCv) makeGrain();                              // film grain
  ctx.globalCompositeOperation='overlay'; ctx.globalAlpha=0.045+(cam.trauma||0)*0.05;
  ctx.fillStyle=ctx.createPattern(_grainCv,'repeat');

// A composite SCORE turns each match's stats (which were computed then discarded) into a

function freshProfile(){ return {best:{}, totalScore:0, matches:0, wins:0, correct:0, perfects:0, bestStreak:0, towerClears:0}; }
function computeScore(){
  const s=game.stats||{}, acc=(s.correct||0)/Math.max(1,s.asked||0);
  const diffMul=1+0.5*DIFF.level;                     // hard fights are worth more
  let sc = (s.correct||0)*120 + (s.perfects||0)*300 + (s.maxStreak||0)*60
         + Math.round(s.dmg||0)*2 + (s.auraEarned||0);
  if(game.playerWon) sc += 1500;
  if(s.qed) sc += 800;                          // a SOLVED finisher
  if(game.playerWon && game.player.hp>=game.player.char.hp) sc += 1000; // untouched
  sc = Math.round(sc * diffMul * (0.5 + acc));        // accuracy scales everything
  return Math.max(0, sc);
}

function recordDaily(score){

  if(best.day===day){            // ONE scored attempt per day — replays are practice (no streak, no rescore)
    game.dailyResult={ score, best:best.score, streak:load('dailyStreak',{n:0}).n, practice:true };
    return;
  }
  store('dailyBest',{day, score});
  const s=load('dailyStreak',{n:0,last:-2});
  // streak-freeze: a single missed day is forgiven once (auto-spent), so one slip doesn't reset the chase
  if(s.last===day-2 && !s.usedFreeze){ s.n=(s.n||0)+1; s.usedFreeze=true; }      // forgive ONE missed day (consumes the freeze)
  else if(day===s.last+1){ s.n=(s.n||0)+1; if(s.n%7===0) s.usedFreeze=false; }    // earn a fresh freeze only every 7 clean days
  else if(s.last!==day){ s.n=1; s.usedFreeze=false; }                             // a bigger gap (or a spent freeze) → reset

}

function tutorTick(){
