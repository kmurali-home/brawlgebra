const CODEX=[
 {cat:'THE ORDERS', title:'The Brotherhood of the Plus', req:0, col:FX.plus, body:
  'The oldest and slowest of the four orders. The Plus believe in more — but careful: growth you can always keep safe, never spent before it’s earned. They build great stone churches one brick a century, and they distrust the comma — too new, too fast. Their motto, carved above every door: “MORE, BUT GO SLOW.” The other orders call them dull. The Plus do not argue. A thing that builds for three hundred years is in no hurry to be liked.'},
 {cat:'THE ORDERS', title:'The Order of the Difference', req:2, col:FX.minus, body:
  'The Minus are the masters of taking away. They believe the truth is just what’s left once you strip off everything you don’t need — so they own nothing, want nothing, and are quietly proud of both. They’ve stood with the Plus since the First Subtraction: where Add makes the books grow, the Difference keeps them honest. A hungry order, though. Taking away, left alone too long, can learn to want more.'},
 {cat:'THE ORDERS', title:'The Schism', req:3, col:FX.div, body:
  'The Divide is loyal to no one. They trade only in secrets and ratios, splitting up kingdoms, deals and family fortunes for a fee paid by both sides at once. “Every whole thing is meant to be broken,” they teach — and they are never teaching idly. Is the Schism the smartest of the orders, or only the one that gets paid while the rest fight? The Schism will not answer that. It will only name the price of asking.'},
 {cat:'THE ORDERS', title:'The Cult of Excess', req:4, col:FX.mul, body:
  'The Multiply walked away from the Pact for good. Their whole belief is doubling just to double: armies, debts, hungers — all doubled with no roof, racing toward a high they call the Overflow. “Why add, when you can MULTIPLY?” To a Multiplier, holding back is stealing, and any limit is a slap in the face. They are, by the numbers, the exact reason the others ever needed a Pact in the first place.'},
 {cat:'THE FIGHTERS', title:'Addison, First Disciple of the Plus', req:1, col:FX.plus, body:
  'The steadiest adder anyone alive can remember — and that’s exactly because he grew up around the wildest, most over-the-top waste you could picture. Addison guards the rule of caution the way a man guards the one door he only just made it out of. He trains the Initiate, and he never talks about his family. He doesn’t need to. Anyone can see whose stance he’s working so hard not to copy.'},
 {cat:'THE FIGHTERS', title:'Lessing of the Difference', req:2, col:FX.minus, body:
  'Rough, loyal, and lighter than any man should be, having subtracted away almost everything he owns. Lessing has stood beside the Plus his whole life and would, he’ll tell you himself, sooner cut off his own hands than break the oath. The Difference’s strength is also where it hurts: a man who has trained himself to want nothing is horribly easy to break for anyone who offers him EVERYTHING.'},
 {cat:'THE FIGHTERS', title:'Krishna of the Quotient', req:3, col:FX.div, body:
  'A dealer in truths who hands out the worst ones for free, just to see what people do with them. Krishna spots the cracks in every team before the teammates do, and drops each secret at the exact moment it splits them cleanest. Is the Schism saving you or just using you for parts? Krishna would say there’s no difference. The worst part is he’d be half right.'},
 {cat:'THE FIGHTERS', title:'Maximilian, Warlord of Excess', req:4, col:FX.mul, body:
  'The Multiply’s cruel heart, and — the secret that breaks everyone — Addison’s father. Maximilian multiplied his own house into rubble and called it ambition; his son ran into the arms of caution and called it staying alive. Maximilian can’t see why anyone would ever STOP. The sad part of the Overflow is that, somewhere under the army of himself, he really did want his boy to be proud.'},
 {cat:'THE FIGHTERS', title:'You, the Unsworn Initiate', req:0, col:ME, body:
  'You wear no order’s mark, so your robe is blank. Every other fighter learned one function and swore to it forever — but you can learn all four. The old ones call that a gift. The smart ones call it a danger. To the orders you’re a stranger: the variable, the x sitting in every equation, the one value nobody has ever worked out. And it turns out that’s exactly what the world has been missing.'},
 {cat:'THE FIGHTERS', title:'Solomon, the Equals', req:11, col:FX.james, body:
  'Not a group. Not a fighter. The thing waiting at the bottom of every page anyone ever wrote. They call him Solomon — the Solver, the one who shrinks every line down to a single answer. While Plus, Minus, Divide and Multiply fought over how to CHANGE the numbers, Solomon waited to FINISH them. He sold Maximilian the Beautiful Lie and let the Brotherhood wear itself out cleaning up the mess. He hid his own name under a coffee stain on a kid’s prophecy, tucked in tiny print at the bottom of the page where nobody looks. He thinks every equation adds up to zero. The whole story is the fight to prove it doesn’t — that the unknown, so annoyingly, won’t be solved for.'},
 {cat:'THE HISTORY', title:'The Pact of Operations', req:0, col:N, body:
  'After the One was first worked upon, the four functions almost ripped the world apart fighting over it. The Pact ended that war: each order would rule its own operation and no other, and together they would keep the Great Equation balanced. It held for an age. Pacts, the Schism likes to point out, are just betrayals that haven’t been given a date yet.'},
 {cat:'THE HISTORY', title:'The First Subtraction', req:2, col:N, body:
  'The first deal between Plus and Minus. When the very first sum started to grow too big to hold, it was the Difference who took the extra away and saved the ledger. From that day on, Add and Subtract have made a promise: one grows things, one keeps them honest. It is the oldest deal in the world, which is exactly why breaking it rings out so loud.'},
 {cat:'THE HISTORY', title:'The Beautiful Lie', req:7, col:FX.mul, body:
  'The “proof” Maximilian sold to Lessing: that when you multiply without end, the difference grows BIGGER than the whole — promising a starving subtractor more and more to take away, forever. It is junk. It does not even add up; the difference is always, by its very nature, less than the whole. But it was cut to fit the exact empty space Lessing had spent a whole life digging out. And Maximilian did not think it up — it was handed to him, by the calm figure at the bottom of the page, who knows the surest way to talk a Brotherhood down to nothing is to let it lie to itself. The most dangerous lies are not the biggest. They are the best-fitted.'},
 {cat:'THE HISTORY', title:'The Overflow', req:10, col:FX.mul, body:
  'How Maximilian ended, and his way of thinking with him: doubling and doubling until he no longer fit inside the world that held him. A number multiplied with no stopping point does not grow strong. It breaks. In the last second he reached, out of habit, to carry the one — and found there was nothing left to carry it into.'},
 {cat:'THE HISTORY', title:'The Marginalia', req:0, col:HERO, body:
  'It is not a scroll. It is a note — scribbled sideways in the margin of a workbook so old the cover has forgotten its own proof. The great math-folk wrote it between fights: Brother Pi-thagoras, who could not stop drawing triangles; the Countess Ada, who scribbled notes on everything; Euclid the Dull; and al-Khwarizmi, who balanced both sides of a line and called it algebra. Zeno argued that the note would never finish being written. He was right, as he was always right, and it changed nothing. Their answer, careful and stained with coffee: one will come who masters not one function but all four — “a thing never once seen in all of human history, and honestly we are not sure it should be.” Every other prophecy promises a hero who is the best at one thing. This one promises a variable that refuses to be solved for. Every wandering new student carries a copy; not one has ever pulled it off. The footnote nobody reads names the reason it matters — “the Equals, at the bottom of the page, who balances every line down to nothing.” Prophecies, the Schism notes, are just fakes that have not yet come true.'},
];

function sayFightLine(txt, col, dur){   // route an in-fight subtitle through the taunt box, with a cooldown
  game.taunt={who:game.enemy.name, txt, col:col||game.enemy.glow||'#e8ecff', t:dur||160};
  game.tauntCd=game.frame+(dur||160)+90;
}
function reactBanter(ev){
  if(game.mode!=='story' || game.tutorial || game.practice || !game.enemy || !game.enemy.char) return;
  if(game.tauntCd && game.frame<game.tauntCd) return;
  const r=REACT[game.enemy.char.id]; if(!r||!r[ev]||!r[ev].length) return;
  if(Math.random()<0.5) sayFightLine(r[ev][rnd(0,r[ev].length-1)]);
}
// ---- HP-THRESHOLD story beats: marquee lines that PLAY mid-fight as health crosses a line (was: narrated in past-tense outros) ----
function fireStoryBeat(b){
  sayFightLine(b.txt, b.col, b.dur||210);
  if(b.sfx) playStinger(b.sfx);
  if(b.slow) slowmo(b.slowT||320, b.slowAmt||0.5);
  if(b.shake) addTrauma(b.shake);
}
function storyBeatTick(){
  if(game.mode!=='story' || game.tutorial || game.practice || !game.enemy || !game.player) return;
  const ch=STORY[game.storyCh]; if(!ch || !ch.hpBeats) return;
  game.hpFired=game.hpFired||{};
  const ef=game.enemy.hp/(game.enemy.char.hp||1), pf=game.player.hp/(game.player.char.hp||1);
  for(const b of ch.hpBeats){
    if(game.hpFired[b.at]) continue;
    let hit=false;
    if(b.at==='e66') hit=ef<=0.66; else if(b.at==='e33') hit=ef<=0.33; else if(b.at==='e15') hit=ef<=0.15;
    else if(b.at==='p50') hit=pf<=0.50; else if(b.at==='p33') hit=pf<=0.33;
    if(hit){ game.hpFired[b.at]=1; fireStoryBeat(b); }
  }
}

//----------------------------------------------------------------------
// ONLINE — host-authoritative netplay over the WebSocket relay
//   The host runs the real simulation and broadcasts ~30 snapshots/sec.
//   Guests render the interpolated snapshots and stream their inputs back.
//   Math is client-authoritative (each client solves locally and reports
//   the result); physics & combat are host-authoritative.
//----------------------------------------------------------------------
const net = { ws:null, role:null, seat:-1, room:'', roster:[], status:'offline', err:'', gm:'rumble',
  inEdges:[], pendingSolve:null, guestState:{}, snap:null, snapAt:0, sendAcc:0, bcAcc:0, setW:[0,0],
  name:load('name','PLAYER'), field:'name', input:'', camX:WORLD_W/2, camTz:0.7, lobby:false };
const PROTO=3;   // netplay protocol version — bump when the snapshot/message shape changes; the server rejects a join whose version != the host's (catches one player on a stale cached build). v3: pickup sync (pk) + guest-side hit FX
const RELAY_HOST='brawlgebra-relay.onrender.com';   // the public relay — static mirrors (GitHub Pages, file:, the desktop wrapper) fall back to it so EVERY shared link can play online
function netURL(){
  try{ if(new URLSearchParams(location.search).get('relay')==='local') return 'ws://localhost:8080'; }catch(e){}   // dev override
  const h=location.host;
  if(!h || location.protocol==='file:' || /github\.io|githubusercontent/.test(h)) return 'wss://'+RELAY_HOST;
  return (location.protocol==='https:'?'wss://':'ws://')+h;
}
function healthURL(){ return netURL().replace(/^wss:/,'https:').replace(/^ws:/,'http:')+'/health'; }
function netPrewarm(){ try{ fetch(healthURL(),{mode:'no-cors',cache:'no-store'}).catch(()=>{}); }catch(e){} }   // wake the free-tier relay early so it's up before a friend joins
function netSend(o){ try{ if(net.ws && net.ws.readyState===1) net.ws.send(JSON.stringify(o)); }catch(e){} }
function netConnect(then, _retry){
  net.err=''; net.status='connecting'; let opened=false;
  if(!_retry){ net.connectStart=performance.now(); net.retries=0; netPrewarm(); }   // first attempt: stamp the clock + wake the relay
  // why a connection might fail — point the player at the fix instead of a blank screen (Pages/file: builds now ride the public relay, so everyone gets the same path)
  const failMsg = 'could not reach the server — check your connection and try again (the first connection can take a minute)';
  let ws; try{ ws=new WebSocket(netURL()); }catch(e){ net.err=failMsg; net.status='offline'; return; }
  net.ws=ws;
  ws.onopen=()=>{ opened=true; net.status='online'; net.connectStart=0; if(then) then();
    clearInterval(net.ka); net.ka=setInterval(()=>netSend({t:'ping'}), 8000); }; // keepalive (survives bg throttle)
  ws.onclose=()=>{ clearInterval(net.ka);
    if(game.online){ net.status='offline'; netToTitle('disconnected'); return; }
    if(opened) return;
    // free-tier relays spin down when idle; the FIRST ws usually fails while it wakes — auto-retry within a cold-start window
    const elapsed = performance.now()-(net.connectStart||0);
    if(elapsed < 75000 && (net.retries||0) < 30){
      net.retries=(net.retries||0)+1; netPrewarm();
      clearTimeout(net.retryT); net.retryT=setTimeout(()=>{ if(net.status==='connecting') netConnect(then, true); }, 2200);
    } else { net.status='offline'; net.err=failMsg; }
  };
  ws.onerror=()=>{};   // failure handled by onclose (with retry)
  ws.onmessage=(e)=>{ let m; try{m=JSON.parse(e.data);}catch(_){return;} netHandle(m); };
}
function netToTitle(msg){ game.online=false; net.role=null; net.lobby=false; clearTimeout(net.retryT); clearInterval(net.ka); net.status='offline'; if(msg) net.err=msg; game.state='title'; }
function netHandle(m){
  switch(m.t){
    case 'joined': net.role=m.host?'host':'guest'; net.seat=m.seat; net.room=m.room; net.lobby=true; net.field='room'; net.err=''; SFX.ui(); break;
    case 'roster': {
      if(net.lobby && !game.online && Array.isArray(m.roster) && (net.roster||[]).length>0){   // a friend arrived — chime + fading notice (mirror of the leave cue)
        const had=new Set((net.roster||[]).map(p=>p.seat));
        const joined=m.roster.find(p=>p.seat!==net.seat && !had.has(p.seat));
        if(joined){ net.notice={txt:'P'+(joined.seat+1)+' joined', at:game.frame}; SFX.pickup(); }
      }
      net.roster=m.roster;
      { const me=m.roster && m.roster.find(p=>p.seat===net.seat); if(me) net.role=me.host?'host':'guest'; }   // host migration: re-derive my role from the server's truth (a promoted survivor becomes host)
      break;
    }
    case 'error': net.err=m.msg; net.field=net.lobby?'room':'code'; break;
    case 'start': startOnlineMatch(m.seats, m.seed, m.stage, m.gm, m.wu); break;
    case 'input': if(net.role==='host') hostRecvInput(m.seat, m.d); break;
    case 'snap': if(net.role==='guest') applySnapshot(m.d); break;
    case 'wu': if(net.role==='host') hostRecvWarmup(m.seat, m.fr); break;
    case 'rematch': onRematch(); break;
    case 'left': onPeerLeft(m.seat); break;
    case 'pong': break;                                  // keepalive ack — nothing to do, just don't drop it
    case 'hostleft':
      if(game.online && game.onlineDuel && game.state!=='matchend' && game.fighters){   // host bailed a live duel → the guest wins, not a silent bounce
        const foe=game.fighters.find(f=>f.seat!==net.seat);
        if(foe){ foe.hp=0; foe.hpShown=0; foe.eliminated=true; }
        game.playerWon=true; game.grade=null; announce('OPPONENT WITHDREW — VICTORY','#ffd34d'); game.state='matchend'; SFX.ko();
      } else if(game.online) netToTitle('host left — back to title');   // mid-match (rumble/non-duel): bail. In the LOBBY, do nothing — the 'roster' message promotes the survivor in place.
      break;
  }
}

function lobbyJoin(){ if(net.input.length<4){ net.err='enter a 4-letter code'; return; } store('name',net.name);

function onPeerLeft(seat){   // server told us a non-host seat dropped

      announce('OPPONENT WITHDREW — VICTORY','#ffd34d'); game.state='matchend'; SFX.ko(); }
  } else if(game.online && !game.onlineDuel && net.role==='host' && game.state!=='matchend'){

function startOnlineMatch(seats, seed, stage, gm, wu){

    const touchOnly=(navigator.maxTouchPoints>0 || 'ontouchstart' in window) && !matchMedia('(pointer:fine)').matches;
    if(!touchOnly) return;
    const d=document.createElement('div');
    d.style.cssText='position:fixed;inset:0;z-index:99;background:#06070c;color:#e8ecff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:ui-monospace,Menlo,monospace;text-align:center;padding:24px';
    d.innerHTML='<div style="font-size:32px;font-weight:800;letter-spacing:2px;color:#f2f5ff">|BRAWLGEBRA|</div>'
      +'<div style="color:#aeb8cc;font-size:13px;letter-spacing:1px">EVERY BLOW IS A PROBLEM</div>'
      +'<div style="max-width:420px;line-height:1.6;color:#9fb0c8;font-size:14px">BRAWLGEBRA fights with a <b style="color:#7ae8ff">keyboard</b>. Open this link on a computer — it plays right in the browser, nothing to install.</div>'
      +'<button id="mkCopy" style="background:#7ae8ff;color:#04050a;border:0;padding:12px 22px;border-radius:8px;font-weight:700;font-size:15px;font-family:inherit">copy the link</button>'
      +'<div style="color:#5a6478;font-size:11px">'+FOLLOW_URL+'</div>';
    document.body.appendChild(d);
    d.querySelector('#mkCopy').addEventListener('click',()=>{ try{ navigator.clipboard.writeText(FOLLOW_URL).then(()=>{ d.querySelector('#mkCopy').textContent='copied — send it to yourself'; }).catch(()=>{}); }catch(e){} });
  }catch(e){}
})();
requestAnimationFrame(loop);
</script>
</body>
