name: Build desktop binaries

# Push a version tag (e.g. v1.0.0) to build installers for all three desktop
# OSes and attach them to a draft GitHub Release. Those artifacts are what you
# upload to Steam (see STEAM_BUILD.md). You can also run it by hand from the
# Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows — the dominant Steam audience. Produces .exe (NSIS) + .msi.
          - platform: windows-latest
            args: ""
          # macOS universal — one binary that runs on both Apple Silicon and Intel.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Linux — .deb / .rpm / .AppImage.
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file wget curl

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS dependencies
        run: npm install

      - name: Build the app and draft a release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Brawlgebra ${{ github.ref_name }}"
          releaseBody: "Desktop builds. Download the installer for your OS. (Steam depots are built from these — see STEAM_BUILD.md.)"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
